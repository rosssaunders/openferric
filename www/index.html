      }
      async refresh() {
        if (!historicalDataService) return;
        this.refreshBtn.disabled = true;
        this.refreshBtn.textContent = 'Loading...';
        try {
          const endTs = Date.now();
          const rangeMs = HISTORY_RANGE_MS[this.rangeSel.value] || HISTORY_RANGE_MS['7d'];
          const startTs = endTs - rangeMs;
          const result = await historicalDataService.getTradingviewChartData({
            instrument: this.instrumentSel.value,
            startTs,
            endTs,
            resolution: this.resSel.value,
            ttlMs: 8000,
          });
          const ticks = Array.isArray(result?.ticks) ? result.ticks : [];
          const open = Array.isArray(result?.open) ? result.open : [];
          const high = Array.isArray(result?.high) ? result.high : [];
          const low = Array.isArray(result?.low) ? result.low : [];
          const close = Array.isArray(result?.close) ? result.close : [];
          const volume = Array.isArray(result?.volume) ? result.volume : [];
          const n = Math.min(ticks.length, open.length, high.length, low.length, close.length, volume.length);
          const rows = [];
          for (let i = 0; i < n; i++) {
            const ts = Number(ticks[i]);
            const o = Number(open[i]);
            const h = Number(high[i]);
            const l = Number(low[i]);
            const c = Number(close[i]);
            const v = Number(volume[i]);
            if (!Number.isFinite(ts) || !Number.isFinite(o) || !Number.isFinite(h) || !Number.isFinite(l) || !Number.isFinite(c)) continue;
            rows.push({ ts, o, h, l, c, v: Number.isFinite(v) ? Math.max(0, v) : 0 });
          }
          rows.sort((a, b) => a.ts - b.ts);
          this.candles = rows;
          this.draw();
        } catch (e) {
          console.warn('[pricechart] refresh failed:', e);
          this.candles = [];
          this.draw();
        } finally {
          this.refreshBtn.disabled = false;
          this.refreshBtn.textContent = 'Refresh';
        }
      }
      draw() {
        const { ctx, width, height } = historyResizeCanvas(this.canvas);
        ctx.fillStyle = '#070a0f';
        ctx.fillRect(0, 0, width, height);

        const candles = this.candles;
        const priceArea = { x: 50, y: 12, w: Math.max(10, width - 62), h: Math.max(10, Math.floor(height * 0.68)) };
        const volArea = { x: priceArea.x, y: priceArea.y + priceArea.h + 8, w: priceArea.w, h: Math.max(10, height - (priceArea.y + priceArea.h + 24)) };
        historyDrawGrid(ctx, priceArea, 6, 5);
        historyDrawGrid(ctx, volArea, 6, 2);

        if (!Array.isArray(candles) || candles.length < 2) {
          ctx.fillStyle = '#8ea1b8';
          ctx.font = '11px "JetBrains Mono"';
          ctx.textAlign = 'center';
          ctx.fillText('No OHLCV data in selected window', width * 0.5, height * 0.5);
          if (this.tooltip) this.tooltip.style.display = 'none';
          return;
        }

        let low = Infinity;
        let high = -Infinity;
        let maxVol = 0;
        for (const c of candles) {
          if (c.l < low) low = c.l;
          if (c.h > high) high = c.h;
          if (c.v > maxVol) maxVol = c.v;
        }
        const pPad = Math.max(1e-6, (high - low) * 0.08);
        low -= pPad;
        high += pPad;
        const tsMin = candles[0].ts;
        const tsMax = candles[candles.length - 1].ts;
        const xFromIndex = (i) => priceArea.x + (i / Math.max(1, candles.length - 1)) * priceArea.w;
        const yFromPrice = (v) => priceArea.y + (1 - ((v - low) / Math.max(1e-9, high - low))) * priceArea.h;
        const yFromVol = (v) => volArea.y + volArea.h - (v / Math.max(1, maxVol)) * volArea.h;
        const bodyW = Math.max(1, Math.min(10, (priceArea.w / candles.length) * 0.7));

        for (let i = 0; i < candles.length; i++) {
          const c = candles[i];
          const x = xFromIndex(i);
          const yHigh = yFromPrice(c.h);
          const yLow = yFromPrice(c.l);
          const yOpen = yFromPrice(c.o);
          const yClose = yFromPrice(c.c);
          const color = c.c >= c.o ? '#22c55e' : '#ef4444';

          ctx.strokeStyle = color;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x, yHigh);
          ctx.lineTo(x, yLow);
          ctx.stroke();

          const top = Math.min(yOpen, yClose);
          const hBody = Math.max(1, Math.abs(yClose - yOpen));
          ctx.fillStyle = color;
          ctx.fillRect(x - bodyW * 0.5, top, bodyW, hBody);

          ctx.fillStyle = color;
          const vy = yFromVol(c.v);
          ctx.fillRect(x - bodyW * 0.5, vy, bodyW, volArea.y + volArea.h - vy);
        }

        ctx.fillStyle = '#8ea1b8';
        ctx.font = '10px "JetBrains Mono"';
        ctx.textAlign = 'left';
        ctx.fillText(high.toFixed(2), 6, priceArea.y + 8);
        ctx.fillText(low.toFixed(2), 6, priceArea.y + priceArea.h);
        ctx.fillText('V ' + maxVol.toFixed(0), 6, volArea.y + 10);
        ctx.textAlign = 'center';
        ctx.fillText(new Date(tsMin).toLocaleDateString(), priceArea.x, height - 6);
        ctx.fillText(new Date(tsMax).toLocaleDateString(), priceArea.x + priceArea.w, height - 6);

        if (!this.hover || this.hover.x < priceArea.x || this.hover.x > priceArea.x + priceArea.w || this.hover.y < priceArea.y || this.hover.y > volArea.y + volArea.h) {
          if (this.tooltip) this.tooltip.style.display = 'none';
          return;
        }
        let idx = Math.round(((this.hover.x - priceArea.x) / priceArea.w) * (candles.length - 1));
        idx = Math.max(0, Math.min(candles.length - 1, idx));
        const hit = candles[idx];
        const cx = xFromIndex(idx);
        const cy = yFromPrice(hit.c);

        ctx.strokeStyle = 'rgba(142,161,184,0.6)';
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 2]);
        ctx.beginPath();
        ctx.moveTo(cx, priceArea.y);
        ctx.lineTo(cx, volArea.y + volArea.h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(priceArea.x, this.hover.y);
        ctx.lineTo(priceArea.x + priceArea.w, this.hover.y);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath();
        ctx.fillStyle = '#2fb2ff';
        ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
        ctx.fill();

        if (!this.tooltip) return;
        this.tooltip.innerHTML =
          `<div>${historyFormatTs(hit.ts)}</div>`
          + `<div>O ${hit.o.toFixed(2)} H ${hit.h.toFixed(2)}</div>`
          + `<div>L ${hit.l.toFixed(2)} C ${hit.c.toFixed(2)}</div>`
          + `<div>V ${hit.v.toFixed(2)}</div>`;
        this.tooltip.style.display = 'block';
        const left = Math.max(6, Math.min(width - 170, this.hover.x + 10));
        const top = Math.max(6, Math.min(height - 68, this.hover.y - 10));
        this.tooltip.style.left = left + 'px';
        this.tooltip.style.top = top + 'px';
      }
      dispose() {
        if (this._resizeObs) this._resizeObs.disconnect();
        delete panels.pricechart;
      }
    }

    function dslParseNumberList(raw, fallback) {
      const txt = String(raw ?? '');
      const parts = txt.split(',').map((x) => x.trim()).filter((x) => x.length > 0);
      const out = [];
      for (const part of parts) {
        const cleaned = part.replace(/_/g, '');
        const num = parseFloat(cleaned);
        if (Number.isFinite(num)) out.push(num);
      }
      return out.length > 0 ? out : fallback.slice();
    }

    function dslParsePositiveInt(raw, fallback, min = 1, max = 500000000) {
      const parsed = parseInt(String(raw ?? ''), 10);
      if (!Number.isFinite(parsed)) return fallback;
      if (parsed < min) return min;
      if (parsed > max) return max;
      return parsed;
    }

    function dslExpandArray(values, n, fallback) {
      const out = values.slice(0, n);
      while (out.length < n) {
        out.push(out.length > 0 ? out[out.length - 1] : fallback);
      }
      return out;
    }

    function inferDslAssetCount(compiledProduct, parsedSpots, parsedVols, parsedDivs) {
      let n = 1;
      if (Array.isArray(parsedSpots)) n = Math.max(n, parsedSpots.length);
      if (Array.isArray(parsedVols)) n = Math.max(n, parsedVols.length);
      if (Array.isArray(parsedDivs)) n = Math.max(n, parsedDivs.length);
      if (compiledProduct && typeof compiledProduct === 'object') {
        if (Array.isArray(compiledProduct.underlyings)) n = Math.max(n, compiledProduct.underlyings.length);
        if (Array.isArray(compiledProduct.assets)) n = Math.max(n, compiledProduct.assets.length);
        if (compiledProduct.underlyings && typeof compiledProduct.underlyings === 'object' && !Array.isArray(compiledProduct.underlyings)) {
          n = Math.max(n, Object.keys(compiledProduct.underlyings).length);
        }
        if (Number.isFinite(compiledProduct.num_underlyings)) {
          n = Math.max(n, Math.max(1, Math.floor(compiledProduct.num_underlyings)));
        }
      }
      return Math.max(1, n);
    }

    function dslParseCompiledProductObject() {
      try {
        return dslCompiledProduct ? JSON.parse(dslCompiledProduct) : null;
      } catch (e) {
        return null;
      }
    }

    function dslNormalizeUnderlyingType(type) {
      const normalized = String(type ?? '').trim();
      return normalized || 'Equity';
    }

    function dslCarryLabelForType(type) {
      return dslNormalizeUnderlyingType(type).toLowerCase() === 'fx' ? 'rf' : 'q';
    }

    function dslResolveCompiledUnderlyings(compiledProduct) {
      const fallback = [{ name: 'Asset 0', asset_index: 0, underlying_type: 'Equity' }];
      if (!compiledProduct || typeof compiledProduct !== 'object') return fallback;

      let underlyings = [];
      if (Array.isArray(compiledProduct.underlyings)) {
        underlyings = compiledProduct.underlyings.map((u, idx) => ({
          name: String(u && u.name ? u.name : `Asset ${idx}`),
          asset_index: Number.isFinite(Number(u && u.asset_index)) ? Math.floor(Number(u.asset_index)) : idx,
          underlying_type: dslNormalizeUnderlyingType(u && u.underlying_type),
        }));
      } else if (compiledProduct.underlyings && typeof compiledProduct.underlyings === 'object') {
        underlyings = Object.entries(compiledProduct.underlyings).map(([name, value], idx) => ({
          name: String(name || `Asset ${idx}`),
          asset_index: Number.isFinite(Number(value && value.asset_index)) ? Math.floor(Number(value.asset_index)) : idx,
          underlying_type: dslNormalizeUnderlyingType(value && value.underlying_type),
        }));
      } else if (Array.isArray(compiledProduct.assets)) {
        underlyings = compiledProduct.assets.map((asset, idx) => ({
          name: String(asset && asset.name ? asset.name : `Asset ${idx}`),
          asset_index: idx,
          underlying_type: dslNormalizeUnderlyingType(asset && asset.type),
        }));
      } else if (Number.isFinite(Number(compiledProduct.num_underlyings))) {
        const n = Math.max(1, Math.floor(Number(compiledProduct.num_underlyings)));
        underlyings = Array.from({ length: n }, (_, idx) => ({
          name: `Asset ${idx}`,
          asset_index: idx,
          underlying_type: 'Equity',
        }));
      }

      if (!underlyings.length) return fallback;
      return underlyings
        .map((u, idx) => ({
          name: String(u.name || `Asset ${idx}`),
          asset_index: Number.isFinite(Number(u.asset_index)) ? Math.floor(Number(u.asset_index)) : idx,
          underlying_type: dslNormalizeUnderlyingType(u.underlying_type),
        }))
        .sort((a, b) => {
          if (a.asset_index !== b.asset_index) return a.asset_index - b.asset_index;
          return a.name.localeCompare(b.name);
        });
    }

    function dslMakeCorrelationKey(leftName, rightName) {
      return [String(leftName), String(rightName)].sort().join('||');
    }

    function dslSyncLegacyMarketLists() {
      const assets = Array.isArray(dslPricingConfig.marketAssets) ? dslPricingConfig.marketAssets : [];
      dslPricingConfig.spots = assets.map((asset) => asset.spot ?? '100').join(', ');
      dslPricingConfig.vols = assets.map((asset) => asset.vol ?? '0.2').join(', ');
      dslPricingConfig.dividendYields = assets.map((asset) => asset.dividendYield ?? '0.0').join(', ');
    }

    function dslNormalizeStructuredMarketState(compiledProduct = dslParseCompiledProductObject()) {
      const underlyings = dslResolveCompiledUnderlyings(compiledProduct);
      const prevAssets = Array.isArray(dslPricingConfig.marketAssets) ? dslPricingConfig.marketAssets : [];
      const prevCorr = Array.isArray(dslPricingConfig.correlations) ? dslPricingConfig.correlations : [];
      const prevByName = new Map();
      const prevPairValues = new Map();

      for (let i = 0; i < prevAssets.length; i++) {
        const asset = prevAssets[i] || {};
        prevByName.set(String(asset.name ?? `Asset ${i}`), { asset, index: i });
      }
      for (let i = 0; i < prevAssets.length; i++) {
        for (let j = i + 1; j < prevAssets.length; j++) {
          const left = prevAssets[i] || {};
          const right = prevAssets[j] || {};
          const row = Array.isArray(prevCorr[i]) ? prevCorr[i] : [];
          const mirroredRow = Array.isArray(prevCorr[j]) ? prevCorr[j] : [];
          const raw = row[j] ?? mirroredRow[i];
          if (raw !== undefined && raw !== null && raw !== '') {
            prevPairValues.set(dslMakeCorrelationKey(left.name ?? `Asset ${i}`, right.name ?? `Asset ${j}`), String(raw));
          }
        }
      }

      dslPricingConfig.marketAssets = underlyings.map((underlying, idx) => {
        const byName = prevByName.get(underlying.name);
        const byIndex = prevAssets[idx] ? { asset: prevAssets[idx], index: idx } : null;
        const prev = byName || byIndex;
        return {
          name: underlying.name,
          underlyingType: dslNormalizeUnderlyingType(underlying.underlying_type || (prev && prev.asset.underlyingType)),
          spot: String(prev && prev.asset.spot != null ? prev.asset.spot : '100'),
          vol: String(prev && prev.asset.vol != null ? prev.asset.vol : '0.2'),
          dividendYield: String(prev && prev.asset.dividendYield != null ? prev.asset.dividendYield : '0.0'),
        };
      });

      dslPricingConfig.correlations = dslPricingConfig.marketAssets.map((asset, i) =>
        dslPricingConfig.marketAssets.map((other, j) => {
          if (i === j) return '1.0';
          const byName = prevPairValues.get(dslMakeCorrelationKey(asset.name, other.name));
          if (byName !== undefined) return byName;
          const row = Array.isArray(prevCorr[i]) ? prevCorr[i] : [];
          const mirroredRow = Array.isArray(prevCorr[j]) ? prevCorr[j] : [];
          const byIndex = row[j] ?? mirroredRow[i];
          return byIndex !== undefined && byIndex !== null && byIndex !== '' ? String(byIndex) : '0.0';
        })
      );

      if (!Number.isFinite(parseFloat(String(dslPricingConfig.rate ?? '').replace(/_/g, '')))) {
        dslPricingConfig.rate = '0.05';
      }
      dslSyncLegacyMarketLists();
    }

    function dslBuildMarketJson() {
      if (panels.structmarket && typeof panels.structmarket.captureState === 'function') {
        const state = panels.structmarket.captureState();
        if (state) {
          dslPricingConfig.marketAssets = state.assets;
          dslPricingConfig.correlations = state.correlations;
          dslPricingConfig.rate = state.rate;
          dslSyncLegacyMarketLists();
        }
      }
      dslNormalizeStructuredMarketState();

      const parseValue = (raw, fallback) => {
        const cleaned = String(raw ?? '').replace(/_/g, '');
        const parsed = parseFloat(cleaned);
        return Number.isFinite(parsed) ? parsed : fallback;
      };

      const assets = dslPricingConfig.marketAssets.map((asset) => ({
        type: dslNormalizeUnderlyingType(asset.underlyingType),
        spot: parseValue(asset.spot, 100.0),
        vol: parseValue(asset.vol, 0.2),
        dividend_yield: parseValue(asset.dividendYield, 0.0),
      }));
      const correlations = dslPricingConfig.correlations.map((row, i) =>
        assets.map((_, j) => {
          if (i === j) return 1.0;
          return parseValue(row && row[j], 0.0);
        })
      );
      const rate = parseValue(dslPricingConfig.rate, 0.05);
      return JSON.stringify({ assets, correlation: correlations, rate });
    }

    function dslRunPricing() {
      if (!dslCompiledProduct) return;
      if (panels.structeditor) panels.structeditor.setStatus('Computing...', 'computing');
      computeWorker.postMessage({ type: 'dsl-price-full', payload: {
        productJson: dslCompiledProduct,
        marketJson: dslBuildMarketJson(),
        numPaths: dslPricingConfig.numPaths,
        numSteps: dslPricingConfig.numSteps,
        seed: dslPricingConfig.seed,
      }});
    }

    function dslSendAnalyze(source) {
      dslSource = source;
      computeWorker.postMessage({ type: 'dsl-analyze', payload: { source } });
    }

    // =====================================================================
    //  Structuring Editor Panel (Monaco + WASM analysis)
    // =====================================================================
    class StructuringEditorPanel {
      constructor() { this._el = document.createElement('div'); this._el.className = 'dock-content'; this._el.style.display = 'flex'; this._el.style.flexDirection = 'column'; }
      get element() { return this._el; }
      init(params) {
        this._el.innerHTML = `
          <div class="dsl-toolbar">
            <select class="dsl-example-select"><option value="">-- Examples --</option></select>
            <button class="dsl-run-btn">Run</button>
            <label>Paths <input type="number" class="dsl-paths-input" value="10000" min="1000" max="500000" step="10000" style="width:60px"></label>
            <label><input type="checkbox" class="dsl-autorun-cb" checked> Auto-run</label>
          </div>
          <div class="dsl-editor-container"></div>
          <div class="dsl-status-bar"><span class="dsl-status-text">Ready</span></div>
        `;
        panels.structeditor = this;

        const exSel = this._el.querySelector('.dsl-example-select');
        for (const name of Object.keys(STRUCTURING_EXAMPLES)) {
          const opt = document.createElement('option');
          opt.value = name; opt.textContent = name;
          exSel.appendChild(opt);
        }
        exSel.addEventListener('change', () => { if (exSel.value && this._editor) { this._editor.setValue(STRUCTURING_EXAMPLES[exSel.value]); } });

        this._el.querySelector('.dsl-run-btn').addEventListener('click', () => dslRunPricing());
        this._el.querySelector('.dsl-paths-input').addEventListener('change', (e) => { dslPricingConfig.numPaths = parseInt(e.target.value) || 50000; });
        this._el.querySelector('.dsl-autorun-cb').addEventListener('change', (e) => { dslAutoRun = e.target.checked; });

        this._statusText = this._el.querySelector('.dsl-status-text');
        this._editorContainer = this._el.querySelector('.dsl-editor-container');

        // Initialize Monaco when available
        this._initMonaco();

        this._resizeObs = new ResizeObserver(() => { if (this._editor) this._editor.layout(); });
        this._resizeObs.observe(this._el);
      }
      _initMonaco() {
        if (typeof window.require !== 'function' || !window.require.config) {
          // Monaco not yet loaded, retry
          setTimeout(() => this._initMonaco(), 200);
          return;
        }
        window.require(['vs/editor/editor.main'], (monaco) => {
          // Register language
          monaco.languages.register({ id: 'openferric' });

          // Monarch tokenizer for basic highlighting
          monaco.languages.setMonarchTokensProvider('openferric', {
            keywords: ['product','notional','maturity','underlyings','state','schedule','from','to','let','if','then','else','pay','redeem','set','skip','asset','bool','float','true','false'],
            operators: ['and','or','not'],
            frequencies: ['monthly','quarterly','semi_annual','annual'],
            builtins: ['worst_of','best_of','performances','price','min','max','abs','exp','log'],
            tokenizer: {
              root: [
                [/\/\/.*$/, 'comment'],
                [/"[^"]*"/, 'string'],
                [/\b\d+(_\d+)*(\.\d+)?\b/, 'number'],
                [/[a-zA-Z_]\w*/, { cases: { '@keywords': 'keyword', '@operators': 'operator', '@frequencies': 'enumMember', '@builtins': 'function', '@default': 'variable' } }],
                [/[=!<>]+/, 'operator'],
                [/[+\-*/]/, 'operator'],
              ]
            }
          });

          // Dark theme matching terminal colors
          monaco.editor.defineTheme('ferric-dark', {
            base: 'vs-dark',
            inherit: true,
            rules: [
              { token: 'keyword', foreground: '569cd6', fontStyle: 'bold' },
              { token: 'variable', foreground: '9cdcfe' },
              { token: 'function', foreground: 'dcdcaa' },
              { token: 'number', foreground: 'b5cea8' },
              { token: 'string', foreground: 'ce9178' },
              { token: 'operator', foreground: 'd4d4d4' },
              { token: 'enumMember', foreground: '4ec9b0' },
              { token: 'comment', foreground: '6a9955', fontStyle: 'italic' },
            ],
            colors: {
              'editor.background': '#0d141d',
              'editor.foreground': '#d4d4d4',
              'editorLineNumber.foreground': '#464b55',
              'editor.selectionBackground': '#264f78',
              'editor.lineHighlightBackground': '#121a26',
              'editorCursor.foreground': '#2fb2ff',
            }
          });

          // Create editor
          this._editor = monaco.editor.create(this._editorContainer, {
            value: STRUCTURING_EXAMPLES['Zero Coupon'],
            language: 'openferric',
            theme: 'ferric-dark',
            fontSize: 12,
            minimap: { enabled: false },
            lineNumbers: 'on',
            scrollBeyondLastLine: false,
            automaticLayout: false,
            tabSize: 4,
            insertSpaces: true,
            wordWrap: 'off',
          });
          this._monaco = monaco;

          // Register language providers
          this._registerProviders(monaco);

          // On content change — debounced analysis
          this._editor.onDidChangeModelContent(() => {
            clearTimeout(dslAnalyzeTimer);
            dslAnalyzeTimer = setTimeout(() => {
              dslSendAnalyze(this._editor.getValue());
            }, 300);
          });

          // Trigger initial analysis
          dslSendAnalyze(this._editor.getValue());
        });
      }
      _registerProviders(monaco) {
        // Hover provider
        monaco.languages.registerHoverProvider('openferric', {
          provideHover: (model, position) => {
            return new Promise((resolve) => {
              const offset = model.getOffsetAt(position);
              const reqId = ++dslRequestSeq;
              dslHoverRequestId = reqId;
              dslHoverResolve = (result) => {
                if (!result) { resolve(null); return; }
                const startPos = model.getPositionAt(result.start);
                const endPos = model.getPositionAt(result.end);
                resolve({
                  range: new monaco.Range(startPos.lineNumber, startPos.column, endPos.lineNumber, endPos.column),
                  contents: [{ value: result.markdown }],
                });
              };
              computeWorker.postMessage({ type: 'dsl-hover', payload: { source: model.getValue(), offset, requestId: reqId } });
              setTimeout(() => { if (dslHoverRequestId === reqId) { dslHoverResolve = null; resolve(null); } }, 2000);
            });
          }
        });

        // Completion provider
        monaco.languages.registerCompletionItemProvider('openferric', {
          triggerCharacters: [' ', '.', '('],
          provideCompletionItems: (model, position) => {
            return new Promise((resolve) => {
              const offset = model.getOffsetAt(position);
              const reqId = ++dslRequestSeq;
              dslCompletionsRequestId = reqId;
              dslCompletionsResolve = (result) => {
                if (!result || !Array.isArray(result)) { resolve({ suggestions: [] }); return; }
                const word = model.getWordUntilPosition(position);
                const range = new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn);
                const kindMap = { Keyword: 17, Variable: 5, Function: 1, EnumMember: 15, Constant: 14 };
                resolve({
                  suggestions: result.map(c => ({
                    label: c.label,
                    kind: kindMap[c.kind] || 17,
                    detail: c.detail || '',
                    documentation: c.documentation || '',
                    insertText: c.label,
                    range,
                  }))
                });
              };
              computeWorker.postMessage({ type: 'dsl-completions', payload: { source: model.getValue(), offset, requestId: reqId } });
              setTimeout(() => { if (dslCompletionsRequestId === reqId) { dslCompletionsResolve = null; resolve({ suggestions: [] }); } }, 2000);
            });
          }
        });

        // Definition provider
        monaco.languages.registerDefinitionProvider('openferric', {
          provideDefinition: (model, position) => {
            return new Promise((resolve) => {
              const offset = model.getOffsetAt(position);
              const reqId = ++dslRequestSeq;
              dslGotoDefRequestId = reqId;
              dslGotoDefResolve = (result) => {
                if (!result) { resolve(null); return; }
                const startPos = model.getPositionAt(result.start);
                const endPos = model.getPositionAt(result.end);
                resolve({
                  uri: model.uri,
                  range: new monaco.Range(startPos.lineNumber, startPos.column, endPos.lineNumber, endPos.column),
                });
              };
              computeWorker.postMessage({ type: 'dsl-goto-def', payload: { source: model.getValue(), offset, requestId: reqId } });
              setTimeout(() => { if (dslGotoDefRequestId === reqId) { dslGotoDefResolve = null; resolve(null); } }, 2000);
            });
          }
        });

        // Semantic tokens provider
        monaco.languages.registerDocumentSemanticTokensProvider('openferric', {
          getLegend: () => ({ tokenTypes: DSL_TOKEN_TYPES, tokenModifiers: [] }),
          provideDocumentSemanticTokens: () => {
            if (!dslLastAnalysis || !dslLastAnalysis.semanticTokens) return null;
            const data = new Uint32Array(dslLastAnalysis.semanticTokens.flat());
            return { data };
          },
          releaseDocumentSemanticTokens: () => {},
        });
      }
      applyAnalysis(analysis) {
        if (!this._editor || !this._monaco) return;
        const monaco = this._monaco;
        const model = this._editor.getModel();
        if (!model) return;

        // Set markers (diagnostics)
        const markers = (analysis.diagnostics || []).map(d => {
          const startPos = model.getPositionAt(d.start);
          const endPos = model.getPositionAt(d.end);
          return {
            severity: d.severity === 'error' ? monaco.MarkerSeverity.Error : monaco.MarkerSeverity.Warning,
            message: d.message,
            startLineNumber: startPos.lineNumber, startColumn: startPos.column,
            endLineNumber: endPos.lineNumber, endColumn: endPos.column,
          };
        });
        monaco.editor.setModelMarkers(model, 'openferric', markers);

        // Update status bar
        const errs = markers.filter(m => m.severity === monaco.MarkerSeverity.Error).length;
        if (errs > 0) {
          this._statusText.className = 'dsl-status-text status-err';
          this._statusText.textContent = `${errs} error${errs > 1 ? 's' : ''}`;
        } else if (analysis.compiled) {
          this._statusText.className = 'dsl-status-text status-ok';
          this._statusText.textContent = 'Compiled OK';
        } else {
          this._statusText.className = 'dsl-status-text';
          this._statusText.textContent = 'No errors';
        }
      }
      setStatus(text, cls) {
        if (!this._statusText) return;
        this._statusText.className = 'dsl-status-text' + (cls ? ` status-${cls}` : '');
        this._statusText.textContent = text;
      }
      updatePriceStatus(result) {
        if (!result || !this._statusText) return;
        this._statusText.className = 'dsl-status-text status-ok';
        if (result.error) {
          this._statusText.className = 'dsl-status-text status-err';
          this._statusText.textContent = `Compiled OK | Error: ${result.error}`;
        } else if (Number.isFinite(result.price)) {
          this._statusText.textContent = `Compiled OK | Price: ${result.price.toFixed(2)}`;
        }
      }
      dispose() {
        if (this._resizeObs) this._resizeObs.disconnect();
        if (this._editor) this._editor.dispose();
        delete panels.structeditor;
      }
    }

    // =====================================================================
    //  DSL Result Panel
    // =====================================================================
    class DslResultPanel {
      constructor() { this._el = document.createElement('div'); this._el.className = 'dock-content dsl-result-panel'; }
      get element() { return this._el; }
      init(params) {
        this._el.innerHTML = '<div style="color:var(--fg-dim);padding:20px">Run a product to see pricing results</div>';
        panels.dslresult = this;
        if (dslLastPricingResult) this.renderResult(dslLastPricingResult);
      }
      renderResult(r) {
        if (!r) return;
        if (r.error && !r.price) {
          this._el.innerHTML = `<div class="dsl-section"><h3>Error</h3><div style="color:var(--red)">${esc(r.error)}</div></div>`;
          return;
        }
        let html = '';

        // Product info
        html += `<div class="dsl-section"><h3>Product</h3><dl class="dsl-product-info">`;
        if (r.productName) html += `<dt>Name</dt><dd>${esc(r.productName)}</dd>`;
        if (r.notional != null) html += `<dt>Notional</dt><dd>${fmt(r.notional)}</dd>`;
        if (r.maturity != null) html += `<dt>Maturity</dt><dd>${r.maturity}Y</dd>`;
        if (r.underlyings && r.underlyings.length) html += `<dt>Underlyings</dt><dd>${r.underlyings.map(esc).join(', ')}</dd>`;
        html += `</dl></div>`;

        // Price
        html += `<div class="dsl-section"><h3>Price</h3>`;
        html += `<span class="dsl-price-display">${fmt(r.price)}</span>`;
        if (r.stderr != null) html += `<span class="dsl-stderr">&plusmn; ${r.stderr.toFixed(4)}</span>`;
        if (r.error) html += `<div style="color:var(--red);margin-top:4px">${esc(r.error)}</div>`;
        html += `</div>`;

        // Greeks
        if (r.greeks && r.greeks.length) {
          html += `<div class="dsl-section"><h3>Greeks</h3><table><thead><tr><th>Asset</th><th>Delta</th><th>Gamma</th><th>Vega</th><th>Theta</th><th>Rho</th><th>Vanna</th><th>Volga</th></tr></thead><tbody>`;
          for (const g of r.greeks) {
            html += `<tr><td>${esc(g.asset)}</td><td>${gfmt(g.delta)}</td><td>${gfmt(g.gamma)}</td><td>${gfmt(g.vega)}</td><td>${gfmt(g.theta)}</td><td>${gfmt(g.rho)}</td><td>${gfmt(g.vanna)}</td><td>${gfmt(g.volga)}</td></tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Cross-Greeks
        if (r.crossGreeks && r.crossGreeks.length) {
          html += `<div class="dsl-section"><h3>Cross-Greeks</h3><table><thead><tr><th>Asset I</th><th>Asset J</th><th>Cross-Gamma</th><th>Corr Sens</th></tr></thead><tbody>`;
          for (const cg of r.crossGreeks) {
            html += `<tr><td>${esc(cg.assetI)}</td><td>${esc(cg.assetJ)}</td><td>${gfmt(cg.crossGamma)}</td><td>${gfmt(cg.corrSens)}</td></tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Market snapshot
        if (r.market) {
          html += `<div class="dsl-section"><h3>Market</h3><dl class="dsl-market-info">`;
          html += `<dt>Rate</dt><dd>${(r.market.rate * 100).toFixed(1)}%</dd>`;
          if (r.market.assets) {
            for (const a of r.market.assets) {
              html += `<dt>${esc(a.name)}</dt><dd>S=${fmt(a.spot)} &sigma;=${(a.vol * 100).toFixed(1)}% q=${(a.dividendYield * 100).toFixed(1)}%</dd>`;
            }
          }
          html += `</dl></div>`;
        }

        this._el.innerHTML = html;
      }
      dispose() { delete panels.dslresult; }
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function fmt(v) { return Number.isFinite(v) ? v.toLocaleString(undefined, { maximumFractionDigits: 2 }) : '--'; }
    function gfmt(v) { return Number.isFinite(v) ? v.toFixed(4) : '--'; }

    // =====================================================================
    //  DSL Payoff Panel
    // =====================================================================
    class DslPayoffPanel {
      constructor() { this._el = document.createElement('div'); this._el.className = 'dock-content'; }
      get element() { return this._el; }
      init(params) {
        this._el.innerHTML = '<div class="chart-area" style="width:100%;height:100%"></div>';
        this._chartDiv = this._el.querySelector('.chart-area');
        panels.dslpayoff = this;
        this._resizeObs = new ResizeObserver(() => {
          if (this._chartDiv && this._chartDiv.data) {
            try { Plotly.Plots.resize(this._chartDiv); } catch(e) {}
          }
        });
        this._resizeObs.observe(this._el);
        if (dslLastPricingResult) this.renderPayoff(dslLastPricingResult);
      }
      renderPayoff(r) {
        if (!r || !r.payoffProfile || !r.payoffProfile.length || !this._chartDiv) return;
        const x = r.payoffProfile.map(p => p.spotPct);
        const y = r.payoffProfile.map(p => p.pv);
        const notional = r.notional || 0;
        const traces = [{
          x, y, type: 'scatter', mode: 'lines+markers',
          line: { color: '#2fb2ff', width: 2 },
          marker: { size: 4 },
          name: 'PV',
        }];
        if (notional > 0) {
          traces.push({
            x: [x[0], x[x.length - 1]], y: [notional, notional],
            type: 'scatter', mode: 'lines',
            line: { color: '#888', width: 1, dash: 'dot' },
            name: 'Notional',
          });
        }
        const layout = {
          paper_bgcolor: '#0d141d', plot_bgcolor: '#0d141d',
          font: { color: '#d4d4d4', size: 10 },
          margin: { t: 30, r: 20, b: 40, l: 60 },
          xaxis: { title: 'Spot %', color: '#888', gridcolor: '#1a2233' },
          yaxis: { title: 'PV', color: '#888', gridcolor: '#1a2233' },
          showlegend: true,
          legend: { x: 0.02, y: 0.98, font: { size: 9 } },
        };
        Plotly.react(this._chartDiv, traces, layout, { responsive: true, displayModeBar: false });
      }
      dispose() {
        if (this._resizeObs) this._resizeObs.disconnect();
        if (this._chartDiv) try { Plotly.purge(this._chartDiv); } catch(e) {}
        delete panels.dslpayoff;
      }
    }

    // =====================================================================
    //  Structuring Market Panel
    // =====================================================================
    class StructuringMarketPanel {
      constructor() {
        this._el = document.createElement('div');
        this._el.className = 'dock-content';
      }
      get element() { return this._el; }
      init(params) {
        this._el.innerHTML =
          '<div class="panel-head"><div class="panel-title">Market</div></div>'
          + '<div class="dsl-market-wrap">'
          + '<div class="dsl-market-dynamic"></div>'
          + '<div class="dsl-market-section">'
          + '<div class="dsl-market-config-grid">'
          + '<label>rate</label><input type="text" class="dsl-m-rate" placeholder="0.05">'
          + '<label>num paths</label><input type="number" class="dsl-m-paths" min="1000" max="500000" step="10000">'
          + '<label>num steps</label><input type="number" class="dsl-m-steps" min="10" max="1000" step="10">'
          + '<label>seed</label><input type="number" class="dsl-m-seed" min="0">'
          + '</div>'
          + '<div class="dsl-market-note"></div>'
          + '</div>';

        this._dynamicEl = this._el.querySelector('.dsl-market-dynamic');
        this._rateInput = this._el.querySelector('.dsl-m-rate');
        this._pathsInput = this._el.querySelector('.dsl-m-paths');
        this._stepsInput = this._el.querySelector('.dsl-m-steps');
        this._seedInput = this._el.querySelector('.dsl-m-seed');
        this._noteEl = this._el.querySelector('.dsl-market-note');
        panels.structmarket = this;

        this._rateInput.value = dslPricingConfig.rate;
        this._pathsInput.value = dslPricingConfig.numPaths;
        this._stepsInput.value = dslPricingConfig.numSteps;
        this._seedInput.value = dslPricingConfig.seed;

        this._rateInput.addEventListener('input', () => {
          dslPricingConfig.rate = this._rateInput.value;
          dslRunPricing();
        });

        const wireNum = (el, key) => {
          el.addEventListener('change', () => {
            dslPricingConfig[key] = parseInt(el.value) || dslPricingConfig[key];
            dslRunPricing();
          });
        };
        wireNum(this._pathsInput, 'numPaths');
        wireNum(this._stepsInput, 'numSteps');
        wireNum(this._seedInput, 'seed');

        this.refreshFromCompiledProduct();
      }
      captureState() {
        const assetInputs = Array.from(this._el.querySelectorAll('.dsl-market-asset-row'));
        const corrInputs = Array.from(this._el.querySelectorAll('.dsl-market-corr-table input[data-corr-row]'));
        const assets = assetInputs.map((row, idx) => ({
          name: row.dataset.assetName || `Asset ${idx}`,
          underlyingType: row.dataset.assetType || 'Equity',
          spot: row.querySelector('[data-field="spot"]')?.value ?? '100',
          vol: row.querySelector('[data-field="vol"]')?.value ?? '0.2',
          dividendYield: row.querySelector('[data-field="dividendYield"]')?.value ?? '0.0',
        }));

        const correlations = assets.map((_, i) => assets.map((__, j) => (i === j ? '1.0' : '0.0')));
        for (const input of corrInputs) {
          const row = parseInt(input.dataset.corrRow, 10);
          const col = parseInt(input.dataset.corrCol, 10);
          if (!Number.isFinite(row) || !Number.isFinite(col)) continue;
          if (row === col) correlations[row][col] = '1.0';
          else correlations[row][col] = input.value;
        }

        return {
          assets,
          correlations,
          rate: this._rateInput ? this._rateInput.value : dslPricingConfig.rate,
        };
      }
      _syncStateFromDom() {
        const snapshot = this.captureState();
        if (!snapshot) return;
        dslPricingConfig.marketAssets = snapshot.assets;
        dslPricingConfig.correlations = snapshot.correlations;
        dslPricingConfig.rate = snapshot.rate;
        dslSyncLegacyMarketLists();
      }
      _renderDynamicContent() {
        const assets = Array.isArray(dslPricingConfig.marketAssets) ? dslPricingConfig.marketAssets : [];
        const correlations = Array.isArray(dslPricingConfig.correlations) ? dslPricingConfig.correlations : [];

        const assetRows = assets.map((asset, idx) => `
          <div class="dsl-market-asset-row" data-asset-name="${esc(asset.name)}" data-asset-type="${esc(asset.underlyingType)}">
            <div class="dsl-market-asset-name" title="${esc(asset.name)}">${esc(asset.name)}</div>
            <label class="dsl-market-field">
              <span>spot</span>
              <input type="text" data-asset-index="${idx}" data-field="spot" value="${esc(asset.spot)}" placeholder="100">
            </label>
            <label class="dsl-market-field">
              <span>vol</span>
              <input type="text" data-asset-index="${idx}" data-field="vol" value="${esc(asset.vol)}" placeholder="0.2">
            </label>
            <label class="dsl-market-field">
              <span>${esc(dslCarryLabelForType(asset.underlyingType))}</span>
              <input type="text" data-asset-index="${idx}" data-field="dividendYield" value="${esc(asset.dividendYield)}" placeholder="0.0">
            </label>
          </div>
        `).join('');

        const corrHead = assets.map((asset) => `<th>${esc(asset.name)}</th>`).join('');
        const corrBody = assets.map((asset, i) => {
          const cells = assets.map((_, j) => {
            const rawValue = i === j ? '1.0' : String(correlations[i] && correlations[i][j] != null ? correlations[i][j] : '0.0');
            const readonly = i === j ? ' readonly tabindex="-1"' : '';
            return `<td><input type="text" data-corr-row="${i}" data-corr-col="${j}" value="${esc(rawValue)}"${readonly}></td>`;
          }).join('');
          return `<tr><th>${esc(asset.name)}</th>${cells}</tr>`;
        }).join('');

        this._dynamicEl.innerHTML =
          '<div class="dsl-market-section">'
          + '<div class="dsl-market-section-title">Assets</div>'
          + `<div class="dsl-market-assets">${assetRows}</div>`
          + '</div>'
          + '<div class="dsl-market-section">'
          + '<div class="dsl-market-section-title">Correlations</div>'
          + '<div class="dsl-market-corr-wrap">'
          + `<table class="dsl-market-corr-table"><thead><tr><th></th>${corrHead}</tr></thead><tbody>${corrBody}</tbody></table>`
          + '</div>'
          + '</div>';

        for (const input of this._dynamicEl.querySelectorAll('.dsl-market-asset-row input[data-field]')) {
          input.addEventListener('input', () => {
            this._syncStateFromDom();
            dslRunPricing();
          });
        }
        for (const input of this._dynamicEl.querySelectorAll('.dsl-market-corr-table input[data-corr-row]')) {
          if (input.hasAttribute('readonly')) continue;
          input.addEventListener('input', () => {
            const row = input.dataset.corrRow;
            const col = input.dataset.corrCol;
            const mirror = this._dynamicEl.querySelector(`.dsl-market-corr-table input[data-corr-row="${col}"][data-corr-col="${row}"]`);
            if (mirror) mirror.value = input.value;
            this._syncStateFromDom();
            dslRunPricing();
          });
        }
      }
      _updateNote(compiledProduct = dslParseCompiledProductObject()) {
        const underlyings = dslResolveCompiledUnderlyings(compiledProduct);
        const hasCompiledUnderlyings = !!(
          compiledProduct
          && (
            (Array.isArray(compiledProduct.underlyings) && compiledProduct.underlyings.length)
            || (compiledProduct.underlyings && typeof compiledProduct.underlyings === 'object' && Object.keys(compiledProduct.underlyings).length)
            || (Array.isArray(compiledProduct.assets) && compiledProduct.assets.length)
            || (Number.isFinite(Number(compiledProduct.num_underlyings)) && Number(compiledProduct.num_underlyings) > 0)
          )
        );
        this._noteEl.textContent = hasCompiledUnderlyings
          ? `${underlyings.length} asset${underlyings.length === 1 ? '' : 's'}: ${underlyings.map((u) => u.name).join(', ')}`
          : 'Fallback asset row shown until DSL compilation yields underlyings.';
      }
      refreshFromCompiledProduct() {
        this._syncStateFromDom();
        dslNormalizeStructuredMarketState();
        this._renderDynamicContent();
        this._updateNote();
        if (this._rateInput) this._rateInput.value = dslPricingConfig.rate;
      }
      dispose() { delete panels.structmarket; }
    }

    // =====================================================================
    //  Render cycle counter (tiering is done in the worker)
    // =====================================================================
    let renderCycle = 0;
    let frameCache = null; // populated from worker results

    // =====================================================================
    //  Worker message handler + result application
    // =====================================================================
    let lastSurfaceData = null, lastGreeksData = null, lastScannerData = null;

    function handleWorkerMessage(e) {
      if (e.data.type === 'ready') {
        workerReady = true;
        console.log('[worker] ready');
        return;
      }
      if (e.data.type === 'compute-result') {
        applyComputeResult(e.data.payload);
      }
      if (e.data.type === 'strategy-result') {
        lastStrategyResult = e.data.payload;
        requestAnimationFrame(() => renderStrategyPayoff(e.data.payload));
      }
      if (e.data.type === 'pricer-result') {
        const payload = e.data.payload || {};
        if (Number.isFinite(payload.requestId) && payload.requestId < pricerRequestSeq) return;
        lastPricerResult = payload;
        requestAnimationFrame(() => renderPricerPanelData(payload));
        return;
      }
      if (e.data.type === 'boros-result') {
        lastBorosResult = e.data.payload || null;
        requestAnimationFrame(() => renderBorosPanels());
        return;
      }
      // DSL analysis results
      if (e.data.type === 'dsl-analyze-result') {
        dslLastAnalysis = e.data.payload;
        if (dslLastAnalysis && dslLastAnalysis.compiled) {
          dslCompiledProduct = JSON.stringify(dslLastAnalysis.compiled);
        } else {
          dslCompiledProduct = null;
        }
        requestAnimationFrame(() => {
          if (panels.structmarket) panels.structmarket.refreshFromCompiledProduct();
          if (panels.structeditor) panels.structeditor.applyAnalysis(dslLastAnalysis);
          if (dslAutoRun && dslCompiledProduct) dslRunPricing();
        });
      }
      if (e.data.type === 'dsl-hover-result') {
        if (dslHoverResolve && e.data.requestId === dslHoverRequestId) {
          dslHoverResolve(e.data.payload);
          dslHoverResolve = null;
        }
      }
      if (e.data.type === 'dsl-completions-result') {
        if (dslCompletionsResolve && e.data.requestId === dslCompletionsRequestId) {
          dslCompletionsResolve(e.data.payload);
          dslCompletionsResolve = null;
        }
      }
      if (e.data.type === 'dsl-goto-def-result') {
        if (dslGotoDefResolve && e.data.requestId === dslGotoDefRequestId) {
          dslGotoDefResolve(e.data.payload);
          dslGotoDefResolve = null;
        }
      }
      if (e.data.type === 'dsl-price-full-result') {
        dslLastPricingResult = e.data.payload;
        requestAnimationFrame(() => {
          if (panels.dslresult) panels.dslresult.renderResult(dslLastPricingResult);
          if (panels.dslpayoff) panels.dslpayoff.renderPayoff(dslLastPricingResult);
          if (panels.structeditor) panels.structeditor.updatePriceStatus(dslLastPricingResult);
        });
      }
    }

    function applyComputeResult(r) {
      calibratedSlices = r.calibratedSlices;
      calibTimeUs = r.calibTimeUs;

      // Update surface title
      const modelNames = { svi: 'SVI', sabr: 'SABR', vv: 'Vanna-Volga' };
      if (panels.surface && panels.surface.titleEl) {
        const mt = calibratedSlices.length > 0 ? calibratedSlices[0].modelType : activeModel;
        panels.surface.titleEl.textContent =
          `3D Vol Surface (${modelNames[mt] || mt} fit + market)`;
      }

      // Save previous IVs for heatmap diff
      const newIvMap = new Map();
      for (const sl of calibratedSlices) {
        for (const pt of sl.points) {
          newIvMap.set(sl.expiryCode + '|' + pt.strike, pt.market_iv);
        }
      }
      if (!baselineSurface) baselineSurface = calibratedSlices;

      // Update ATM vol sparkline
      const globalAtm = calibratedSlices.length > 0 ? calibratedSlices[0].atmVol : NaN;
      if (isFinite(globalAtm)) {
        atmVolHistory.push(globalAtm);
        if (atmVolHistory.length > SPARK_LEN) atmVolHistory.shift();
      }
      prevIvMap = newIvMap;

      // Cache tiered data
      if (r.surface) lastSurfaceData = r.surface;
      if (r.greeks) lastGreeksData = r.greeks;
      if (r.scanner) lastScannerData = r.scanner;

      // Store frame cache data from worker for metrics/term fallback
      frameCache = (r.d25 && r.atmIv) ? {
        packed: null,
        d25: r.d25,
        atmIv: r.atmIv,
        termRr25: r.termRr25 || [],
        termBf25: r.termBf25 || [],
        realizedVol: r.realizedVol,
      } : null;

      // Cache forward vol data
      if (r.forwardVol) lastForwardVolData = r.forwardVol;

      // IndexedDB snapshot writes (fire-and-forget)
      const now = Date.now();
      if (now - lastDbWrite.atm_iv_series > 60000 && calibratedSlices.length > 0) {
        lastDbWrite.atm_iv_series = now;
        for (const sl of calibratedSlices) terminalDb.put('atm_iv_series', { currency: activeCurrency, timestamp: now, expiry: sl.expiryCode, atmIv: sl.atmVol });
      }
      if (now - lastDbWrite.spot_series > 60000 && spotPrice > 0) {
        lastDbWrite.spot_series = now;
        terminalDb.put('spot_series', { currency: activeCurrency, timestamp: now, spot: spotPrice });
      }
      if (now - lastDbWrite.vol_snapshots > 300000 && calibratedSlices.length > 0) {
        lastDbWrite.vol_snapshots = now;
        terminalDb.put('vol_snapshots', { currency: activeCurrency, timestamp: now, slices: calibratedSlices.map(s => ({ expiry: s.expiryCode, T: s.T, atmVol: s.atmVol, modelType: s.modelType, params: s.params })) });
      }

      requestAnimationFrame(() => {
        refreshTps();
        renderHeader();
        renderMetrics(r);
        renderSmile();
        renderTerm(r);
        renderVolChange();
        if (lastGreeksData) renderGreeks(lastGreeksData);
        if (lastScannerData) renderScanner(lastScannerData);
        if (lastSurfaceData) renderSurface(lastSurfaceData);
        if (lastForwardVolData) renderForwardVol();
        renderFunding();
        renderVolCone();
        if (panels.pricer) {
          renderPricerPanelData(lastPricerResult);
          if (pricerTicket.marketLinkage === 'live') triggerPricerCompute('market');
        }
      });
    }

    function renderHeader() {
      document.getElementById('hdr-spot').textContent = spotPrice > 0 ? '$' + pFmt.format(spotPrice) : '--';
      renderSparkline(document.getElementById('spark-spot'), spotHistory, '#2fb2ff');
      renderSparkline(document.getElementById('spark-vol'), atmVolHistory, '#19d8a8');
    }

    // --- 3D Surface ---
    let surfaceInitialized = false;
    let surfaceInteracting = false;
    let surfaceDirty = false;

    // Smooth zoom state
    let zoomTarget = null;   // {x, y, z} target eye position
    let zoomCurrent = null;  // {x, y, z} current animated eye
    let zoomRafId = null;
    const ZOOM_LERP = 0.15;  // interpolation factor per frame (0-1, higher = snappier)
    const ZOOM_STEP = 0.08;  // distance factor per wheel tick

    function animateZoom(div) {
      if (!zoomTarget || !zoomCurrent) return;
      // Lerp toward target
      zoomCurrent.x += (zoomTarget.x - zoomCurrent.x) * ZOOM_LERP;
      zoomCurrent.y += (zoomTarget.y - zoomCurrent.y) * ZOOM_LERP;
      zoomCurrent.z += (zoomTarget.z - zoomCurrent.z) * ZOOM_LERP;

      Plotly.relayout(div, {
        'scene.camera.eye': { x: zoomCurrent.x, y: zoomCurrent.y, z: zoomCurrent.z }
      });

      // Keep animating until close enough
      const dx = zoomTarget.x - zoomCurrent.x;
      const dy = zoomTarget.y - zoomCurrent.y;
      const dz = zoomTarget.z - zoomCurrent.z;
      if (dx * dx + dy * dy + dz * dz > 1e-8) {
        zoomRafId = requestAnimationFrame(() => animateZoom(div));
      } else {
        zoomCurrent.x = zoomTarget.x;
        zoomCurrent.y = zoomTarget.y;
        zoomCurrent.z = zoomTarget.z;
        zoomRafId = null;
        // End interaction after animation settles
        surfaceInteracting = false;
        if (surfaceDirty) { surfaceDirty = false; renderSurface(lastSurfaceData); }
      }
    }

    // --- 3D Surface ---
    function renderSurface(data) {
      const div = panels.surface ? panels.surface.chartDiv : null;
      if (!div || !data) return;

      if (surfaceInteracting && surfaceInitialized) {
        surfaceDirty = true;
        document.getElementById('calib-time').textContent = calibTimeUs > 0 ? calibTimeUs + ' us' : '';
        return;
      }

      const { xGrid, xAxisTitle, tGrid, flatZ, gridN, marketX, marketY, marketZ, marketText } = data;
      const zGrid = [];
      const nSlices = tGrid.length;
      for (let i = 0; i < nSlices; i++) {
        zGrid.push(flatZ.slice(i * gridN, (i + 1) * gridN));
      }

      if (!surfaceInitialized) {
        const traces = [
          {
            type: 'surface', name: 'Fitted', x: xGrid, y: tGrid, z: zGrid,
            opacity: 0.82, showscale: false,
            colorscale: [[0,'#144f83'],[0.5,'#1e8ac8'],[1,'#39dba7']],
          },
          {
            type: 'scatter3d', mode: 'markers', name: 'Market',
            x: marketX, y: marketY, z: marketZ,
            text: marketText,
            hovertemplate: '%{text}<extra></extra>',
            marker: { size: 2.2, color: '#d8e0ea', opacity: 0.85 },
          },
        ];

        const layout = {
          ...darkLayout,
          uirevision: 'stable',
          margin: { l: 0, r: 0, b: 0, t: 0 },
          scene: {
            xaxis: { title: xAxisTitle || 'ln(K/F)', ...axisStyle },
            yaxis: { title: 'T (yr)', ...axisStyle },
            zaxis: { title: 'IV (%)', ...axisStyle },
            camera: { eye: { x: 1.65, y: 1.25, z: 0.8 } },
          },
          showlegend: false,
        };

        Plotly.newPlot(div, traces, layout, { responsive: true, displayModeBar: false, scrollZoom: false });
        surfaceInitialized = true;

        div.addEventListener('mousedown', () => { surfaceInteracting = true; });
        window.addEventListener('mouseup', () => {
          if (surfaceInteracting && !zoomRafId) {
            surfaceInteracting = false;
            if (surfaceDirty) { surfaceDirty = false; renderSurface(lastSurfaceData); }
          }
        });

        div.addEventListener('wheel', (e) => {
          e.preventDefault();
          surfaceInteracting = true;
          const scene = div._fullLayout && div._fullLayout.scene;
          const cam = scene && scene._scene ? scene._scene.getCamera() : null;
          const eye = cam ? cam.eye : (zoomCurrent || { x: 1.65, y: 1.25, z: 0.8 });
          if (!zoomCurrent) zoomCurrent = { x: eye.x, y: eye.y, z: eye.z };
          const base = zoomTarget || { x: eye.x, y: eye.y, z: eye.z };
          const direction = e.deltaY > 0 ? 1 : -1;
          const scale = 1 + direction * ZOOM_STEP;
          zoomTarget = { x: base.x * scale, y: base.y * scale, z: base.z * scale };
          if (!zoomRafId) {
            zoomRafId = requestAnimationFrame(() => animateZoom(div));
          }
        }, { passive: false });
      } else {
        Plotly.restyle(div,
          { x: [xGrid, marketX], y: [tGrid, marketY], z: [zGrid, marketZ], text: [null, marketText] },
          [0, 1]);
        Plotly.relayout(div, { 'scene.xaxis.title.text': xAxisTitle || 'ln(K/F)' });
      }

      surfaceDirty = false;
      document.getElementById('calib-time').textContent = calibTimeUs > 0 ? calibTimeUs + ' us' : '';
    }

    // --- Vol Change Heatmap ---
    function renderVolChange() {
      const div = panels.volchange ? panels.volchange.chartDiv : null;
      if (!div) return;
      if (calibratedSlices.length === 0) return;

      const expLabels = [];
      const strikeSet = new Set();
      for (const sl of calibratedSlices) {
        expLabels.push(sl.expiryLabel);
        for (const pt of sl.points) strikeSet.add(pt.strike);
      }
      const strikes = [...strikeSet].sort((a, b) => a - b);
      // Subsample if too many strikes
      const maxStrikes = 30;
      const step = strikes.length > maxStrikes ? Math.ceil(strikes.length / maxStrikes) : 1;
      const sampledStrikes = strikes.filter((_, i) => i % step === 0);

      const z = [];
      for (const sl of calibratedSlices) {
        const row = [];
        const ptMap = new Map();
        for (const pt of sl.points) ptMap.set(pt.strike, pt.market_iv);
        for (const strike of sampledStrikes) {
          const curIv = ptMap.get(strike);
          const prevIv = prevIvMap.get(sl.expiryCode + '|' + strike);
          if (curIv !== undefined && prevIv !== undefined) {
            row.push(curIv - prevIv);
          } else {
            row.push(0);
          }
        }
        z.push(row);
      }

      Plotly.react(div, [{
        type: 'heatmap', x: sampledStrikes.map(s => pFmt.format(s)),
        y: expLabels, z, colorscale: [[0,'#2255bb'],[0.5,'#1a1a2e'],[1,'#bb2222']],
        showscale: true, colorbar: { title: 'IV chg', titleside: 'right', thickness: 10, len: 0.6 },
        zmin: -2, zmax: 2,
      }], {
        ...darkLayout,
        uirevision: 'stable',
        margin: { l: 60, r: 50, b: 40, t: 6 },
        xaxis: { title: 'Strike', ...axisStyle, tickangle: -45 },
        yaxis: { title: '', ...axisStyle },
      }, { responsive: true, displayModeBar: false });
    }

    // --- Smile Slice ---
    function smileXValue(point, slice, stickyRule) {
      if (stickyRule === 'strike') return point.strike;
      if (stickyRule === 'moneyness') return Math.exp(point.k);
      if (stickyRule === 'delta') return 1 / (1 + Math.exp(2.3 * point.k));
      return point.k;
    }

    function smileAxisTitle(stickyRule) {
      if (stickyRule === 'strike') return 'Strike';
      if (stickyRule === 'moneyness') return 'K/F';
      if (stickyRule === 'delta') return 'Call Delta (proxy)';
      return 'ln(K/F)';
    }

    function renderSmile() {
      const div = panels.smile ? panels.smile.chartDiv : null;
      if (!div) return;
      ensureExpirySelection();
      if (!activeExpiry || calibratedSlices.length === 0) return;

      const slice = calibratedSlices.find(s => s.expiryCode === activeExpiry);
      if (!slice) return;

      const pts = slice.points;
      const stickyRule = surfaceConfig.conventions.stickyRule || 'delta';
      const x = pts.map(p => smileXValue(p, slice, stickyRule));
      const marketIv = pts.map(p => p.market_iv);
      const bidIv = pts.map(p => p.bid_iv);
      const askIv = pts.map(p => p.ask_iv);

      // Extended fitted curve from surface grid (covers full k-range)
      let fittedX, fittedY;
      const sliceIdx = calibratedSlices.findIndex(s => s.expiryCode === activeExpiry);
      if (lastSurfaceData && lastSurfaceData.kGrid && sliceIdx >= 0) {
        const { kGrid, flatZ, gridN } = lastSurfaceData;
        fittedX = kGrid.map(k => {
          if (stickyRule === 'strike') return slice.forward * Math.exp(k);
          if (stickyRule === 'moneyness') return Math.exp(k);
          if (stickyRule === 'delta') return 1 / (1 + Math.exp(2.3 * k));
          return k;
        });
        fittedY = [];
        for (let ki = 0; ki < gridN; ki++) fittedY.push(flatZ[sliceIdx * gridN + ki]);
      } else {
        fittedX = x;
        fittedY = pts.map(p => p.fitted_iv);
      }

      const traces = [];

      // Bid-ask ribbon (only if we have valid bid/ask)
      const hasBidAsk = bidIv.some(v => v > 0) && askIv.some(v => v > 0);
      if (hasBidAsk) {
        traces.push({
          type: 'scatter', mode: 'lines', name: 'bid IV', x, y: bidIv,
          line: { color: 'rgba(47,178,255,0.3)', width: 0 },
          showlegend: false,
        });
        traces.push({
          type: 'scatter', mode: 'lines', name: 'ask IV', x, y: askIv,
          line: { color: 'rgba(47,178,255,0.3)', width: 0 },
          fill: 'tonexty', fillcolor: 'rgba(47,178,255,0.12)',
          showlegend: false,
        });
      }

      traces.push({
        type: 'scatter', mode: 'markers', name: 'market', x, y: marketIv,
        marker: { color: '#d8e0ea', size: 4.5 },
      });
      traces.push({
        type: 'scatter', mode: 'lines', name: 'fitted', x: fittedX, y: fittedY,
        line: { color: '#19d8a8', width: 2 },
      });

      Plotly.react(div, traces, {
        ...darkLayout,
        uirevision: activeExpiry,
        margin: { l: 40, r: 8, b: 30, t: 6 },
        xaxis: { title: smileAxisTitle(stickyRule), autorange: true, ...axisStyle },
        yaxis: { title: 'IV (%)', autorange: true, ...axisStyle },
        legend: { orientation: 'h', y: 1.02, x: 0.01, font: { size: 9 } },
        transition: { duration: 120, easing: 'linear' },
      }, { responsive: true, displayModeBar: false });
    }

    function ensureExpirySelection() {
      const sel = panels.smile ? panels.smile.expirySelect : null;
      if (!sel) return;
      const expiries = calibratedSlices.map(s => s.expiryCode);

      // Only rebuild DOM options when the set of expiries actually changes
      const curOpts = Array.from(sel.options, o => o.value);
      const needsRebuild = expiries.length !== curOpts.length ||
        expiries.some((e, i) => e !== curOpts[i]);

      if (needsRebuild) {
        const prev = activeExpiry;
        sel.innerHTML = '';
        for (const e of expiries) {
          const opt = document.createElement('option');
          opt.value = e; opt.textContent = e;
          sel.appendChild(opt);
        }
        if (expiries.length === 0) { activeExpiry = ''; return; }
        activeExpiry = (prev && expiries.includes(prev)) ? prev : expiries[0];
        sel.value = activeExpiry;
      } else if (expiries.length === 0) {
        activeExpiry = '';
      }
    }

    // --- Black-76 Greeks Heatmap ---
    function renderGreeks(data) {
      const div = panels.greeks ? panels.greeks.chartDiv : null;
      if (!div || !data) return;

      const { z, sampledStrikes, expLabels } = data;

      const colorscales = {
        delta: [[0,'#0d2847'],[0.5,'#1a3a5c'],[1,'#2fb2ff']],
        gamma: [[0,'#0d2820'],[0.5,'#1a5c3a'],[1,'#19d8a8']],
        vega:  [[0,'#28200d'],[0.5,'#5c4a1a'],[1,'#ffb347']],
        theta: [[0,'#280d0d'],[0.5,'#5c1a1a'],[1,'#ff7a7a']],
      };

      Plotly.react(div, [{
        type: 'heatmap',
        x: sampledStrikes.map(s => pFmt.format(s)),
        y: expLabels, z,
        colorscale: colorscales[activeGreek] || colorscales.delta,
        showscale: true,
        colorbar: { title: activeGreek, titleside: 'right', thickness: 10, len: 0.6 },
      }], {
        ...darkLayout,
        uirevision: 'stable',
        margin: { l: 60, r: 50, b: 40, t: 6 },
        xaxis: { title: 'Strike', ...axisStyle, tickangle: -45 },
        yaxis: { title: '', ...axisStyle },
      }, { responsive: true, displayModeBar: false });
    }

    // --- Term Structure ---
    function renderTerm(r) {
      const div = panels.term ? panels.term.chartDiv : null;
      if (!div || !r) return;
      if (calibratedSlices.length === 0) return;

      const expLabels = calibratedSlices.map(s => s.expiryLabel);
      const atmVols = calibratedSlices.map(s => s.atmVol);

      const traces = [{
        type: 'scatter', mode: 'lines+markers', name: 'ATM IV',
        x: expLabels, y: atmVols,
        line: { color: '#2fb2ff', width: 2 },
        marker: { color: '#2fb2ff', size: 5 },
      }];

      traces.push({
        type: 'scatter', mode: 'lines+markers', name: 'RR25',
        x: expLabels, y: r.termRr25, yaxis: 'y2',
        line: { color: '#ff7a7a', width: 1.5, dash: 'dot' },
        marker: { size: 4 },
      });
      traces.push({
        type: 'scatter', mode: 'lines+markers', name: 'BF25',
        x: expLabels, y: r.termBf25, yaxis: 'y2',
        line: { color: '#ffb347', width: 1.5, dash: 'dot' },
        marker: { size: 4 },
      });

      const rvol = r.realizedVol;
      if (isFinite(rvol) && rvol > 0) {
        traces.push({
          type: 'scatter', mode: 'lines', name: 'Realized',
          x: [expLabels[0], expLabels[expLabels.length - 1]], y: [rvol, rvol],
          line: { color: '#888', width: 1, dash: 'dash' },
        });
      }

      Plotly.react(div, traces, {
        ...darkLayout,
        uirevision: 'stable',
        margin: { l: 40, r: 50, b: 30, t: 6 },
        xaxis: { title: '', ...axisStyle },
        yaxis: { title: 'ATM IV (%)', ...axisStyle },
        yaxis2: { title: 'RR/BF', ...axisStyle, overlaying: 'y', side: 'right' },
        legend: { orientation: 'h', y: 1.05, x: 0.01, font: { size: 9 } },
        showlegend: true,
        transition: { duration: 120, easing: 'linear' },
      }, { responsive: true, displayModeBar: false });
    }

    // --- Metrics & Skew Table ---
    function renderMetrics(r) {
      const p = panels.metrics;
      if (!p) return;

      if (p.mSpot) p.mSpot.textContent = spotPrice > 0 ? pFmt.format(spotPrice) : '--';
      if (p.mOptions) p.mOptions.textContent = chain.size || '--';
      if (p.mExpiries) p.mExpiries.textContent = calibratedSlices.length || '--';
      if (p.mTps) p.mTps.textContent = ticksPerSec > 0 ? pFmt1.format(ticksPerSec) : '--';
      if (p.mCalib) p.mCalib.textContent = calibTimeUs > 0 ? calibTimeUs.toString() : '--';

      const rvol = r ? r.realizedVol : NaN;
      if (p.mRvol) p.mRvol.textContent = isFinite(rvol) ? pFmt1.format(rvol) + '%' : '--';

      const tbody = p.skewTbody;
      if (!tbody || !r || !r.d25) return;
      tbody.innerHTML = '';

      const mD25 = r.d25;
      const mAtmIv = r.atmIv;

      for (let i = 0; i < calibratedSlices.length; i++) {
        const sl = calibratedSlices[i];
        const ivCall = mD25[i * 4 + 2];
        const ivPut = mD25[i * 4 + 3];
        const atmIv = mAtmIv[i];
        const rr25 = isFinite(ivCall) && isFinite(ivPut) ? (ivCall - ivPut) : NaN;
        const bf25 = isFinite(ivCall) && isFinite(ivPut) ? (0.5*(ivCall+ivPut) - atmIv) : NaN;

        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${sl.expiryLabel}</td>`
          + `<td>${pFmt1.format(sl.atmVol)}</td>`
          + `<td>${pFmt.format(sl.rmse)}</td>`
          + `<td>${sl.skew.toFixed(4)}</td>`
          + `<td>${sl.kurtProxy.toFixed(4)}</td>`
          + `<td>${isFinite(rr25) ? pFmt1.format(rr25) : '-'}</td>`
          + `<td>${isFinite(bf25) ? pFmt1.format(bf25) : '-'}</td>`
          + `<td>${sl.n}</td>`;
        tbody.appendChild(tr);
      }
    }

    // =====================================================================
    //  Mispricing Scanner
    // =====================================================================
    let edgeThreshold = 1.0;
    let edgeSideFilter = 'all';
    let minMaturity = 0; // minimum T in days (0 = no filter)

    // --- Scanner ---
    function renderScanner(data) {
      if (!data) return;
      const heatDiv = panels.scanner ? panels.scanner.heatmapDiv : null;
      const edgeTbody = panels.scanner ? panels.scanner.edgeTbody : null;
      if (!heatDiv || !edgeTbody) return;

      const { heatZ, heatText, sampledStrikes, expLabels, maxEdge, edges } = data;

      // Apply maturity filter to heatmap rows
      const minT = minMaturity / 365;
      let filteredExpLabels = expLabels, filteredHeatZ = heatZ, filteredHeatText = heatText;
      if (minT > 0 && data.sliceTValues) {
        const mask = data.sliceTValues.map(t => t >= minT);
        filteredExpLabels = expLabels.filter((_, i) => mask[i]);
        filteredHeatZ = heatZ.filter((_, i) => mask[i]);
        filteredHeatText = heatText.filter((_, i) => mask[i]);
      }

      Plotly.react(heatDiv, [{
        type: 'heatmap',
        x: sampledStrikes.map(s => pFmt.format(s)),
        y: filteredExpLabels,
        z: filteredHeatZ,
        text: filteredHeatText,
        hovertemplate: '%{text}<extra></extra>',
        colorscale: [
          [0, '#ff4444'],
          [0.35, '#cc2222'],
          [0.5, '#1a1a2e'],
          [0.65, '#118855'],
          [1, '#19d8a8'],
        ],
        zmin: -maxEdge, zmax: maxEdge,
        showscale: true,
        colorbar: {
          title: 'IV edge (vol pts)',
          titleside: 'right',
          thickness: 10,
          len: 0.8,
        },
      }], {
        ...darkLayout,
        uirevision: 'stable',
        margin: { l: 60, r: 50, b: 40, t: 6 },
        xaxis: { title: 'Strike', ...axisStyle, tickangle: -45 },
        yaxis: { title: '', ...axisStyle },
      }, { responsive: true, displayModeBar: false });

      // Table
      const filtered = edges
        .filter(e => e.T >= minT)
        .filter(e => e.absIvEdge >= edgeThreshold)
        .filter(e => {
          if (edgeSideFilter === 'buy') return e.ivEdge > 0;
          if (edgeSideFilter === 'sell') return e.ivEdge < 0;
          return true;
        })
        .sort((a, b) => b.absIvEdge - a.absIvEdge)
        .slice(0, 40);

      edgeTbody.innerHTML = '';
      for (const e of filtered) {
        const isBuy = e.ivEdge > 0;
        const edgeCls = isBuy ? 'edge-buy' : 'edge-sell';
        const strongCls = e.absIvEdge >= edgeThreshold * 2 ? ' edge-strong' : '';
        const actionable = (isBuy && e.buySignal) || (!isBuy && e.sellSignal);
        const rowCls = actionable ? (isBuy ? 'edge-actionable' : 'edge-actionable sell') : '';
        const signal = e.buySignal ? 'BUY' : (e.sellSignal ? 'SELL' : '-');
        const signalCls = e.buySignal ? 'edge-buy edge-strong' : (e.sellSignal ? 'edge-sell edge-strong' : '');

        const tr = document.createElement('tr');
        if (rowCls) tr.className = rowCls;
        tr.innerHTML =
          `<td>${e.expiryCode}</td>`
          + `<td style="text-align:right">${pFmt.format(e.strike)}</td>`
          + `<td>${e.isCall ? 'C' : 'P'}</td>`
          + `<td style="text-align:right">${e.marketIvPct.toFixed(1)}</td>`
          + `<td style="text-align:right">${e.modelIvPct.toFixed(1)}</td>`
          + `<td style="text-align:right" class="${edgeCls}${strongCls}">${e.ivEdge > 0 ? '+' : ''}${e.ivEdge.toFixed(2)}</td>`
          + `<td style="text-align:right">${isFinite(e.bidPrice) ? pFmt.format(e.bidPrice) : '-'}</td>`
          + `<td style="text-align:right">${isFinite(e.askPrice) ? pFmt.format(e.askPrice) : '-'}</td>`
          + `<td style="text-align:right">${pFmt.format(e.marketMid)}</td>`
          + `<td style="text-align:right">${pFmt.format(e.theoPrice)}</td>`
          + `<td style="text-align:right" class="${edgeCls}">${e.dollarEdge > 0 ? '+' : ''}${pFmt.format(e.dollarEdge)}</td>`
          + `<td class="${signalCls}">${signal}</td>`;
        edgeTbody.appendChild(tr);
      }
    }

    async function fetchFundingHistory() {
      try {
        const perpInstrument = currencyConfig.prefix + 'PERPETUAL';
        const endTs = Date.now(), startTs = endTs - 7 * 24 * 60 * 60 * 1000;
        const rows = await historicalDataService.getFundingRateHistory({
          instrument: perpInstrument,
          startTs,
          endTs,
          ttlMs: 12000,
        });
        if (rows) {
          fundingState.history = rows.map(r => ({ timestamp: r.timestamp, rate: r.interest_8h || 0 }));
          renderFunding();
        }
      } catch (e) { console.warn('[funding] fetch failed:', e); }
    }

    function renderFunding() {
      const p = panels.funding; if (!p || !p.chartDiv) return;
      if (p.fRate) p.fRate.textContent = isFinite(fundingState.currentRate) ? (fundingState.currentRate * 100).toFixed(4) + '%' : '--';
      if (p.fPerp) p.fPerp.textContent = isFinite(fundingState.perpPrice) ? pFmt.format(fundingState.perpPrice) : '--';
      if (p.fIndex) p.fIndex.textContent = isFinite(fundingState.indexPrice) ? pFmt.format(fundingState.indexPrice) : '--';
      if (p.activeTab === 'funding') {
        if (fundingState.history.length < 2) return;
        Plotly.react(p.chartDiv, [{
          type: 'scatter', mode: 'lines', name: '8h Funding Rate',
          x: fundingState.history.map(h => new Date(h.timestamp)), y: fundingState.history.map(h => h.rate * 100),
          line: { color: '#2fb2ff', width: 1.5 }, fill: 'tozeroy', fillcolor: 'rgba(47,178,255,0.1)',
        }], {
          ...darkLayout, uirevision: 'funding', margin: { l: 50, r: 8, b: 30, t: 6 },
          xaxis: { ...axisStyle, type: 'date' }, yaxis: { title: 'Rate (%)', ...axisStyle },
        }, { responsive: true, displayModeBar: false });
      } else if (p.activeTab === 'basis') {
        if (calibratedSlices.length === 0 || spotPrice <= 0) return;
        const labels = calibratedSlices.map(s => s.expiryLabel);
        const basis = calibratedSlices.map(s => s.forward - spotPrice);
        const basisPct = calibratedSlices.map(s => ((s.forward - spotPrice) / spotPrice) * 100);
        Plotly.react(p.chartDiv, [{
          type: 'bar', name: 'Basis ($)', x: labels, y: basis,
          marker: { color: basis.map(b => b >= 0 ? '#19d8a8' : '#ff7a7a') },
          text: basisPct.map(b => b.toFixed(2) + '%'), textposition: 'outside', textfont: { size: 9, color: '#8ea1b8' },
        }], {
          ...darkLayout, uirevision: 'basis', margin: { l: 50, r: 8, b: 30, t: 6 },
          xaxis: { ...axisStyle }, yaxis: { title: 'Basis ($)', ...axisStyle },
        }, { responsive: true, displayModeBar: false });
      } else if (p.activeTab === 'carry') {
        if (calibratedSlices.length === 0 || spotPrice <= 0) return;
        const dte = calibratedSlices.map(s => Math.round(s.T * 365));
        const carry = calibratedSlices.map(s => s.T > 0 ? ((s.forward / spotPrice - 1) / s.T) * 100 : 0);
        Plotly.react(p.chartDiv, [{
          type: 'scatter', mode: 'lines+markers', name: 'Annualized Carry',
          x: dte, y: carry, line: { color: '#ffb347', width: 2 }, marker: { size: 5 },
        }], {
          ...darkLayout, uirevision: 'carry', margin: { l: 50, r: 8, b: 30, t: 6 },
          xaxis: { title: 'DTE', ...axisStyle }, yaxis: { title: 'Carry (% ann.)', ...axisStyle },
        }, { responsive: true, displayModeBar: false });
      }
    }

    function fmtPct(value, digits = 2) {
      return Number.isFinite(value) ? (value * 100).toFixed(digits) + '%' : '--';
    }

    function fmtSignedMoney(value) {
      return Number.isFinite(value) ? (value >= 0 ? '+' : '') + '$' + pFmt.format(value) : '--';
    }

    function fmtYears(value) {
      return Number.isFinite(value) ? (value * 365).toFixed(1) + 'd' : '--';
    }

    function fmtCompactNumber(value) {
      return Number.isFinite(value)
        ? new Intl.NumberFormat('en-US', { notation: 'compact', maximumFractionDigits: 1 }).format(value)
        : '--';
    }

    function fmtBorosSpread(apr) {
      return Number.isFinite(apr) ? (apr * 10000).toFixed(1) + ' bp' : '--';
    }

    function fmtBorosDateTime(timestampMs) {
      return Number.isFinite(timestampMs)
        ? new Date(timestampMs).toLocaleString('en-GB', { hour12: false, timeZone: 'UTC' }) + ' UTC'
        : '--';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function currentBorosStatus() {
      const historical = borosHistoricalState(borosState.market.selectedAsset);
      if (borosState.market.viewMode === 'historical' && historical.error) return historical.error;
      return borosState.market.liveError || lastBorosResult?.error || 'Awaiting market data';

      };
      return palette[name] || '#8ea1b8';
    }
