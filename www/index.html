<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ferric Terminal</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dockview-core@4.3.1/dist/styles/dockview.css">
  <style>
    :root {
      --bg: #070a0f;
      --panel: #11161f;
      --border: #263241;
      --fg: #d8e0ea;
      --muted: #8ea1b8;
      --accent: #2fb2ff;
      --accent2: #19d8a8;
      --danger: #ff7a7a;
      --warn: #ffb347;
      --mono: "JetBrains Mono", "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      --sans: "IBM Plex Sans", "Segoe UI", Helvetica, Arial, sans-serif;
      --function-bar-h: 40px;
      --header-h: 44px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      color: var(--fg);
      font-family: var(--sans);
      background:
        radial-gradient(1000px 700px at 12% -20%, #15314f 0%, rgba(21,49,79,0) 60%),
        radial-gradient(900px 650px at 100% 0%, #0f2d25 0%, rgba(15,45,37,0) 58%),
        linear-gradient(180deg, #06080c 0%, #070a0f 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .function-bar {
      position: sticky;
      top: 0;
      z-index: 140;
      display: flex;
      align-items: center;
      gap: 10px;
      height: var(--function-bar-h);
      padding: 6px 14px;
      border-bottom: 1px solid rgba(47,178,255,0.2);
      background:
        linear-gradient(90deg, rgba(9,14,22,0.98) 0%, rgba(11,18,29,0.96) 45%, rgba(8,13,21,0.98) 100%);
      font-family: var(--mono);
      backdrop-filter: blur(10px);
    }
    .function-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .function-input-wrap {
      position: relative;
      flex: 1;
      max-width: 540px;
    }
    .function-input {
      width: 100%;
      height: 28px;
      padding: 0 12px;
      border: 1px solid rgba(47,178,255,0.22);
      border-radius: 4px;
      background: rgba(7,11,18,0.96);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
    }
    .function-input::placeholder { color: rgba(142,161,184,0.72); }
    .function-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(47,178,255,0.18);
    }
    .function-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      display: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(11,17,27,0.98);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      overflow: hidden;
    }
    .function-dropdown.open { display: block; }
    .function-option {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border: 0;
      border-top: 1px solid rgba(142,161,184,0.08);
      background: transparent;
      color: var(--fg);
      font-family: var(--mono);
      font-size: 11px;
      text-align: left;
      cursor: pointer;
    }
    .function-option:first-child { border-top: 0; }
    .function-option:hover,
    .function-option.active {
      background: rgba(47,178,255,0.12);
    }
    .function-option-code {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .function-option-name {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .function-current {
      margin-left: auto;
      padding: 5px 10px;
      border: 1px solid rgba(25,216,168,0.25);
      border-radius: 999px;
      color: var(--accent2);
      background: rgba(25,216,168,0.08);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(17,22,31,0.85);
      backdrop-filter: blur(8px);
      position: sticky;
      top: var(--function-bar-h);
      z-index: 100;
    }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .header-spot {
      font-family: var(--mono);
      font-size: 16px;
      color: var(--accent2);
      min-width: 110px;
    }
    .sparkline-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
    }
    .sparkline-wrap svg { display: block; }
    .status-pill {
      font-size: 11px;
      font-family: var(--mono);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .status-pill.connected { color: var(--accent2); border-color: var(--accent2); }
    .status-pill.connecting { color: var(--warn); border-color: var(--warn); }
    .status-pill.disconnected { color: var(--danger); border-color: var(--danger); }

    /* ---- Dockview panel content ---- */
    .dock-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      padding: 6px 8px;
      background: color-mix(in srgb, var(--panel) 92%, black);
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .panel-title-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .panel-info-btn {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(142,161,184,0.45);
      background: rgba(13,20,29,0.75);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 120ms linear, color 120ms linear, background 120ms linear;
    }
    .panel-info-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(47,178,255,0.12);
    }
    .panel-info-btn:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 1px;
    }
    .chart-area {
      flex: 1;
      min-height: 0;
    }

    .boros-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .boros-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .boros-field label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .boros-field input {
      width: 100%;
      height: 28px;
      padding: 0 8px;
      border: 1px solid rgba(142,161,184,0.18);
      border-radius: 4px;
      background: #0d141d;
      color: var(--fg);
      font-family: var(--mono);
      font-size: 11px;
    }
    .boros-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .boros-toolbar {
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .boros-toggle {
      display: inline-flex;
      gap: 4px;
    }
    .boros-note {
      color: var(--muted);
      font-size: 10px;
      font-family: var(--mono);
    }
    .boros-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }
    .boros-summary-card {
      padding: 8px;
      border: 1px solid rgba(142,161,184,0.14);
      border-radius: 6px;
      background: rgba(9,14,22,0.72);
    }
    .boros-summary-card .k {
      display: block;
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .boros-summary-card .v {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--fg);
    }
    .boros-summary-card .v.spot {
      color: var(--accent2);
      font-size: 15px;
    }
    .boros-table td,
    .boros-table th {
      padding: 4px 0;
      white-space: nowrap;
    }
    .boros-table td:last-child,
    .boros-table th:last-child {
      text-align: right;
    }
    .boros-table-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      border: 1px solid rgba(142,161,184,0.15);
      border-radius: 6px;
      background: rgba(7,10,15,0.55);
      padding: 0 4px;
    }
    .boros-table-wrap th {
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--panel) 92%, black);
      z-index: 1;
    }
    .boros-market-row { cursor: pointer; }
    .boros-market-row:hover { background: rgba(47,178,255,0.08); }
    .boros-market-row.selected { background: rgba(47,178,255,0.16); }
    .boros-chart-note {
      margin-bottom: 6px;
    }

    /* ---- Toolbar ---- */
    .toolbar {
      display: flex;
      gap: 4px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }
    select, .tab-btn {
      background: #0d141d;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* ---- Metrics table ---- */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 3px 8px;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .metrics-grid .k { color: var(--muted); }
    .metrics-grid .v { text-align: right; font-family: var(--mono); }
    .tbl-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    th, td {
      padding: 2px 0;
      border-bottom: 1px solid rgba(142,161,184,0.12);
      text-align: right;
      font-family: var(--mono);
    }
    th:first-child, td:first-child {
      text-align: left;
      font-family: var(--sans);
      color: var(--muted);
    }
    th { color: var(--muted); font-weight: 500; }

    /* ---- Mispricing Scanner ---- */
    .scanner-wrap {
      display: flex;
      gap: 6px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .scanner-heatmap {
      flex: 1.2;
      min-height: 0;
    }
    .scanner-table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    .scanner-table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
    }
    .scanner-table-wrap th {
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 1;
    }
    .scanner-table-wrap td { white-space: nowrap; }
    .edge-buy { color: var(--accent2); }
    .edge-sell { color: var(--danger); }
    .edge-strong { font-weight: 700; }
    .edge-actionable { background: rgba(25,216,168,0.08); }
    .edge-actionable.sell { background: rgba(255,122,122,0.08); }

    /* ---- Trade Flow Tape ---- */
    .tape-wrap { flex: 1; overflow: auto; min-height: 0; }
    .tape-wrap table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .tape-wrap th { position: sticky; top: 0; background: var(--panel); z-index: 1; }
    .tape-wrap td { white-space: nowrap; }
    .trade-buy { color: var(--accent2); }
    .trade-sell { color: var(--danger); }
    .trade-large { font-weight: 700; }
    .flow-metrics {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px 6px; font-size: 10px; margin-bottom: 4px; flex-shrink: 0;
    }
    .flow-metrics .k { color: var(--muted); }
    .flow-metrics .v { font-family: var(--mono); text-align: right; }

    /* ---- Historical Panels ---- */
    .history-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .history-toolbar select,
    .history-toolbar .tab-btn {
      font-size: 10px;
      padding: 2px 6px;
    }
    .history-toolbar .tab-btn.active {
      background: rgba(47,178,255,0.22);
      color: var(--accent);
      border-color: rgba(47,178,255,0.5);
    }
    .history-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 2px 8px;
      font-size: 10px;
      margin-bottom: 4px;
      flex-shrink: 0;
    }
    .history-stats .k { color: var(--muted); }
    .history-stats .v { text-align: right; font-family: var(--mono); }
    .history-table-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      border: 1px solid rgba(142,161,184,0.15);
      border-radius: 6px;
      background: rgba(7,10,15,0.55);
      padding: 0 4px;
    }
    .history-table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
    }
    .history-table-wrap th {
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--panel) 92%, black);
      z-index: 1;
    }
    .history-table-wrap td,
    .history-table-wrap th {
      white-space: nowrap;
      font-family: var(--mono);
      padding: 3px 0;
      border-bottom: 1px solid rgba(142,161,184,0.12);
      text-align: right;
    }
    .history-table-wrap td:first-child,
    .history-table-wrap th:first-child {
      text-align: left;
      font-family: var(--sans);
    }
    .hist-buy { color: #22c55e; }
    .hist-sell { color: #ef4444; }
    .history-chart-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      border: 1px solid rgba(142,161,184,0.18);
      border-radius: 6px;
      background: #070a0f;
      overflow: hidden;
    }
    .history-chart {
      display: block;
      width: 100%;
      height: 100%;
    }
    .history-tooltip {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      padding: 5px 7px;
      border-radius: 4px;
      border: 1px solid rgba(142,161,184,0.35);
      background: rgba(7,10,15,0.94);
      color: var(--fg);
      font-size: 10px;
      font-family: var(--mono);
      white-space: nowrap;
      display: none;
    }
    .history-empty {
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      font-family: var(--mono);
    }

    /* ---- Strategy Builder ---- */
    .strategy-split { display: flex; gap: 6px; flex: 1; min-height: 0; overflow: hidden; }
    .strategy-legs { flex: 0 0 40%; overflow: auto; min-height: 0; display: flex; flex-direction: column; }
    .strategy-legs table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .strategy-legs th { position: sticky; top: 0; background: var(--panel); z-index: 1; }
    .strategy-chart { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .strategy-chart .chart-area { flex: 1; min-height: 0; }
    .slider-row { display: flex; gap: 8px; align-items: center; font-size: 10px; color: var(--muted); padding: 2px 0; flex-shrink: 0; }
    .slider-row input[type="range"] { flex: 1; accent-color: var(--accent); height: 14px; }
    .slider-row .slider-val { font-family: var(--mono); min-width: 50px; text-align: right; }
    .net-greeks {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 2px 6px; font-size: 10px; margin: 4px 0; padding: 3px 4px;
      background: rgba(47,178,255,0.05); border-radius: 4px;
    }
    .net-greeks .k { color: var(--muted); }
    .net-greeks .v { font-family: var(--mono); text-align: right; }
    .template-btns { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 4px; }
    .template-btns .tab-btn { font-size: 9px; padding: 1px 5px; }

    /* ---- Vol Cone ---- */
    .volcone-metrics {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 2px 8px; font-size: 10px; margin-bottom: 4px; flex-shrink: 0;
    }
    .volcone-metrics .k { color: var(--muted); }
    .volcone-metrics .v { font-family: var(--mono); text-align: right; }

    /* ---- Funding ---- */
    .funding-metrics {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px 6px; font-size: 10px; margin-bottom: 4px; flex-shrink: 0;
    }
    .funding-metrics .k { color: var(--muted); }
    .funding-metrics .v { font-family: var(--mono); text-align: right; }

    /* ---- OTC Pricer ---- */
    .pricer-wrap {
      display: grid;
      grid-template-columns: minmax(270px, 0.95fr) minmax(320px, 1.35fr);
      gap: 8px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .pricer-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }
    .pricer-card {
      border: 1px solid rgba(142,161,184,0.2);
      border-radius: 6px;
      padding: 6px;
      background: rgba(0,0,0,0.2);
      font-size: 10px;
    }
    .pricer-card h4 {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 5px 0;
    }
    .pricer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px 8px;
      align-items: center;
    }
    .pricer-grid label {
      color: var(--muted);
      text-transform: lowercase;
    }
    .pricer-grid select,
    .pricer-grid input[type="number"],
    .pricer-grid input[type="text"] {
      width: 100%;
      background: #0d141d;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 10px;
      font-family: var(--mono);
    }
    .pricer-radio-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .pricer-radio-row .tab-btn {
      font-size: 10px;
      padding: 2px 7px;
    }
    .pricer-kv {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(120px, auto);
      gap: 3px 8px;
      font-size: 10px;
    }
    .pricer-kv .k { color: var(--muted); text-transform: lowercase; }
    .pricer-kv .v { text-align: right; font-family: var(--mono); }
    .pricer-table-wrap {
      max-height: 260px;
      overflow: auto;
      border: 1px solid rgba(142,161,184,0.12);
      border-radius: 4px;
      padding: 0 4px;
    }
    .pricer-table-wrap th {
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--panel) 92%, black);
      z-index: 1;
    }
    .pricer-snapshots {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow: auto;
      font-size: 10px;
      font-family: var(--mono);
    }
    .pricer-snapshots .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid rgba(142,161,184,0.12);
      padding-bottom: 2px;
    }
    .pricer-msg {
      min-height: 12px;
      color: var(--muted);
      font-size: 10px;
    }
    @media (max-width: 1080px) {
      .pricer-wrap {
        grid-template-columns: 1fr;
      }
    }

    /* ---- DSL Market ---- */
    .dsl-market-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }
    .dsl-market-section {
      border: 1px solid rgba(142,161,184,0.18);
      border-radius: 6px;
      padding: 7px;
      background: color-mix(in srgb, var(--panel) 88%, black);
    }
    .dsl-market-section-title {
      margin: 0 0 6px 0;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dsl-market-assets {
      display: grid;
      gap: 6px;
    }
    .dsl-market-asset-row {
      display: grid;
      grid-template-columns: minmax(64px, auto) repeat(3, minmax(0, 1fr));
      gap: 6px;
      align-items: center;
    }
    .dsl-market-asset-name {
      color: var(--fg);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;

  <script type="module">
    import { DockviewComponent } from 'dockview-core';

    // =====================================================================
    //  Web Worker (owns WASM instance, all computation off main thread)
    // =====================================================================
    let workerReady = false;
    const computeWorker = new Worker('./worker.js', { type: 'module' });
    computeWorker.onmessage = handleWorkerMessage;

    const workerReadyPromise = new Promise(resolve => {
      const orig = computeWorker.onmessage;
      computeWorker.onmessage = (e) => {
        if (e.data.type === 'ready') { workerReady = true; resolve(); }
        orig(e);
      };
    });
    const functionInput = document.getElementById('function-input');
    const functionDropdown = document.getElementById('function-dropdown');
    const functionCurrent = document.getElementById('function-current');
    let functionHoverIndex = 0;

    function functionEntries(query = '') {
      const needle = String(query || '').trim().toUpperCase();
      const entries = Object.entries(FUNCTION_DEFS).map(([code, meta]) => ({ code, ...meta }));
      if (!needle) return entries;
      return entries.filter((entry) =>
        entry.code.includes(needle) || entry.title.toUpperCase().includes(needle)
      );
    }

    function renderFunctionDropdown(query = '') {
      const entries = functionEntries(query);
      functionDropdown.innerHTML = '';
      if (entries.length === 0) {
        functionDropdown.classList.remove('open');
        return entries;
      }
      functionHoverIndex = Math.max(0, Math.min(functionHoverIndex, entries.length - 1));
      entries.forEach((entry, idx) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'function-option' + (idx === functionHoverIndex ? ' active' : '');
        btn.innerHTML = `<span class="function-option-code">${entry.code}</span><span class="function-option-name">${entry.title}</span>`;
        btn.addEventListener('mousedown', (evt) => {
          evt.preventDefault();
          loadFunction(entry.code);
        });
        functionDropdown.appendChild(btn);
      });
      functionDropdown.classList.add('open');
      return entries;
    }

    function syncFunctionBarFromView(viewName) {
      const code = VIEW_TO_FUNCTION[viewName] || activeFunction;
      activeFunction = code;
      functionInput.value = code;
      functionCurrent.textContent = code;
    }

    function loadFunction(code) {
      const key = String(code || '').trim().toUpperCase();
      const def = FUNCTION_DEFS[key];
      if (!def) return;
      functionDropdown.classList.remove('open');
      syncFunctionBarFromView(def.view);
      switchView(def.view);
      if (key === 'BOROS') {
        fetchBorosFundingData(false);
        scheduleBorosPolling(true);
      } else {
        scheduleBorosPolling(false);
      }
    }

    functionInput.addEventListener('focus', () => {
      functionHoverIndex = 0;
      renderFunctionDropdown(functionInput.value);
    });
    functionInput.addEventListener('input', () => {
      functionHoverIndex = 0;
      renderFunctionDropdown(functionInput.value);
    });
    functionInput.addEventListener('keydown', (e) => {
      const entries = functionEntries(functionInput.value);
      if (e.key === 'ArrowDown' && entries.length > 0) {
        e.preventDefault();
        functionHoverIndex = (functionHoverIndex + 1) % entries.length;
        renderFunctionDropdown(functionInput.value);
        return;
      }
      if (e.key === 'ArrowUp' && entries.length > 0) {
        e.preventDefault();
        functionHoverIndex = (functionHoverIndex - 1 + entries.length) % entries.length;
        renderFunctionDropdown(functionInput.value);
        return;
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        const choice = entries[functionHoverIndex] || entries[0];
        if (choice) loadFunction(choice.code);
        return;
      }
      if (e.key === 'Escape') {
        functionDropdown.classList.remove('open');
      }
    });
    functionInput.addEventListener('blur', () => {
      setTimeout(() => functionDropdown.classList.remove('open'), 120);
    });

    // =====================================================================
    //  IndexedDB Historical Database Layer
    // =====================================================================
    class VolTerminalDb {
      constructor() { this.db = null; this._opening = null; }
      open() {
        if (this._opening) return this._opening;
        this._opening = new Promise((resolve, reject) => {
          const req = indexedDB.open('vol-terminal-db', 1);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            for (const name of ['vol_snapshots','atm_iv_series','spot_series','realized_vol_series','trade_flow_agg','funding_basis']) {
              if (!db.objectStoreNames.contains(name))
                db.createObjectStore(name, { keyPath: ['currency','timestamp'] });
            }
          };
          req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
          req.onerror = (e) => { console.error('[idb] open failed:', e); reject(e); };
        });
        return this._opening;
      }
      put(storeName, record) {
        if (!this.db) return;
        try { const tx = this.db.transaction(storeName, 'readwrite'); tx.objectStore(storeName).put(record); } catch (e) { /* fire and forget */ }
      }
      async getRange(storeName, currency, startTs, endTs) {
        if (!this.db) return [];
        return new Promise((resolve) => {
          try {
            const tx = this.db.transaction(storeName, 'readonly');
            const req = tx.objectStore(storeName).getAll(IDBKeyRange.bound([currency, startTs], [currency, endTs]));
            req.onsuccess = () => resolve(req.result || []);
            req.onerror = () => resolve([]);
          } catch (e) { resolve([]); }
        });
      }
      async pruneOlderThan(storeName, maxAgeMs) {
        if (!this.db) return;
        const cutoff = Date.now() - maxAgeMs;
        try {
          const tx = this.db.transaction(storeName, 'readwrite');
          const req = tx.objectStore(storeName).openCursor();
          req.onsuccess = (e) => {
            const cursor = e.target.result;
            if (!cursor) return;
            if (cursor.value.timestamp < cutoff) cursor.delete();
            cursor.continue();
          };
        } catch (e) { /* ignore */ }
      }
      async pruneAll() {
        const MS30D = 30 * 24 * 60 * 60 * 1000;
        for (const s of ['vol_snapshots','atm_iv_series','spot_series','realized_vol_series','trade_flow_agg','funding_basis'])
          await this.pruneOlderThan(s, MS30D);
      }
    }
    const terminalDb = new VolTerminalDb();

    // =====================================================================
    //  Plotly common layout helpers
    // =====================================================================
    const darkLayout = {
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      font: { color: '#d8e0ea', family: 'IBM Plex Sans, sans-serif', size: 10 },
    };
    const axisStyle = { gridcolor: '#1e2d3d', zerolinecolor: '#1e2d3d', color: '#8ea1b8' };
    const pFmt = new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 });
    const pFmt1 = new Intl.NumberFormat('en-US', { maximumFractionDigits: 1 });

    // =====================================================================
    //  Deribit protocol helpers
    // =====================================================================
    const MONTHS = { JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12 };

    function parseDeribitExpiry(code) {
      if (code.length !== 7) return null;
      const day = parseInt(code.slice(0, 2), 10);
      const mon = MONTHS[code.slice(2, 5)];
      const yr = 2000 + parseInt(code.slice(5, 7), 10);
      if (!mon || isNaN(day) || isNaN(yr)) return null;
      return new Date(Date.UTC(yr, mon - 1, day, 8, 0, 0));
    }

    function parseInstrumentName(name) {
      const p = name.split('-');
      if (p.length !== 4) return null;
      const expDate = parseDeribitExpiry(p[1]);
      if (!expDate) return null;
      const strike = parseFloat(p[2]);
      if (isNaN(strike)) return null;
      const isCall = p[3] === 'C';
      if (p[3] !== 'C' && p[3] !== 'P') return null;
      return { expiry: p[1], expiryDate: expDate, strike, isCall };
    }

    function normalizeIv(raw) {
      if (!isFinite(raw) || raw <= 0) return NaN;
      return raw > 3.0 ? raw / 100.0 : raw;
    }

    class HistoricalDataService {
      constructor(baseUrl) {
        this.baseUrl = baseUrl;
        this.cache = new Map();
      }
      buildUrl(endpoint, params = {}) {
        const qp = new URLSearchParams();
        for (const [k, v] of Object.entries(params)) {
          if (v === undefined || v === null || v === '') continue;
          qp.set(k, String(v));
        }
        return `${this.baseUrl}/${endpoint}?${qp.toString()}`;
      }
      async fetchJson(endpoint, params = {}, ttlMs = 0) {
        const cacheKey = endpoint + '::' + JSON.stringify(params);
        if (ttlMs > 0) {
          const hit = this.cache.get(cacheKey);
          if (hit && Date.now() - hit.ts < ttlMs) return hit.value;
        }
        const resp = await fetch(this.buildUrl(endpoint, params));
        if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${endpoint}`);
        const json = await resp.json();
        if (json.error) throw new Error(json.error.message || `Deribit error ${endpoint}`);
        if (ttlMs > 0) this.cache.set(cacheKey, { ts: Date.now(), value: json });
        return json;
      }
      async getTradingviewChartData({ instrument, startTs, endTs, resolution, ttlMs = 0 }) {
        const json = await this.fetchJson('get_tradingview_chart_data', {
          instrument_name: instrument,
          start_timestamp: startTs,
          end_timestamp: endTs,
          resolution,
        }, ttlMs);
        return json.result || null;
      }
      async getHistoricalVolatility({ currency, ttlMs = 0 }) {
        const json = await this.fetchJson('get_historical_volatility', { currency }, ttlMs);
        return Array.isArray(json.result) ? json.result : [];
      }
      async getVolatilityIndexData({ currency, startTs, endTs, resolution, ttlMs = 0 }) {
        const json = await this.fetchJson('get_volatility_index_data', {
          currency,
          start_timestamp: startTs,
          end_timestamp: endTs,
          resolution,
        }, ttlMs);
        const result = json.result || {};
        return Array.isArray(result.data) ? result.data : [];
      }
      async getFundingRateHistory({ instrument, startTs, endTs, ttlMs = 0 }) {
        const json = await this.fetchJson('get_funding_rate_history', {
          instrument_name: instrument,
          start_timestamp: startTs,
          end_timestamp: endTs,
        }, ttlMs);
        return Array.isArray(json.result) ? json.result : [];
      }
      async getLastTradesByCurrencyAndTime({
        currency,
        kind = 'option',
        startTs,
        endTs,
        count = 1000,
        sorting = 'desc',
        maxPages = 3,
        ttlMs = 0,
      }) {
        let pageEndTs = endTs;
        const out = [];
        for (let page = 0; page < maxPages; page++) {
          const json = await this.fetchJson('get_last_trades_by_currency_and_time', {
            currency,
            kind,
            start_timestamp: startTs,
            end_timestamp: pageEndTs,
            count,
            sorting,
          }, page === 0 ? ttlMs : 0);
          const res = json.result || {};
          const trades = Array.isArray(res.trades) ? res.trades : [];
          if (trades.length === 0) break;
          out.push(...trades);
          if (!res.has_more) break;
          const oldestTs = Math.min(...trades.map((t) => Number(t.timestamp)).filter((n) => Number.isFinite(n)));
          if (!Number.isFinite(oldestTs) || oldestTs <= startTs) break;
          pageEndTs = oldestTs - 1;
        }
        const dedupe = new Map();
        for (const trade of out) {
          const key = `${trade.trade_id || ''}|${trade.timestamp || ''}|${trade.instrument_name || ''}`;
          dedupe.set(key, trade);
        }
        return [...dedupe.values()].sort((a, b) => Number(b.timestamp || 0) - Number(a.timestamp || 0));
      }
    }

    function isoDateValue(timestampMs) {
      if (!Number.isFinite(timestampMs)) return '';
      return new Date(timestampMs).toISOString().slice(0, 10);
    }

    function dateInputToMs(value, fallback = Date.now()) {
      if (!value) return fallback;
      const ts = Date.parse(value + 'T00:00:00Z');
      return Number.isFinite(ts) ? ts : fallback;
    }

    function titleCaseToken(value) {
      return value ? value.charAt(0).toUpperCase() + value.slice(1).toLowerCase() : '';
    }

    function formatBorosVenue(value) {
      const upper = String(value || '').trim().toUpperCase();
      if (!upper) return 'Unknown';
      if (BOROS_VENUE_LABELS[upper]) return BOROS_VENUE_LABELS[upper];
      return upper.split(/[^A-Z0-9]+/).filter(Boolean).map(titleCaseToken).join(' ');
    }

    function pickNumericField(obj, keys) {
      for (const key of keys) {
        const value = Number(obj?.[key]);
        if (Number.isFinite(value)) return value;
      }
      return NaN;
    }

    function inferBorosPair(imData) {
      const symbol = String(imData?.symbol || '').trim();
      const symbolParts = symbol.split('-').filter(Boolean);
      if (symbolParts.length >= 2) return symbolParts[1].toUpperCase();
      const nameTokens = String(imData?.name || '').trim().split(/\s+/).filter(Boolean);
      if (nameTokens.length >= 2) return nameTokens[1].toUpperCase();
      return '';
    }

    function inferBorosAsset(pair) {
      const upper = String(pair || '').toUpperCase();
      for (const suffix of BOROS_QUOTE_SUFFIXES) {
        if (upper.endsWith(suffix) && upper.length > suffix.length) {
          return upper.slice(0, -suffix.length);
        }
      }
      return upper.replace(/[^A-Z0-9]/g, '');
    }

    function formatBorosExpiry(timestampMs) {
      if (!Number.isFinite(timestampMs)) return '--';
      return new Date(timestampMs).toLocaleDateString('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        timeZone: 'UTC',
      });
    }

    function uniqueBorosAssets(rows) {
      return [...new Set((rows || []).map((row) => row.asset).filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function borosHistoricalState(asset) {
      const key = String(asset || '').toUpperCase();
      if (!borosState.market.historicalByAsset[key]) {
        borosState.market.historicalByAsset[key] = {
          binanceSnapshots: [],
          bybitSnapshots: [],
          lastUpdated: 0,
          error: '',
        };
      }
      return borosState.market.historicalByAsset[key];
    }

    function normalizeBorosApiMarket(row) {
      const imData = row?.imData || {};
      const data = row?.data || {};
      const pair = inferBorosPair(imData);
      const asset = inferBorosAsset(pair);
      const venueKey = String(imData.symbol || '').split('-')[0] || String(imData.name || '').split(/\s+/)[0];
      const expiryTimestampMs = Number(imData.maturity) * 1000;
      const markApr = Number(data.markApr);
      const midApr = Number.isFinite(Number(data.midApr)) ? Number(data.midApr) : markApr;
      if (!asset || !Number.isFinite(expiryTimestampMs) || !Number.isFinite(markApr) && !Number.isFinite(midApr)) return null;
      const marketLabel = String(imData.name || imData.symbol || '').trim();
      const symbol = String(imData.symbol || '').trim();
      return {
        marketKey: symbol || marketLabel,
        marketLabel: marketLabel || symbol,
        symbol,
        venue: formatBorosVenue(venueKey),
        asset,
        pair,
        expiryTimestampMs,
        expiryLabel: formatBorosExpiry(expiryTimestampMs),
        markApr,
        floatingApr: Number(data.floatingApr),
        midApr,
        bestBid: Number(data.bestBid),
        bestAsk: Number(data.bestAsk),
        oi: pickNumericField(data, ['oi', 'openInterest', 'openInterestUsd', 'oiUsd', 'openInterestNotional']),
        volume24h: pickNumericField(data, ['volume24h', 'turnover24h', 'volumeUsd24h', 'tradedVolume24h']),
      };
    }

    function extractBorosMarketRows(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload?.results)) return payload.results;
      if (Array.isArray(payload?.result)) return payload.result;
      if (Array.isArray(payload?.data)) return payload.data;
      if (Array.isArray(payload?.markets)) return payload.markets;
      if (Array.isArray(payload?.result?.markets)) return payload.result.markets;
      return [];
    }

    function borosLiveMarketSort(a, b) {
      return a.asset.localeCompare(b.asset)
        || a.venue.localeCompare(b.venue)
        || a.expiryTimestampMs - b.expiryTimestampMs
        || a.marketLabel.localeCompare(b.marketLabel);
    }

    function pickDefaultBorosMarket(asset) {
      return borosState.market.liveMarkets
        .filter((row) => row.asset === asset)
        .sort((a, b) => a.expiryTimestampMs - b.expiryTimestampMs || a.venue.localeCompare(b.venue))[0] || null;
    }

    function getSelectedBorosMarket() {
      const selected = borosState.market.liveMarkets.find((row) => row.marketKey === borosState.market.selectedMarketKey);
      if (selected) return selected;
      return pickDefaultBorosMarket(borosState.market.selectedAsset);
    }

    function updateBorosDefaults() {
      const today = Date.now();
      if (!borosState.pricer.entryDate) borosState.pricer.entryDate = isoDateValue(today);
      if (!borosState.pricer.maturityDate) borosState.pricer.maturityDate = isoDateValue(today + 30 * MS_PER_DAY);
    }

    function syncBorosInputsFromMarket(market, force = false) {
      if (!market) return;
      updateBorosDefaults();
      if (force || borosState.pricer.lastSyncedMarketKey !== market.marketKey) {
        const fixedApr = Number.isFinite(market.markApr) ? market.markApr : market.midApr;
        if (Number.isFinite(fixedApr)) borosState.pricer.fixedRatePct = fixedApr * 100;
        borosState.pricer.maturityDate = isoDateValue(market.expiryTimestampMs);
        borosState.pricer.lastSyncedMarketKey = market.marketKey;
      }
      if (force || borosState.margin.lastSyncedMarketKey !== market.marketKey) {
        if (Number.isFinite(market.floatingApr)) borosState.margin.entryRatePct = market.floatingApr * 100;
        borosState.margin.lastSyncedMarketKey = market.marketKey;
      }
    }

    function ensureBorosSelections(forceSync = false) {
      const assets = uniqueBorosAssets(borosState.market.liveMarkets);
      borosState.market.assets = assets;
      if (assets.length === 0) {
        borosState.market.selectedAsset = '';
        borosState.market.selectedMarketKey = '';
        return null;
      }
      if (!assets.includes(borosState.market.selectedAsset)) {
        borosState.market.selectedAsset = assets[0];
        forceSync = true;
      }
      let selected = borosState.market.liveMarkets.find((row) => row.marketKey === borosState.market.selectedMarketKey);
      if (!selected || selected.asset !== borosState.market.selectedAsset) {
        selected = pickDefaultBorosMarket(borosState.market.selectedAsset);
        borosState.market.selectedMarketKey = selected?.marketKey || '';
        forceSync = true;
      }
      syncBorosInputsFromMarket(selected, forceSync);
      return selected;
    }

    function setBorosSelectedAsset(asset) {
      const nextAsset = String(asset || '').toUpperCase();
      if (!nextAsset) return;
      borosState.market.selectedAsset = nextAsset;
      borosState.market.selectedMarketKey = '';

    function selectBorosMarketByKey(marketKey) {

    function setBorosViewMode(mode) {

      if (borosState.market.viewMode === nextMode) return;

    function borosPayload() {
      updateBorosDefaults();

    function triggerBorosCompute(reason = 'ui') {
      if (!workerReady) return;
      computeWorker.postMessage({
        type: 'boros-compute',

    async function fetchBorosHistoricalData(asset, force = false) {
      const assetKey = String(asset || borosState.market.selectedAsset || '').toUpperCase();
      if (!assetKey) return;
      const state = borosHistoricalState(assetKey);
      const ageMs = Date.now() - state.lastUpdated;
      if (!force && state.lastUpdated && ageMs < BOROS_CACHE_TTL_MS) {
        if (assetKey === borosState.market.selectedAsset && borosState.market.viewMode === 'historical') {
          triggerBorosCompute('history-cache');
        }
        return;
      }
      if (borosHistoricalFetches.has(assetKey)) return;
      borosHistoricalFetches.add(assetKey);
      try {
        const symbol = `${assetKey}USDT`;
        const [binanceResp, bybitResp] = await Promise.all([
          fetch(`https://fapi.binance.com/fapi/v1/fundingRate?symbol=${symbol}&limit=${BOROS_HISTORY_LIMIT}`, { cache: 'no-store' }),
          fetch(`https://api.bybit.com/v5/market/funding/history?category=linear&symbol=${symbol}&limit=${BOROS_HISTORY_LIMIT}`, { cache: 'no-store' }),
        ]);
        if (!binanceResp.ok) throw new Error(`Binance funding fetch failed (${binanceResp.status})`);
        if (!bybitResp.ok) throw new Error(`Bybit funding fetch failed (${bybitResp.status})`);
        const [binanceJson, bybitJson] = await Promise.all([binanceResp.json(), bybitResp.json()]);
        const binanceRows = Array.isArray(binanceJson) ? binanceJson : [];
        const bybitRows = Array.isArray(bybitJson?.result?.list) ? bybitJson.result.list : [];
        state.binanceSnapshots = binanceRows.map((row) => ({
          venue: 'Binance',
          asset: symbol,
          rate: Number(row.fundingRate),
          timestamp_ms: Number(row.fundingTime),
        })).filter((row) => Number.isFinite(row.rate) && Number.isFinite(row.timestamp_ms))
          .sort((a, b) => a.timestamp_ms - b.timestamp_ms);
        state.bybitSnapshots = bybitRows.map((row) => ({
          venue: 'Bybit',
          asset: symbol,
          rate: Number(row.fundingRate),
          timestamp_ms: Number(row.fundingRateTimestamp),
        })).filter((row) => Number.isFinite(row.rate) && Number.isFinite(row.timestamp_ms))
          .sort((a, b) => a.timestamp_ms - b.timestamp_ms);
        state.error = '';
        state.lastUpdated = Date.now();
      } catch (e) {
        state.error = e?.message || String(e);
      } finally {
        borosHistoricalFetches.delete(assetKey);
        if (assetKey === borosState.market.selectedAsset) {
          renderBorosPanels();
          if (borosState.market.viewMode === 'historical') triggerBorosCompute('history');
        }
      }
    }

    async function fetchBorosFundingData(force = false) {
      const ageMs = Date.now() - borosState.market.liveLastUpdated;
      if (!force && borosState.market.liveLastUpdated && ageMs < BOROS_CACHE_TTL_MS) {
        ensureBorosSelections(false);
        renderBorosPanels();
        triggerBorosCompute('cache');
        if (borosState.market.viewMode === 'historical' && borosState.market.selectedAsset) {
          fetchBorosHistoricalData(borosState.market.selectedAsset, false);
        }
        return;
      }
      if (borosFetchInFlight) return;
      borosFetchInFlight = true;
      try {
        const resp = await fetch(BOROS_API_URL, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`Boros markets fetch failed (${resp.status})`);
        const json = await resp.json();
        const liveMarkets = extractBorosMarketRows(json)
          .map(normalizeBorosApiMarket)
          .filter(Boolean)
          .sort(borosLiveMarketSort);
        if (liveMarkets.length === 0) throw new Error('No active Boros markets returned');
        borosState.market.liveMarkets = liveMarkets;
        borosState.market.liveLastUpdated = Date.now();
        borosState.market.liveError = '';
        ensureBorosSelections(false);
        renderBorosPanels();
        triggerBorosCompute('market');
        if (borosState.market.viewMode === 'historical' && borosState.market.selectedAsset) {
          fetchBorosHistoricalData(borosState.market.selectedAsset, force);
        }
      } catch (e) {
        borosState.market.liveError = e?.message || String(e);
        lastBorosResult = { error: borosState.market.liveError };
        renderBorosPanels();
      } finally {
        borosFetchInFlight = false;
      }
    }

    function scheduleBorosPolling(enabled) {
      if (borosPollTimer) {
        clearInterval(borosPollTimer);
        borosPollTimer = null;
      }
      if (!enabled) return;
      borosPollTimer = setInterval(() => {
        fetchBorosFundingData(false);
        if (borosState.market.viewMode === 'historical' && borosState.market.selectedAsset) {
          fetchBorosHistoricalData(borosState.market.selectedAsset, false);
        }
      }, BOROS_CACHE_TTL_MS);
    }


    // =====================================================================
    //  Surface Config State
    // =====================================================================
    const SURFACE_CONFIG_KEY = 'vol-terminal-surface-config-v1';
    const SURFACE_PARAM_KEYS = {
      svi: ['a', 'b', 'rho', 'm', 'sigma'],
      sabr: ['alpha', 'beta', 'rho', 'nu'],

    function sanitizeSurfaceConfig(raw, asset, model) {
      const cfg = defaultSurfaceConfig(asset, model);
      if (!raw || typeof raw !== 'object') return cfg;
      if (raw.mode === 'calibrated' || raw.mode === 'manual' || raw.mode === 'hybrid') cfg.mode = raw.mode;
      if (raw.params && typeof raw.params === 'object') {
        if (raw.params.smilePreset === 'neutral' || raw.params.smilePreset === 'conservative' || raw.params.smilePreset === 'aggressive') {
          cfg.params.smilePreset = raw.params.smilePreset;
        }
        if (raw.params.common && typeof raw.params.common === 'object') {
          Object.assign(cfg.params.common, raw.params.common);
        }
        if (raw.params.models && typeof raw.params.models === 'object') {
          for (const m of ['svi', 'sabr', 'vv']) {
            if (raw.params.models[m] && typeof raw.params.models[m] === 'object') {
              Object.assign(cfg.params.models[m], raw.params.models[m]);
              if (raw.params.models[m].manual && typeof raw.params.models[m].manual === 'object') {
                Object.assign(cfg.params.models[m].manual, raw.params.models[m].manual);
              }
              if (raw.params.models[m].pins && typeof raw.params.models[m].pins === 'object') {
                Object.assign(cfg.params.models[m].pins, raw.params.models[m].pins);
              }
              if (raw.params.models[m].bounds && typeof raw.params.models[m].bounds === 'object') {
                cfg.params.models[m].bounds = {
                  ...cfg.params.models[m].bounds,
                  ...raw.params.models[m].bounds,
                };
              }
            }
          }
        }
      }
      if (raw.calibration && typeof raw.calibration === 'object') Object.assign(cfg.calibration, raw.calibration);
      if (raw.conventions && typeof raw.conventions === 'object') Object.assign(cfg.conventions, raw.conventions);
      cfg.asset = raw.asset || asset;
      cfg.model = (raw.model === 'svi' || raw.model === 'sabr' || raw.model === 'vv') ? raw.model : model;
      if (cfg.calibration.fitWeighting !== 'mid' && cfg.calibration.fitWeighting !== 'vega-weighted' && cfg.calibration.fitWeighting !== 'bid-ask-aware') {
        cfg.calibration.fitWeighting = 'mid';
      }
      if (cfg.conventions.stickyRule !== 'delta' && cfg.conventions.stickyRule !== 'strike' && cfg.conventions.stickyRule !== 'moneyness') {
        cfg.conventions.stickyRule = 'delta';
      }
      cfg.timestamp = Number.isFinite(raw.timestamp) ? raw.timestamp : Date.now();
      cfg.source = typeof raw.source === 'string' ? raw.source : 'local';
      return cfg;
    }

    function scheduleCalibration(reason = 'market') {
      if (reason === 'market' && (!surfaceConfig.calibration.autoRecalibrate || isMarketFrozen())) return;

      if (calibrationScheduled) {
        if (delayMs < scheduledDelayMs && calibrationTimer) {

          scheduledDelayMs = delayMs;
          calibrationTimer = setTimeout(runCalibration, delayMs);

      calibrationScheduled = true;

    // =====================================================================

    // =====================================================================
    function renderSparkline(svgEl, data, color) {
      if (data.length < 2) { svgEl.innerHTML = ''; return; }
      const w = 80, h = 22, pad = 2;
      let min = Infinity, max = -Infinity;
      for (const v of data) {
        if (v < min) min = v;
        if (v > max) max = v;
      }
      if (max - min < 1e-10) { max = min + 1; }
      const pts = data.map((v, i) => {
        const x = pad + (i / (data.length - 1)) * (w - 2 * pad);
        const y = h - pad - ((v - min) / (max - min)) * (h - 2 * pad);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      svgEl.innerHTML = `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.2" stroke-linejoin="round"/>`;
    }

    function stableStringify(value) {
      if (value === null || typeof value !== 'object') return JSON.stringify(value);
      if (Array.isArray(value)) return '[' + value.map(stableStringify).join(',') + ']';
      const keys = Object.keys(value).sort();
      return '{' + keys.map((k) => JSON.stringify(k) + ':' + stableStringify(value[k])).join(',') + '}';
    }

    function fnv1aHash(text) {
      let h = 0x811c9dc5;
      for (let i = 0; i < text.length; i++) {
        h ^= text.charCodeAt(i);
        h = Math.imul(h, 0x01000193) >>> 0;
      }
      return h.toString(16).padStart(8, '0');
    }

    function formatPanelTime(ts) {
      return Number.isFinite(ts) ? new Date(ts).toLocaleString() : '--';
    }

    function formatFixed(value, digits) {
      return Number.isFinite(value) ? value.toFixed(digits) : '--';
    }

    function surfaceConfigHash() {
      try {
        return 'fnv1a:' + fnv1aHash(stableStringify(surfaceConfig || {}));
      } catch (e) {
        return 'n/a';
      }
    }

    function collectPanelLiveValues(panelKey) {
      const globals = [

        { k: 'render cycle', v: String(Number.isFinite(renderCycle) ? renderCycle : 0) },
      ];

      const specifics = [];
      if (panelKey === 'surface') {
        specifics.push(
          { k: 'spot', v: spotPrice > 0 ? '$' + pFmt.format(spotPrice) : '--' },
          { k: 'sticky rule', v: surfaceConfig?.conventions?.stickyRule || '--' },
          { k: 'slice count', v: String(calibratedSlices.length) },
          { k: 'surface grid', v: lastSurfaceData ? `${lastSurfaceData.tGrid.length}x${lastSurfaceData.gridN}` : '--' }
        );
      } else if (panelKey === 'volchange') {
        specifics.push(
          { k: 'tracked IV points', v: String(prevIvMap.size) },
          { k: 'slice count', v: String(calibratedSlices.length) }
        );
      } else if (panelKey === 'smile') {
        const sl = calibratedSlices.find((s) => s.expiryCode === activeExpiry);
        specifics.push(
          { k: 'active expiry', v: activeExpiry || '--' },
          { k: 'points in expiry', v: sl ? String(sl.points.length) : '--' },
          { k: 'sticky rule', v: surfaceConfig?.conventions?.stickyRule || '--' }
        );
      } else if (panelKey === 'greeks') {
        specifics.push(
          { k: 'active greek', v: activeGreek || '--' },
          { k: 'expiry buckets', v: lastGreeksData ? String(lastGreeksData.expLabels.length) : '--' },
          { k: 'strike buckets', v: lastGreeksData ? String(lastGreeksData.sampledStrikes.length) : '--' }
        );
      } else if (panelKey === 'term') {
        specifics.push(
          { k: 'expiries', v: String(calibratedSlices.length) },
          { k: 'realized vol', v: frameCache && Number.isFinite(frameCache.realizedVol) ? formatFixed(frameCache.realizedVol, 2) + '%' : '--' }
        );
      } else if (panelKey === 'metrics') {
        specifics.push(
          { k: 'quotes in chain', v: String(chain.size) },
          { k: 'ticks/sec', v: ticksPerSec > 0 ? formatFixed(ticksPerSec, 1) : '--' },
          { k: 'last calib', v: calibTimeUs > 0 ? calibTimeUs + ' us' : '--' }
        );
      } else if (panelKey === 'scanner') {
        specifics.push(
          { k: 'min edge', v: formatFixed(edgeThreshold, 1) + ' vol' },
          { k: 'side filter', v: edgeSideFilter || '--' },
          { k: 'min maturity', v: minMaturity > 0 ? String(minMaturity) + 'd' : 'all' },
          { k: 'candidate rows', v: lastScannerData ? String(lastScannerData.edges.length) : '--' }
        );
      } else if (panelKey === 'forwardvol') {
        specifics.push(
          { k: 'active tab', v: panels.forwardvol ? panels.forwardvol.activeTab : '--' },
          { k: 'forward pairs', v: lastForwardVolData ? String(lastForwardVolData.labels.length) : '--' }
        );
      } else if (panelKey === 'funding') {
        specifics.push(
          { k: 'active tab', v: panels.funding ? panels.funding.activeTab : '--' },
          { k: 'funding rate', v: Number.isFinite(fundingState.currentRate) ? (fundingState.currentRate * 100).toFixed(4) + '%' : '--' },
          { k: 'perp/index', v: Number.isFinite(fundingState.perpPrice) && Number.isFinite(fundingState.indexPrice) ? `${pFmt.format(fundingState.perpPrice)} / ${pFmt.format(fundingState.indexPrice)}` : '--' }
        );
      } else if (panelKey === 'tradeflow') {
        specifics.push(
          { k: 'active tab', v: panels.tradeflow ? panels.tradeflow.activeTab : '--' },
          { k: 'tape size', v: String(tradeFlow.tape.length) },
          { k: 'large trades', v: String(tradeFlow.largeTrades.length) }
        );
      } else if (panelKey === 'volcone') {
        specifics.push(
          { k: 'lookback', v: String(volConeLookback) + 'd' },
          { k: 'historical points', v: historicalVolData ? String(historicalVolData.length) : '--' },
          { k: 'front ATM IV', v: calibratedSlices.length > 0 ? formatFixed(calibratedSlices[0].atmVol, 1) + '%' : '--' }
        );
      } else if (panelKey === 'strategy') {
        specifics.push(
          { k: 'legs', v: String(strategyLegs.length) },
          { k: 'spot shock', v: panels.strategy ? panels.strategy.slSpot.value + '%' : '--' },
          { k: 'vol shock', v: panels.strategy ? panels.strategy.slVol.value : '--' },
          { k: 'time shock', v: panels.strategy ? panels.strategy.slTime.value + 'd' : '--' },
          { k: 'net delta', v: lastStrategyResult && Number.isFinite(lastStrategyResult.netGreeks?.[0]) ? formatFixed(lastStrategyResult.netGreeks[0], 4) : '--' }
        );
      } else if (panelKey === 'pricer') {
        specifics.push(
          { k: 'product', v: pricerTicket.productType || '--' },
          { k: 'expiry', v: pricerTicket.expiryCode || '--' },
          { k: 'linkage', v: pricerTicket.marketLinkage || '--' },
          { k: 'premium', v: lastPricerResult && Number.isFinite(lastPricerResult?.modelOutput?.premium) ? '$' + pFmt.format(lastPricerResult.modelOutput.premium) : '--' },
          { k: 'snapshots', v: String(pricerSnapshots.length) }
        );
      } else if (panelKey === 'surfacecfg') {
        specifics.push(
          { k: 'fit weighting', v: surfaceConfig?.calibration?.fitWeighting || '--' },
          { k: 'sticky rule', v: surfaceConfig?.conventions?.stickyRule || '--' },
          { k: 'config source', v: surfaceConfig?.source || '--' }
        );
      }

      return [...globals, ...specifics].filter((item) => item && item.k && item.v !== undefined && item.v !== null);
    }

    function closePanelInfoModal() {
      if (!panelInfoModalState.backdrop) return;
      panelInfoModalState.backdrop.classList.remove('open');
      document.body.classList.remove('panel-info-open');
      panelInfoModalState.panelKey = '';
    }

    function ensurePanelInfoModal() {
      if (panelInfoModalState.backdrop) return;
      const backdrop = document.createElement('div');
      backdrop.className = 'panel-info-modal-backdrop';
      backdrop.innerHTML = ''
        + '<div class="panel-info-modal" role="dialog" aria-modal="true" aria-label="Panel info">'
        + '<div class="panel-info-head">'
        + '<h2 class="panel-info-title">Panel Info</h2>'
        + '<button type="button" class="tab-btn panel-info-close">Close</button>'
        + '</div>'
        + '<div class="panel-info-content">'
        + '<div class="panel-info-live"></div>'
        + '<div class="panel-info-details"></div>'
        + '</div>'
        + '</div>';
      document.body.appendChild(backdrop);

      panelInfoModalState.backdrop = backdrop;
      panelInfoModalState.title = backdrop.querySelector('.panel-info-title');
      panelInfoModalState.liveWrap = backdrop.querySelector('.panel-info-live');
      panelInfoModalState.detailsWrap = backdrop.querySelector('.panel-info-details');
      panelInfoModalState.closeBtn = backdrop.querySelector('.panel-info-close');

      backdrop.addEventListener('click', (e) => {
        if (e.target === backdrop) closePanelInfoModal();
      });
      panelInfoModalState.closeBtn.addEventListener('click', closePanelInfoModal);

      if (!panelInfoModalState.escapeBound) {
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && panelInfoModalState.backdrop && panelInfoModalState.backdrop.classList.contains('open')) {
            closePanelInfoModal();
          }
        });
        panelInfoModalState.escapeBound = true;
      }
    }

    function renderPanelInfoField(container, key, rawValue) {
      const section = document.createElement('section');
      section.className = 'panel-info-section';
      const heading = document.createElement('h3');
      heading.textContent = INFO_FIELD_LABELS[key] || key;
      section.appendChild(heading);

      if (Array.isArray(rawValue)) {
        const ul = document.createElement('ul');
        ul.className = 'panel-info-list';
        for (const item of rawValue) {
          const li = document.createElement('li');
          li.textContent = String(item);
          if (key === 'code_ref') li.classList.add('panel-info-code');
          ul.appendChild(li);
        }
        section.appendChild(ul);
      } else {
        const p = document.createElement('p');
        p.textContent = rawValue === undefined || rawValue === null || rawValue === '' ? '--' : String(rawValue);
        if (key === 'code_ref') p.classList.add('panel-info-code');
        section.appendChild(p);
      }

      container.appendChild(section);
    }

    function openPanelInfoModal(panelKey) {
      const info = InfoRegistry[panelKey];
      if (!info) return;
      ensurePanelInfoModal();

      panelInfoModalState.panelKey = panelKey;
      panelInfoModalState.title.textContent = info.title || panelKey;

      const liveRows = collectPanelLiveValues(panelKey);
      panelInfoModalState.liveWrap.innerHTML = '';
      for (const row of liveRows) {
        const item = document.createElement('div');
        item.className = 'panel-info-live-item';
        item.innerHTML = '<span class="k"></span><span class="v"></span>';
        item.querySelector('.k').textContent = row.k;
        item.querySelector('.v').textContent = String(row.v);
        panelInfoModalState.liveWrap.appendChild(item);
      }

      panelInfoModalState.detailsWrap.innerHTML = '';
      for (const key of INFO_FIELD_ORDER) {
        renderPanelInfoField(panelInfoModalState.detailsWrap, key, info[key]);
      }

      panelInfoModalState.backdrop.classList.add('open');
      document.body.classList.add('panel-info-open');
    }

        });
        this.presetSel.addEventListener('change', (e) => {
          mutateSurfaceConfig((cfg) => { cfg.params.smilePreset = e.target.value; }, { source: 'ui-preset' });
        });
        this.weightingSel.addEventListener('change', (e) => {
          mutateSurfaceConfig((cfg) => { cfg.calibration.fitWeighting = e.target.value; }, { source: 'ui-weighting' });
        });
        this.stickySel.addEventListener('change', (e) => {
          mutateSurfaceConfig((cfg) => { cfg.conventions.stickyRule = e.target.value; }, { source: 'ui-sticky' });
        });
        this.autoRecal.addEventListener('change', (e) => {
          mutateSurfaceConfig((cfg) => { cfg.calibration.autoRecalibrate = !!e.target.checked; }, { source: 'ui-auto', recompute: false });
        });
        this.freezeBtn.addEventListener('click', () => {
          mutateSurfaceConfig((cfg) => { cfg.calibration.freezeMarket = !cfg.calibration.freezeMarket; }, { source: 'ui-freeze', recompute: true });
        });
        this.recalBtn.addEventListener('click', () => {
          dirty = true;
          scheduleCalibration('config');
          this.setMessage('manual recalibration queued');
        });
        this.advancedToggle.addEventListener('change', (e) => {
          mutateSurfaceConfig((cfg) => { cfg.calibration.advancedMode = !!e.target.checked; }, { source: 'ui-advanced', recompute: false });
        });
        this._el.querySelector('.cfg-export').addEventListener('click', () => { exportSurfaceConfigJson(); });
        this._el.querySelector('.cfg-import').addEventListener('click', () => { importSurfaceConfigJson(); });
        this._el.querySelector('.cfg-reset').addEventListener('click', () => { resetSurfaceConfigDefaults(); });

        this.paramBody.addEventListener('change', (e) => {
          const valueInput = e.target.closest('[data-param]');
          if (valueInput) {
            const key = valueInput.dataset.param;
            const num = parseFloat(valueInput.value);
            if (!Number.isFinite(num)) return;
            mutateSurfaceConfig((cfg) => { cfg.params.models[activeModel].manual[key] = num; }, { source: 'ui-param' });
            return;
          }
          const pinInput = e.target.closest('[data-pin]');
          if (pinInput) {
            const key = pinInput.dataset.pin;
            mutateSurfaceConfig((cfg) => { cfg.params.models[activeModel].pins[key] = !!pinInput.checked; }, { source: 'ui-pin' });
          }
        });

        this.commonAdvanced.addEventListener('change', (e) => {
          const field = e.target.dataset.common;
          if (!field) return;
          const parsed = e.target.type === 'number' ? parseFloat(e.target.value) : e.target.value;
          if (e.target.type === 'number' && !Number.isFinite(parsed)) return;
          mutateSurfaceConfig((cfg) => { cfg.params.common[field] = parsed; }, { source: 'ui-common' });
        });

        this.modelAdvanced.addEventListener('change', (e) => {
          const modelField = e.target.dataset.modelField;
          if (!modelField) return;
          const t = e.target;
          let value;
          if (t.type === 'checkbox') value = !!t.checked;
          else if (t.type === 'number') {
            value = parseFloat(t.value);
            if (!Number.isFinite(value)) return;
          } else value = t.value;
          mutateSurfaceConfig((cfg) => {
            const modelCfg = cfg.params.models[activeModel];
            if (modelField.includes('.')) {
              const [p0, p1] = modelField.split('.');
              if (!modelCfg[p0] || typeof modelCfg[p0] !== 'object') modelCfg[p0] = {};
              modelCfg[p0][p1] = value;
            } else {
              modelCfg[modelField] = value;
            }
          }, { source: 'ui-model-advanced' });
        });

        renderSurfaceConfigPanel();
      }
      setMessage(text) {
        if (!this.msgEl) return;
        this.msgEl.textContent = text || '';
        clearTimeout(this._msgTimer);
        if (text) this._msgTimer = setTimeout(() => { this.msgEl.textContent = ''; }, 2500);
      }
      dispose() {
        clearTimeout(this._msgTimer);
        delete panels.surfacecfg;
      }
    }

    const HISTORY_RANGE_MS = Object.freeze({
      '1h': 60 * 60 * 1000,
      '4h': 4 * 60 * 60 * 1000,
      '24h': 24 * 60 * 60 * 1000,
      '1d': 24 * 60 * 60 * 1000,
      '7d': 7 * 24 * 60 * 60 * 1000,
      '30d': 30 * 24 * 60 * 60 * 1000,
      '90d': 90 * 24 * 60 * 60 * 1000,
      '1y': 365 * 24 * 60 * 60 * 1000,
    });

    function historyLinePanelCurrencyDefault() {
      return activeCurrency.startsWith('ETH') ? 'ETH' : 'BTC';
    }

    function historyResizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(16, Math.floor(rect.width));
      const height = Math.max(16, Math.floor(rect.height));
      const dpr = window.devicePixelRatio || 1;
      const rawW = Math.floor(width * dpr);
      const rawH = Math.floor(height * dpr);
      if (canvas.width !== rawW || canvas.height !== rawH) {
        canvas.width = rawW;
        canvas.height = rawH;
      }
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, width, height };
    }

    function historyNearestPoint(points, targetTs) {
      if (!Array.isArray(points) || points.length === 0) return null;
      let best = points[0];
      let bestDiff = Math.abs(points[0].ts - targetTs);
      for (let i = 1; i < points.length; i++) {
        const d = Math.abs(points[i].ts - targetTs);
        if (d < bestDiff) {
          bestDiff = d;
          best = points[i];
        }
      }
      return best;
    }

    function historyFormatTs(ts) {
      if (!Number.isFinite(ts)) return '--';
      return new Date(ts).toLocaleString();
    }

    function historyDrawGrid(ctx, area, xTicks = 6, yTicks = 5) {
      ctx.save();
      ctx.strokeStyle = '#1a2332';
      ctx.lineWidth = 1;
      for (let i = 0; i <= xTicks; i++) {
        const x = area.x + (i / xTicks) * area.w;
        ctx.beginPath();
        ctx.moveTo(x, area.y);
        ctx.lineTo(x, area.y + area.h);
        ctx.stroke();
      }
      for (let i = 0; i <= yTicks; i++) {
        const y = area.y + (i / yTicks) * area.h;
        ctx.beginPath();
        ctx.moveTo(area.x, y);
        ctx.lineTo(area.x + area.w, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function historyDrawLineChart(canvas, tooltipEl, lines, hoverState, valueSuffix = '%') {
      const { ctx, width, height } = historyResizeCanvas(canvas);
      ctx.fillStyle = '#070a0f';
      ctx.fillRect(0, 0, width, height);

      const area = { x: 46, y: 16, w: Math.max(10, width - 58), h: Math.max(10, height - 38) };
      historyDrawGrid(ctx, area, 6, 5);

      const points = [];
      for (const line of lines || []) {
        if (!line || !Array.isArray(line.data)) continue;
        for (const pt of line.data) {
          if (!pt || !Number.isFinite(pt.ts) || !Number.isFinite(pt.v)) continue;
          points.push(pt);
        }
      }
      if (points.length < 2) {
        ctx.fillStyle = '#8ea1b8';
        ctx.font = '11px "JetBrains Mono"';
        ctx.textAlign = 'center';
        ctx.fillText('No historical data in selected window', width * 0.5, height * 0.5);
        if (tooltipEl) tooltipEl.style.display = 'none';
        return;
      }

      const minTs = Math.min(...points.map((p) => p.ts));
      const maxTs = Math.max(...points.map((p) => p.ts));
      let minV = Math.min(...points.map((p) => p.v));
      let maxV = Math.max(...points.map((p) => p.v));
      if (!Number.isFinite(minV) || !Number.isFinite(maxV)) {
        if (tooltipEl) tooltipEl.style.display = 'none';
        return;
      }
      const pad = Math.max(0.1, (maxV - minV) * 0.12);
      minV -= pad;
      maxV += pad;
      if (maxV - minV < 1e-9) { maxV += 1; minV -= 1; }

      const xFromTs = (ts) => area.x + ((ts - minTs) / Math.max(1, maxTs - minTs)) * area.w;
      const yFromV = (v) => area.y + (1 - ((v - minV) / Math.max(1e-9, maxV - minV))) * area.h;

      for (const line of lines || []) {
        if (!line || !Array.isArray(line.data) || line.data.length < 2) continue;
        ctx.save();
        ctx.strokeStyle = line.color || '#2fb2ff';
        ctx.lineWidth = 1.5;
        ctx.setLineDash(line.dashed ? [4, 3] : []);
        let started = false;
        for (const pt of line.data) {
          if (!Number.isFinite(pt.ts) || !Number.isFinite(pt.v)) continue;
          const x = xFromTs(pt.ts);
          const y = yFromV(pt.v);
          if (!started) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            started = true;
          } else ctx.lineTo(x, y);
        }
        if (started) ctx.stroke();
        ctx.restore();
      }

      ctx.fillStyle = '#8ea1b8';
      ctx.font = '10px "JetBrains Mono"';
      ctx.textAlign = 'left';
      ctx.fillText(minV.toFixed(2) + valueSuffix, 6, area.y + area.h);
      ctx.fillText(maxV.toFixed(2) + valueSuffix, 6, area.y + 8);
      ctx.textAlign = 'center';
      ctx.fillText(new Date(minTs).toLocaleDateString(), area.x, height - 6);
      ctx.fillText(new Date(maxTs).toLocaleDateString(), area.x + area.w, height - 6);

      let legendX = area.x + 4;
      const legendY = 8;
      for (const line of lines || []) {
        ctx.fillStyle = line.color || '#2fb2ff';
        ctx.fillRect(legendX, legendY, 8, 2);
        legendX += 12;
        ctx.fillStyle = '#8ea1b8';
        ctx.textAlign = 'left';
        ctx.fillText(line.name || 'Series', legendX, legendY + 4);
        legendX += (line.name || 'Series').length * 6 + 12;
      }

      if (!hoverState || hoverState.x < area.x || hoverState.x > area.x + area.w || hoverState.y < area.y || hoverState.y > area.y + area.h) {
        if (tooltipEl) tooltipEl.style.display = 'none';
        return;
      }
      const hoverTs = minTs + ((hoverState.x - area.x) / area.w) * (maxTs - minTs);
      const nearest = [];
      for (const line of lines || []) {
        if (!line || !Array.isArray(line.data) || line.data.length === 0) continue;
        const hit = historyNearestPoint(line.data, hoverTs);
        if (hit) nearest.push({ line, hit });
      }
      if (nearest.length === 0) {
        if (tooltipEl) tooltipEl.style.display = 'none';
        return;
      }
      const anchor = nearest[0].hit;
      const cx = xFromTs(anchor.ts);
      ctx.strokeStyle = 'rgba(142,161,184,0.55)';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 2]);
      ctx.beginPath();
      ctx.moveTo(cx, area.y);
      ctx.lineTo(cx, area.y + area.h);
      ctx.stroke();
      ctx.setLineDash([]);

      for (const row of nearest) {
        const cy = yFromV(row.hit.v);
        ctx.beginPath();
        ctx.fillStyle = row.line.color || '#2fb2ff';
        ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }

      if (!tooltipEl) return;
      const html = [`<div>${historyFormatTs(anchor.ts)}</div>`];
      for (const row of nearest) {
        html.push(`<div style="color:${row.line.color || '#2fb2ff'}">${row.line.name}: ${row.hit.v.toFixed(2)}${valueSuffix}</div>`);
      }
      tooltipEl.innerHTML = html.join('');
      tooltipEl.style.display = 'block';
      const left = Math.max(6, Math.min(width - 180, hoverState.x + 10));
      const top = Math.max(6, Math.min(height - 52, hoverState.y - 10));
      tooltipEl.style.left = left + 'px';
      tooltipEl.style.top = top + 'px';
    }

        this.canvas.addEventListener('mousemove', (e) => {

      buildHvLines(points) {
        if (!Array.isArray(points) || points.length < 2) return [];
        const grouped = new Map();
        for (const row of points) {
          if (!Array.isArray(row) || row.length < 2) continue;
          const ts = Number(row[0]);
          const v = Number(row[1]);
          if (!Number.isFinite(ts) || !Number.isFinite(v) || v <= 0) continue;
          if (!grouped.has(ts)) grouped.set(ts, []);
          grouped.get(ts).push(v);
        }
        const timestamps = [...grouped.keys()].sort((a, b) => a - b);
        if (timestamps.length < 2) return [];
        let maxWindows = 0;
        for (const ts of timestamps) maxWindows = Math.max(maxWindows, grouped.get(ts).length);
        const out = [];
        if (maxWindows > 1) {
          for (let w = 0; w < Math.min(4, maxWindows); w++) {
            const lineData = [];
            for (const ts of timestamps) {
              const val = grouped.get(ts)[w];
              if (Number.isFinite(val)) lineData.push({ ts, v: val });
            }
            if (lineData.length > 1) {
              out.push({ name: `HV W${w + 1}`, color: ['#2fb2ff', '#19d8a8', '#ffb347', '#ff7a7a'][w % 4], data: lineData });
            }
          }
        } else {
          const base = timestamps.map((ts) => ({ ts, v: grouped.get(ts)[0] }));
          const makeMA = (windowLen, label, color) => {
            if (base.length <= windowLen) return null;
            let sum = 0;
            const line = [];
            for (let i = 0; i < base.length; i++) {
              sum += base[i].v;
              if (i >= windowLen) sum -= base[i - windowLen].v;
              if (i >= windowLen - 1) {
                line.push({ ts: base[i].ts, v: sum / windowLen });
              }
            }
            return line.length > 1 ? { name: label, color, data: line } : null;
          };
          out.push({ name: 'HV', color: '#2fb2ff', data: base });
          const ma24 = makeMA(24, 'HV 24h', '#19d8a8');
          const ma168 = makeMA(168, 'HV 7d', '#ffb347');
          if (ma24) out.push(ma24);
          if (ma168) out.push(ma168);
        }
        return out;
      }
      async refresh() {
        if (!historicalDataService) return;
        this.refreshBtn.disabled = true;
        this.refreshBtn.textContent = 'Loading...';
        try {
          const rangeMs = HISTORY_RANGE_MS[this.rangeSel.value] || HISTORY_RANGE_MS['30d'];
          const endTs = Date.now();
          const startTs = endTs - rangeMs;
          const currency = this.currencySel.value || 'BTC';
          const [hvRes, dvolRes] = await Promise.all([
            historicalDataService.getHistoricalVolatility({ currency, ttlMs: 15000 }),
            historicalDataService.getVolatilityIndexData({ currency, startTs, endTs, resolution: 3600, ttlMs: 15000 }),
          ]);
          let hvRows = Array.isArray(hvRes) ? hvRes : [];
          hvRows = hvRows.filter((r) => Array.isArray(r) && Number(r[0]) >= startTs && Number(r[0]) <= endTs);
          const lines = this.buildHvLines(hvRows);
          const dvolData = Array.isArray(dvolRes)
            ? dvolRes.map((d) => ({ ts: Number(d.tick), v: Number(d.close) })).filter((d) => Number.isFinite(d.ts) && Number.isFinite(d.v))
            : [];
          if (dvolData.length > 1) {
            lines.push({ name: 'DVOL', color: '#ff7a7a', data: dvolData, dashed: true });
          }
          this.lines = lines;
          this.draw();
        } catch (e) {
          console.warn('[histvol] refresh failed:', e);
          this.lines = [];
          this.draw();
        } finally {
          this.refreshBtn.disabled = false;
          this.refreshBtn.textContent = 'Refresh';
        }
      }
      draw() {

      }
      dispose() {

      }
    }
