<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ferric Terminal</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dockview-core@4.3.1/dist/styles/dockview.css">
  <style>
    :root {
      --bg: #070a0f;
      --panel: #11161f;
      --border: #263241;
      --fg: #d8e0ea;
      --muted: #8ea1b8;
      --accent: #2fb2ff;
      --accent2: #19d8a8;
      --danger: #ff7a7a;
      --warn: #ffb347;
      --mono: "JetBrains Mono", "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      --sans: "IBM Plex Sans", "Segoe UI", Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      color: var(--fg);
      font-family: var(--sans);
      background:
        radial-gradient(1000px 700px at 12% -20%, #15314f 0%, rgba(21,49,79,0) 60%),
        radial-gradient(900px 650px at 100% 0%, #0f2d25 0%, rgba(15,45,37,0) 58%),
        linear-gradient(180deg, #06080c 0%, #070a0f 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(17,22,31,0.85);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .header-spot {
      font-family: var(--mono);
      font-size: 16px;
      color: var(--accent2);
      min-width: 110px;
    }
    .sparkline-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
    }
    .sparkline-wrap svg { display: block; }
    .status-pill {
      font-size: 11px;
      font-family: var(--mono);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .status-pill.connected { color: var(--accent2); border-color: var(--accent2); }
    .status-pill.connecting { color: var(--warn); border-color: var(--warn); }
    .status-pill.disconnected { color: var(--danger); border-color: var(--danger); }

    /* ---- Dockview panel content ---- */
    .dock-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      padding: 6px 8px;
      background: color-mix(in srgb, var(--panel) 92%, black);
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .panel-title-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .panel-info-btn {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(142,161,184,0.45);
      background: rgba(13,20,29,0.75);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 120ms linear, color 120ms linear, background 120ms linear;
    }
    .panel-info-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(47,178,255,0.12);
    }
    .panel-info-btn:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 1px;
    }
    .chart-area {
      flex: 1;
      min-height: 0;
    }

    /* ---- Toolbar ---- */
    .toolbar {
      display: flex;
      gap: 4px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }
    select, .tab-btn {
      background: #0d141d;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* ---- Metrics table ---- */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 3px 8px;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .metrics-grid .k { color: var(--muted); }
    .metrics-grid .v { text-align: right; font-family: var(--mono); }
    .tbl-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    th, td {
      padding: 2px 0;
      border-bottom: 1px solid rgba(142,161,184,0.12);
      text-align: right;
      font-family: var(--mono);
    }
    th:first-child, td:first-child {
      text-align: left;
      font-family: var(--sans);
      color: var(--muted);
    }
    th { color: var(--muted); font-weight: 500; }

    /* ---- Mispricing Scanner ---- */
    .scanner-wrap {
      display: flex;
      gap: 6px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .scanner-heatmap {
      flex: 1.2;
      min-height: 0;
    }
    .scanner-table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    .scanner-table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
    }
    .scanner-table-wrap th {
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 1;
    }
    .scanner-table-wrap td { white-space: nowrap; }
    .edge-buy { color: var(--accent2); }
    .edge-sell { color: var(--danger); }
    .edge-strong { font-weight: 700; }
    .edge-actionable { background: rgba(25,216,168,0.08); }
    .edge-actionable.sell { background: rgba(255,122,122,0.08); }

    /* ---- Trade Flow Tape ---- */
    .tape-wrap { flex: 1; overflow: auto; min-height: 0; }
    .tape-wrap table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .tape-wrap th { position: sticky; top: 0; background: var(--panel); z-index: 1; }
    .tape-wrap td { white-space: nowrap; }
    .trade-buy { color: var(--accent2); }
    .trade-sell { color: var(--danger); }
    .trade-large { font-weight: 700; }
    .flow-metrics {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px 6px; font-size: 10px; margin-bottom: 4px; flex-shrink: 0;
    }
    .flow-metrics .k { color: var(--muted); }
    .flow-metrics .v { font-family: var(--mono); text-align: right; }

    /* ---- Strategy Builder ---- */
    .strategy-split { display: flex; gap: 6px; flex: 1; min-height: 0; overflow: hidden; }
    .strategy-legs { flex: 0 0 40%; overflow: auto; min-height: 0; display: flex; flex-direction: column; }
    .strategy-legs table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .strategy-legs th { position: sticky; top: 0; background: var(--panel); z-index: 1; }
    .strategy-chart { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .strategy-chart .chart-area { flex: 1; min-height: 0; }
    .slider-row { display: flex; gap: 8px; align-items: center; font-size: 10px; color: var(--muted); padding: 2px 0; flex-shrink: 0; }
    .slider-row input[type="range"] { flex: 1; accent-color: var(--accent); height: 14px; }
    .slider-row .slider-val { font-family: var(--mono); min-width: 50px; text-align: right; }
    .net-greeks {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 2px 6px; font-size: 10px; margin: 4px 0; padding: 3px 4px;
      background: rgba(47,178,255,0.05); border-radius: 4px;
    }
    .net-greeks .k { color: var(--muted); }
    .net-greeks .v { font-family: var(--mono); text-align: right; }
    .template-btns { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 4px; }
    .template-btns .tab-btn { font-size: 9px; padding: 1px 5px; }

    /* ---- Vol Cone ---- */
    .volcone-metrics {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 2px 8px; font-size: 10px; margin-bottom: 4px; flex-shrink: 0;
    }
    .volcone-metrics .k { color: var(--muted); }
    .volcone-metrics .v { font-family: var(--mono); text-align: right; }

    /* ---- Funding ---- */
    .funding-metrics {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px 6px; font-size: 10px; margin-bottom: 4px; flex-shrink: 0;
    }
    .funding-metrics .k { color: var(--muted); }
    .funding-metrics .v { font-family: var(--mono); text-align: right; }

    /* ---- OTC Pricer ---- */
    .pricer-wrap {
      display: grid;
      grid-template-columns: minmax(270px, 0.95fr) minmax(320px, 1.35fr);
      gap: 8px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .pricer-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }
    .pricer-card {
      border: 1px solid rgba(142,161,184,0.2);
      border-radius: 6px;
      padding: 6px;
      background: rgba(0,0,0,0.2);
      font-size: 10px;
    }
    .pricer-card h4 {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 5px 0;
    }
    .pricer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px 8px;
      align-items: center;
    }
    .pricer-grid label {
      color: var(--muted);
      text-transform: lowercase;
    }
    .pricer-grid select,
    .pricer-grid input[type="number"],
    .pricer-grid input[type="text"] {
      width: 100%;
      background: #0d141d;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 10px;
      font-family: var(--mono);
    }
    .pricer-radio-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .pricer-radio-row .tab-btn {
      font-size: 10px;
      padding: 2px 7px;
    }
    .pricer-kv {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(120px, auto);
      gap: 3px 8px;
      font-size: 10px;
    }
    .pricer-kv .k { color: var(--muted); text-transform: lowercase; }
    .pricer-kv .v { text-align: right; font-family: var(--mono); }
    .pricer-table-wrap {
      max-height: 260px;
      overflow: auto;
      border: 1px solid rgba(142,161,184,0.12);
      border-radius: 4px;
      padding: 0 4px;
    }
    .pricer-table-wrap th {
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--panel) 92%, black);
      z-index: 1;
    }
    .pricer-snapshots {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow: auto;
      font-size: 10px;
      font-family: var(--mono);
    }
    .pricer-snapshots .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid rgba(142,161,184,0.12);
      padding-bottom: 2px;
    }
    .pricer-msg {
      min-height: 12px;
      color: var(--muted);
      font-size: 10px;
    }
    @media (max-width: 1080px) {
      .pricer-wrap {
        grid-template-columns: 1fr;
      }
    }

    /* ---- DSL Panels ---- */
    .dsl-editor-host {
      flex: 1;
      min-height: 0;
      border: 1px solid rgba(142,161,184,0.18);
      border-radius: 6px;
      overflow: hidden;
      background: #070a0f;
    }
    .dsl-editor-loading {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 11px;
      font-family: var(--mono);
      border: 1px dashed rgba(142,161,184,0.3);
      border-radius: 6px;
      background: rgba(0,0,0,0.2);
    }
    .dsl-results-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }
    .dsl-status {
      font-size: 11px;
      font-family: var(--mono);
      border-radius: 4px;
      padding: 4px 6px;
      border: 1px solid rgba(142,161,184,0.24);
      background: rgba(0,0,0,0.2);
    }
    .dsl-status.success {
      color: var(--accent2);
      border-color: rgba(25,216,168,0.5);
      background: rgba(25,216,168,0.08);
    }
    .dsl-status.error {
      color: var(--danger);
      border-color: rgba(255,122,122,0.5);
      background: rgba(255,122,122,0.08);
    }
    .dsl-status.pending {
      color: var(--warn);
      border-color: rgba(255,179,71,0.5);
      background: rgba(255,179,71,0.08);
    }
    .dsl-kv {
      display: grid;
      grid-template-columns: minmax(90px, auto) minmax(0, 1fr);
      gap: 4px 8px;
      font-size: 10px;
      border: 1px solid rgba(142,161,184,0.18);
      border-radius: 6px;
      padding: 6px;
      background: rgba(0,0,0,0.2);
    }
    .dsl-kv .k {
      color: var(--muted);
      text-transform: lowercase;
      white-space: nowrap;
    }
    .dsl-kv .v {
      text-align: right;
      font-family: var(--mono);
      overflow-wrap: anywhere;
    }
    .dsl-greeks-wrap {
      border: 1px solid rgba(142,161,184,0.18);
      border-radius: 6px;
      background: rgba(0,0,0,0.2);
      overflow: auto;
      max-height: 200px;
      padding: 0 4px;
    }
    .dsl-greeks-wrap th {
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--panel) 92%, black);
      z-index: 1;
    }
    .dsl-greeks-wrap th,
    .dsl-greeks-wrap td {
      font-size: 10px;
      white-space: nowrap;
    }
    .dsl-json-wrap {
      border: 1px solid rgba(142,161,184,0.18);
      border-radius: 6px;
      background: rgba(0,0,0,0.2);
      padding: 6px;
      font-size: 10px;
      overflow: auto;
      min-height: 0;
      flex: 1;
    }
    .dsl-json-wrap details {
      margin-left: 10px;
    }
    .dsl-json-wrap summary {
      cursor: pointer;
      color: var(--accent);
      font-family: var(--mono);
      line-height: 1.4;
      user-select: none;
    }
    .dsl-json-wrap .dsl-json-leaf {
      color: var(--fg);
      font-family: var(--mono);
      line-height: 1.4;
      margin-left: 20px;
      overflow-wrap: anywhere;
    }
    .dsl-json-wrap .dsl-json-empty {
      color: var(--muted);
      font-family: var(--mono);
    }
    .dsl-market-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }
    .dsl-market-grid {
      display: grid;
      grid-template-columns: minmax(112px, auto) 1fr;
      gap: 4px 8px;
      align-items: center;
      font-size: 10px;
      border: 1px solid rgba(142,161,184,0.18);
      border-radius: 6px;
      padding: 6px;
      background: rgba(0,0,0,0.2);
    }
    .dsl-market-grid label {
      color: var(--muted);
      text-transform: lowercase;
    }
    .dsl-market-grid input {
      width: 100%;
      background: #0d141d;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 10px;
      font-family: var(--mono);
    }
    .dsl-market-note {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
    }
    .dsl-examples-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }
    .dsl-examples-wrap select {
      width: 100%;
      font-size: 10px;
      padding: 4px 6px;
      font-family: var(--mono);
    }
    .dsl-examples-meta {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
      border: 1px solid rgba(142,161,184,0.18);
      border-radius: 6px;
      padding: 6px;
      background: rgba(0,0,0,0.2);
      line-height: 1.4;
    }

    /* ---- Dockview theme overrides ---- */
    .dockview-theme-abyss {
      --dv-group-view-background-color: var(--panel);
      --dv-tabs-and-actions-container-background-color: color-mix(in srgb, var(--panel) 70%, black);
      --dv-separator-border: var(--border);
      --dv-activegroup-visiblepanel-tab-background-color: var(--panel);
      --dv-activegroup-hiddenpanel-tab-background-color: transparent;
      --dv-inactivegroup-visiblepanel-tab-background-color: color-mix(in srgb, var(--panel) 50%, black);
      --dv-inactivegroup-hiddenpanel-tab-background-color: transparent;
      --dv-activegroup-visiblepanel-tab-color: var(--fg);
      --dv-activegroup-hiddenpanel-tab-color: var(--muted);
      --dv-inactivegroup-visiblepanel-tab-color: var(--muted);
      --dv-inactivegroup-hiddenpanel-tab-color: var(--muted);
      --dv-tab-divider-color: var(--border);
      --dv-drag-over-background-color: rgba(47,178,255,0.1);
      --dv-drag-over-border-color: var(--accent);
    }

    /* ---- View Switcher ---- */
    .view-switcher {
      display: flex;
      gap: 2px;
      padding: 2px;
      background: rgba(0,0,0,0.3);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .view-switcher .tab-btn {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 4px;
      border: none;
    }
    .mode-badge {
      font-size: 10px;
      font-family: var(--mono);
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .mode-badge.calibrated { color: var(--accent2); border-color: rgba(25,216,168,0.8); }
    .mode-badge.manual { color: var(--warn); border-color: rgba(255,179,71,0.85); }
    .mode-badge.hybrid { color: var(--accent); border-color: rgba(47,178,255,0.85); }

    /* ---- Surface Config ---- */
    .surfacecfg-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }
    .surfacecfg-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px 8px;
      font-size: 10px;
      align-items: center;
    }
    .surfacecfg-grid label { color: var(--muted); text-transform: lowercase; }
    .surfacecfg-grid select,
    .surfacecfg-grid input[type="number"],
    .surfacecfg-grid input[type="text"] {
      width: 100%;
      background: #0d141d;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 10px;
      font-family: var(--mono);
    }
    .surfacecfg-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--muted);
    }
    .surfacecfg-row .tab-btn {
      font-size: 10px;
      padding: 2px 6px;
    }
    .surfacecfg-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
    }
    .surfacecfg-table th,
    .surfacecfg-table td {
      padding: 2px 0;
      border-bottom: 1px solid rgba(142,161,184,0.1);
      text-align: left;
      font-family: var(--mono);
    }
    .surfacecfg-table th { color: var(--muted); font-weight: 500; }
    .surfacecfg-table td:last-child { text-align: right; }
    .surfacecfg-advanced {
      border: 1px solid rgba(142,161,184,0.18);
      border-radius: 6px;
      padding: 5px;
      background: rgba(0,0,0,0.2);
    }
    .surfacecfg-msg {
      min-height: 12px;
      font-size: 10px;
      color: var(--muted);
    }

    /* ---- Panel Info Modal ---- */
    body.panel-info-open { overflow: hidden; }
    .panel-info-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 4000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(3,7,12,0.72);
      padding: 20px;
    }
    .panel-info-modal-backdrop.open { display: flex; }
    .panel-info-modal {
      width: min(860px, 92vw);
      max-height: 88vh;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 94%, black);
      box-shadow: 0 20px 48px rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-info-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;

  <script type="module">
    import { DockviewComponent } from 'dockview-core';

    // =====================================================================
    //  Web Worker (owns WASM instance, all computation off main thread)
    // =====================================================================
    let workerReady = false;
    const computeWorker = new Worker('./worker.js', { type: 'module' });
    computeWorker.onmessage = handleWorkerMessage;

    const workerReadyPromise = new Promise(resolve => {
      const orig = computeWorker.onmessage;
      computeWorker.onmessage = (e) => {
        if (e.data.type === 'ready') { workerReady = true; resolve(); }
        orig(e);
      };
    });

    // =====================================================================
    //  IndexedDB Historical Database Layer
    // =====================================================================
    class VolTerminalDb {
      constructor() { this.db = null; this._opening = null; }
      open() {
        if (this._opening) return this._opening;
        this._opening = new Promise((resolve, reject) => {
          const req = indexedDB.open('vol-terminal-db', 1);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            for (const name of ['vol_snapshots','atm_iv_series','spot_series','realized_vol_series','trade_flow_agg','funding_basis']) {
              if (!db.objectStoreNames.contains(name))
                db.createObjectStore(name, { keyPath: ['currency','timestamp'] });
            }
          };
          req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
          req.onerror = (e) => { console.error('[idb] open failed:', e); reject(e); };
        });
        return this._opening;
      }
      put(storeName, record) {
        if (!this.db) return;
        try { const tx = this.db.transaction(storeName, 'readwrite'); tx.objectStore(storeName).put(record); } catch (e) { /* fire and forget */ }
      }
      async getRange(storeName, currency, startTs, endTs) {
        if (!this.db) return [];
        return new Promise((resolve) => {
          try {
            const tx = this.db.transaction(storeName, 'readonly');
            const req = tx.objectStore(storeName).getAll(IDBKeyRange.bound([currency, startTs], [currency, endTs]));
            req.onsuccess = () => resolve(req.result || []);
            req.onerror = () => resolve([]);
          } catch (e) { resolve([]); }
        });
      }
      async pruneOlderThan(storeName, maxAgeMs) {
        if (!this.db) return;
        const cutoff = Date.now() - maxAgeMs;
        try {
          const tx = this.db.transaction(storeName, 'readwrite');
          const req = tx.objectStore(storeName).openCursor();
          req.onsuccess = (e) => {
            const cursor = e.target.result;
            if (!cursor) return;
            if (cursor.value.timestamp < cutoff) cursor.delete();
            cursor.continue();
          };
        } catch (e) { /* ignore */ }
      }
      async pruneAll() {
        const MS30D = 30 * 24 * 60 * 60 * 1000;
        for (const s of ['vol_snapshots','atm_iv_series','spot_series','realized_vol_series','trade_flow_agg','funding_basis'])
          await this.pruneOlderThan(s, MS30D);
      }
    }
    const terminalDb = new VolTerminalDb();

    // =====================================================================
    //  Plotly common layout helpers
    // =====================================================================
    const darkLayout = {
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      font: { color: '#d8e0ea', family: 'IBM Plex Sans, sans-serif', size: 10 },
    };
    const axisStyle = { gridcolor: '#1e2d3d', zerolinecolor: '#1e2d3d', color: '#8ea1b8' };
    const pFmt = new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 });
    const pFmt1 = new Intl.NumberFormat('en-US', { maximumFractionDigits: 1 });

    // =====================================================================
    //  Deribit protocol helpers
    // =====================================================================
    const MONTHS = { JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12 };

    function parseDeribitExpiry(code) {
      if (code.length !== 7) return null;
      const day = parseInt(code.slice(0, 2), 10);
      const mon = MONTHS[code.slice(2, 5)];
      const yr = 2000 + parseInt(code.slice(5, 7), 10);
      if (!mon || isNaN(day) || isNaN(yr)) return null;
      return new Date(Date.UTC(yr, mon - 1, day, 8, 0, 0));
    }

    function parseInstrumentName(name) {
      const p = name.split('-');
      if (p.length !== 4) return null;
      const expDate = parseDeribitExpiry(p[1]);
      if (!expDate) return null;
      const strike = parseFloat(p[2]);
      if (isNaN(strike)) return null;
      const isCall = p[3] === 'C';
      if (p[3] !== 'C' && p[3] !== 'P') return null;
      return { expiry: p[1], expiryDate: expDate, strike, isCall };
    }

    function normalizeIv(raw) {
      if (!isFinite(raw) || raw <= 0) return NaN;
      return raw > 3.0 ? raw / 100.0 : raw;
    }

    // =====================================================================
    //  Currency State
    // =====================================================================
    const CURRENCY_CONFIG = {
      BTC:       { apiCurrency: 'BTC',  base: 'BTC',  indexName: 'btc_usd',   label: 'BTC',       isLinear: false, prefix: 'BTC-' },
      ETH:       { apiCurrency: 'ETH',  base: 'ETH',  indexName: 'eth_usd',   label: 'ETH',       isLinear: false, prefix: 'ETH-' },
      BTC_USDC:  { apiCurrency: 'USDC', base: 'BTC',  indexName: 'btc_usdc',  label: 'BTC-USDC',  isLinear: true,  prefix: 'BTC_USDC-' },
      ETH_USDC:  { apiCurrency: 'USDC', base: 'ETH',  indexName: 'eth_usdc',  label: 'ETH-USDC',  isLinear: true,  prefix: 'ETH_USDC-' },
      SOL_USDC:  { apiCurrency: 'USDC', base: 'SOL',  indexName: 'sol_usdc',  label: 'SOL-USDC',  isLinear: true,  prefix: 'SOL_USDC-' },
      AVAX_USDC: { apiCurrency: 'USDC', base: 'AVAX', indexName: 'avax_usdc', label: 'AVAX-USDC', isLinear: true,  prefix: 'AVAX_USDC-' },
    };
    let activeCurrency = 'BTC';
    let currencyConfig = CURRENCY_CONFIG[activeCurrency];
    let activeWs = null;
    let intentionalClose = false; // suppress auto-reconnect on currency switch

    // =====================================================================
    //  Market State
    // =====================================================================
    const chain = new Map(); // instrument_name -> quote object
    let spotPrice = 0;
    let dirty = false;
    let tickCount = 0;
    let tickWindowStart = performance.now();
    let ticksPerSec = 0;

    // Previous IV snapshot for vol-change heatmap
    let prevIvMap = new Map(); // "expiry|strike" -> iv

    // Session baseline for surface diff
    let baselineSurface = null;

    // Circular buffers for sparklines
    const SPARK_LEN = 100;
    const spotHistory = [];
    const atmVolHistory = [];

    // Trade flow state
    const tradeFlow = {
      tape: [], sessionVolume: new Map(), callVolume: 0, putVolume: 0,
      totalNotional: 0, largeTrades: [], lastNotionals: [],
    };
    let tradeFlowDirty = false, tradeFlowRafPending = false;

    // Funding state
    const fundingState = { currentRate: NaN, perpPrice: NaN, indexPrice: NaN, history: [] };

    // Vol cone state
    let volConeLookback = 90;
    let historicalVolData = null;

    // Strategy state
    const strategyLegs = [];
    let lastStrategyResult = null;
    let lastForwardVolData = null;
    const pricerSnapshots = [];
    let lastPricerResult = null;
    let pricerFrozenContext = null;
    let pricerRequestSeq = 0;
    const pricerTicket = {
      asset: activeCurrency,
      notional: 1000000,

      strike: NaN,

      monitoring: 'continuous',

    };

    // DSL state
    const DSL_MONACO_BASE_URL = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min';
    const DSL_MARKER_OWNER = 'openferric-dsl';
    let monacoLoaderPromise = null;
    let monacoRef = null;
    let monacoLanguageReady = false;
    let dslCompileTimer = null;
    let dslPriceTimer = null;
    let dslCompileSeq = 0;
    let dslPricingSeq = 0;
    const dslState = {
      source: '',
      activeExampleId: '',
      compilePending: false,
      compileResult: null,
      compiledProduct: null,
      compiledProductJson: '',
      pricingPending: false,
      priceResult: null,
      greeksResults: [],
      marketInputs: {
        spots: '100',
        vols: '0.2',
        rate: '0.05',
        dividendYields: '0',
        numPaths: '100000',
        numSteps: '252',
        seed: '42',
      },
      currentCompileRequestId: 0,
      currentPricingRequestId: 0,
    };
    const DSL_EXAMPLES = [
      {
        id: "01_zero_coupon",
        title: "01 Zero Coupon",
        source: "// Zero Coupon Bond\n// Simplest possible product: redeem notional at maturity, no coupons.\n// PV = notional * exp(-r * T)\n\nproduct \"Zero Coupon\"\n    notional: 1\n    maturity: 1.0\n    underlyings\n        SPX = asset(0)\n    schedule annual from 1.0 to 5.0\n        redeem notional\n",
      },
      {
        id: "02_fixed_coupon_note",
        title: "02 Fixed Coupon Note",
        source: "// Fixed Coupon Note\n// Pays a fixed 5% annual coupon and redeems at par at maturity.\n// No equity linkage — pure fixed income in DSL form.\n\nproduct \"Fixed Coupon Note 3Y\"\n    notional: 1_000_000\n    maturity: 3.0\n    underlyings\n        SPX = asset(0)\n    schedule annual from 1.0 to 3.0\n        pay notional * 0.05\n        if is_final then\n            redeem notional\n",
      },
      {
        id: "03_forward",
        title: "03 Forward",
        source: "// Equity Forward\n// At maturity, pays (S(T)/S(0) - 1) * notional.\n// Long exposure to the underlying with no premium.\n\nproduct \"Equity Forward 1Y\"\n    notional: 1_000_000\n    maturity: 1.0\n    underlyings\n        SPX = asset(0)\n    schedule annual from 1.0 to 1.0\n        let perf = worst_of(performances())\n        pay notional * (perf - 1.0)\n        redeem notional\n",
      },
      {
        id: "04_reverse_convertible",
        title: "04 Reverse Convertible",
        source: "// Reverse Convertible\n// Pays an enhanced coupon (10% p.a.) in exchange for downside risk.\n// At maturity: if spot >= strike (100%), redeem at par.\n// If spot < strike, investor receives notional * (S(T)/S(0)),\n// i.e., they \"bought\" the stock at strike.\n\nproduct \"Reverse Convertible 1Y\"\n    notional: 1_000_000\n    maturity: 1.0\n    underlyings\n        SPX = asset(0)\n    schedule quarterly from 0.25 to 1.0\n        // Enhanced coupon paid quarterly\n        pay notional * 0.025\n\n        if is_final then\n            let perf = worst_of(performances())\n            if perf >= 1.0 then\n                redeem notional\n            else\n                redeem notional * perf\n",
      },
      {
        id: "05_barrier_reverse_convertible",
        title: "05 Barrier Reverse Convertible",
        source: "// Barrier Reverse Convertible (BRC)\n// Like a reverse convertible but with knock-in protection.\n// Downside only applies if a barrier (60%) is ever breached.\n// If barrier never touched, investor receives full notional regardless\n// of final spot level.\n\nproduct \"Barrier Reverse Convertible 1Y\"\n    notional: 1_000_000\n    maturity: 1.0\n    underlyings\n        SPX = asset(0)\n    state\n        ki_hit: bool = false\n    schedule quarterly from 0.25 to 1.0\n        let perf = worst_of(performances())\n\n        // Continuous barrier observation (approximated at observation dates)\n        if perf <= 0.60 then\n            set ki_hit = true\n\n        // Enhanced coupon\n        pay notional * 0.02\n\n        if is_final then\n            if ki_hit and perf < 1.0 then\n                redeem notional * perf\n            else\n                redeem notional\n",
      },
      {
        id: "06_autocallable_worst_of",
        title: "06 Autocallable Worst Of",
        source: "// Worst-of Autocallable (3 underlyings, 18 months)\n// Classic autocallable on a basket of 3 indices.\n// Quarterly observations:\n//   - If worst-of performance >= 100%, early redeem + coupon\n//   - Knock-in barrier at 60%\n//   - At maturity: coupon always paid; if KI hit and WoF < 100%,\n//     redeem at WoF level; otherwise redeem at par\n\nproduct \"WoF Autocall 18m\"\n    notional: 1_000_000\n    maturity: 1.5\n\n    underlyings\n        SPX  = asset(0)\n        SX5E = asset(1)\n        NKY  = asset(2)\n\n    state\n        ki_hit: bool = false\n\n    schedule quarterly from 0.25 to 1.5\n        let wof = worst_of(performances())\n\n        if wof <= 0.60 then\n            set ki_hit = true\n\n        // Early autocall (not on final date)\n        if wof >= 1.0 and not is_final then\n            pay notional * 0.08 * observation_date\n            redeem notional\n\n        // Maturity\n        if is_final then\n            pay notional * 0.08 * 1.5\n            if ki_hit and wof < 1.0 then\n                redeem notional * wof\n            else\n                redeem notional\n",
      },
      {
        id: "07_step_down_autocallable",
        title: "07 Step Down Autocallable",
        source: "// Step-Down Autocallable\n// Autocall barrier decreases over time, making early redemption\n// progressively easier. Common in declining-vol environments.\n//\n// Barriers: Q1=105%, Q2=100%, Q3=95%, Q4=90%, Q5=85%, Q6=80%\n// Coupon: 8% p.a.\n// KI barrier: 55%\n\nproduct \"Step-Down Autocall 18m\"\n    notional: 1_000_000\n    maturity: 1.5\n\n    underlyings\n        SPX  = asset(0)\n        SX5E = asset(1)\n\n    state\n        ki_hit: bool = false\n\n    schedule quarterly from 0.25 to 1.5\n        let wof = worst_of(performances())\n\n        if wof <= 0.55 then\n            set ki_hit = true\n\n        // Step-down autocall barriers using observation_date to determine quarter\n        // Q1 (0.25): 105%, Q2 (0.50): 100%, Q3 (0.75): 95%\n        // Q4 (1.00): 90%, Q5 (1.25): 85%, Q6 (1.50): 80%\n        let barrier = 1.05 - observation_date * 0.2 + 0.05\n\n        if wof >= barrier and not is_final then\n            pay notional * 0.08 * observation_date\n            redeem notional\n\n        if is_final then\n            pay notional * 0.08 * 1.5\n            if ki_hit and wof < 0.80 then\n                redeem notional * wof\n            else\n                redeem notional\n",
      },
      {
        id: "08_phoenix_memory_coupon",
        title: "08 Phoenix Memory Coupon",
        source: "// Phoenix with Memory Coupons\n// Pays a coupon when worst-of performance is above the coupon barrier (70%).\n// Missed coupons accumulate and are paid when the barrier is next breached.\n// This \"memory\" feature is highly valued by investors.\n//\n// Coupon barrier: 70%\n// KI barrier: 60%\n// Autocall barrier: 100%\n// Coupon: 2% per quarter (8% p.a.)\n\nproduct \"Phoenix Memory 1Y\"\n    notional: 1_000_000\n    maturity: 1.0\n\n    underlyings\n        SPX = asset(0)\n\n    state\n        ki_hit: bool = false\n        missed_coupons: float = 0.0\n\n    schedule quarterly from 0.25 to 1.0\n        let wof = worst_of(performances())\n\n        // Knock-in observation\n        if wof <= 0.60 then\n            set ki_hit = true\n\n        // Coupon with memory\n        if wof >= 0.70 then\n            pay notional * (0.02 + missed_coupons)\n            set missed_coupons = 0.0\n        else\n            set missed_coupons = missed_coupons + 0.02\n\n        // Early autocall (not on final date)\n        if wof >= 1.0 and not is_final then\n            redeem notional\n\n        // Maturity\n        if is_final then\n            if ki_hit and wof < 1.0 then\n                redeem notional * wof\n            else\n                redeem notional\n",
      },
      {
        id: "09_athena_autocallable",
        title: "09 Athena Autocallable",
        source: "// Athena (Zero-Coupon Autocallable)\n// No periodic coupons — instead, a single premium is paid at redemption.\n// The premium grows with time: the later the autocall, the larger the payout.\n// Simpler structure favored for its clean payoff profile.\n//\n// Premium: 5% per period (cumulative)\n// Autocall barrier: 100%\n// KI barrier: 60%\n\nproduct \"Athena 2Y\"\n    notional: 1_000_000\n    maturity: 2.0\n\n    underlyings\n        SPX  = asset(0)\n        SX5E = asset(1)\n\n    state\n        ki_hit: bool = false\n\n    schedule semi_annual from 0.5 to 2.0\n        let wof = worst_of(performances())\n\n        if wof <= 0.60 then\n            set ki_hit = true\n\n        // Autocall with cumulative premium\n        if wof >= 1.0 and not is_final then\n            pay notional * 0.05 * observation_date / 0.5\n            redeem notional\n\n        // Maturity\n        if is_final then\n            if ki_hit and wof < 1.0 then\n                redeem notional * wof\n            else\n                pay notional * 0.05 * 4.0\n                redeem notional\n",
      },
      {
        id: "10_snowball_note",
        title: "10 Snowball Note",
        source: "// Snowball Note\n// Coupon \"snowballs\" — each period's coupon is the previous coupon plus a\n// fixed increment, but only if the underlying is above the coupon barrier.\n// If below, the coupon resets to zero and starts snowballing again.\n//\n// Increment: 1% per quarter\n// Coupon barrier: 80%\n// KI barrier: 60%\n\nproduct \"Snowball 2Y\"\n    notional: 1_000_000\n    maturity: 2.0\n\n    underlyings\n        SPX = asset(0)\n\n    state\n        ki_hit: bool = false\n        current_coupon: float = 0.0\n\n    schedule quarterly from 0.25 to 2.0\n        let perf = worst_of(performances())\n\n        if perf <= 0.60 then\n            set ki_hit = true\n\n        // Snowball coupon logic\n        if perf >= 0.80 then\n            set current_coupon = current_coupon + 0.01\n            pay notional * current_coupon\n        else\n            set current_coupon = 0.0\n\n        // Maturity\n        if is_final then\n            if ki_hit and perf < 1.0 then\n                redeem notional * perf\n            else\n                redeem notional\n",
      },
      {
        id: "11_digital_coupon_note",
        title: "11 Digital Coupon Note",
        source: "// Digital Coupon Note\n// Pays a fixed coupon if the underlying is above the digital barrier,\n// zero otherwise. No memory feature. Capital at risk if KI barrier\n// is breached.\n//\n// Digital barrier: 80%\n// Coupon: 3% per quarter (12% p.a. conditional)\n// KI barrier: 55%\n\nproduct \"Digital Coupon Note 1Y\"\n    notional: 1_000_000\n    maturity: 1.0\n\n    underlyings\n        SPX = asset(0)\n\n    state\n        ki_hit: bool = false\n\n    schedule quarterly from 0.25 to 1.0\n        let perf = worst_of(performances())\n\n        if perf <= 0.55 then\n            set ki_hit = true\n\n        // Digital coupon: all or nothing\n        if perf >= 0.80 then\n            pay notional * 0.03\n\n        // Maturity\n        if is_final then\n            if ki_hit and perf < 1.0 then\n                redeem notional * perf\n            else\n                redeem notional\n",
      },

    // =====================================================================

    const SURFACE_CONFIG_KEY = 'vol-terminal-surface-config-v1';
    const SURFACE_PARAM_KEYS = {
      svi: ['a', 'b', 'rho', 'm', 'sigma'],
      sabr: ['alpha', 'beta', 'rho', 'nu'],
      vv: ['atmVol', 'rr25', 'bf25'],

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));

    function defaultSurfaceConfig(asset, model) {
      return {
        asset,
        model,
        mode: 'calibrated',
        params: {
          smilePreset: 'neutral',

              betaMode: 'free',
              shift: 0.0,

        conventions: {
          stickyRule: 'delta',
        },
        timestamp: Date.now(),
        source: 'default',
      };
    }

    function sanitizeSurfaceConfig(raw, asset, model) {
      const cfg = defaultSurfaceConfig(asset, model);
      if (!raw || typeof raw !== 'object') return cfg;
      if (raw.mode === 'calibrated' || raw.mode === 'manual' || raw.mode === 'hybrid') cfg.mode = raw.mode;
      if (raw.params && typeof raw.params === 'object') {
        if (raw.params.smilePreset === 'neutral' || raw.params.smilePreset === 'conservative' || raw.params.smilePreset === 'aggressive') {
          cfg.params.smilePreset = raw.params.smilePreset;
        }
        if (raw.params.common && typeof raw.params.common === 'object') {
          Object.assign(cfg.params.common, raw.params.common);
        }
        if (raw.params.models && typeof raw.params.models === 'object') {
          for (const m of ['svi', 'sabr', 'vv']) {
            if (raw.params.models[m] && typeof raw.params.models[m] === 'object') {
              Object.assign(cfg.params.models[m], raw.params.models[m]);
              if (raw.params.models[m].manual && typeof raw.params.models[m].manual === 'object') {
                Object.assign(cfg.params.models[m].manual, raw.params.models[m].manual);
              }
              if (raw.params.models[m].pins && typeof raw.params.models[m].pins === 'object') {
                Object.assign(cfg.params.models[m].pins, raw.params.models[m].pins);
              }
              if (raw.params.models[m].bounds && typeof raw.params.models[m].bounds === 'object') {
                cfg.params.models[m].bounds = {
                  ...cfg.params.models[m].bounds,
                  ...raw.params.models[m].bounds,
                };
              }
            }
          }
        }
      }
      if (raw.calibration && typeof raw.calibration === 'object') Object.assign(cfg.calibration, raw.calibration);
      if (raw.conventions && typeof raw.conventions === 'object') Object.assign(cfg.conventions, raw.conventions);
      cfg.asset = raw.asset || asset;
      cfg.model = (raw.model === 'svi' || raw.model === 'sabr' || raw.model === 'vv') ? raw.model : model;
      if (cfg.calibration.fitWeighting !== 'mid' && cfg.calibration.fitWeighting !== 'vega-weighted' && cfg.calibration.fitWeighting !== 'bid-ask-aware') {
        cfg.calibration.fitWeighting = 'mid';
      }
      if (cfg.conventions.stickyRule !== 'delta' && cfg.conventions.stickyRule !== 'strike' && cfg.conventions.stickyRule !== 'moneyness') {
        cfg.conventions.stickyRule = 'delta';
      }
      cfg.timestamp = Number.isFinite(raw.timestamp) ? raw.timestamp : Date.now();
      cfg.source = typeof raw.source === 'string' ? raw.source : 'local';
      return cfg;
    }

    function loadSurfaceConfig(asset, model) {
      try {
        const raw = localStorage.getItem(SURFACE_CONFIG_KEY);
        if (!raw) return defaultSurfaceConfig(asset, model);
        return sanitizeSurfaceConfig(JSON.parse(raw), asset, model);
      } catch (e) {
        return defaultSurfaceConfig(asset, model);
      }
    }

    let activeModel = 'svi'; // 'svi' | 'sabr' | 'vv'
    let surfaceConfig = loadSurfaceConfig(activeCurrency, activeModel);
    if (surfaceConfig.model === 'svi' || surfaceConfig.model === 'sabr' || surfaceConfig.model === 'vv') {
      activeModel = surfaceConfig.model;
      document.getElementById('model-select').value = activeModel;
    } else {
      surfaceConfig.model = activeModel;
    }
    surfaceConfig.asset = activeCurrency;

    function saveSurfaceConfig() {
      try {
        localStorage.setItem(SURFACE_CONFIG_KEY, JSON.stringify(surfaceConfig));
      } catch (e) { /* localStorage can fail */ }
    }

    function updateModeBadge() {

    function scheduleCalibration(reason = 'market') {
      if (reason === 'market' && (!surfaceConfig.calibration.autoRecalibrate || isMarketFrozen())) return;
      const delayMs = reason === 'config' ? 30 : 1000;
      if (calibrationScheduled) {
        if (delayMs < scheduledDelayMs && calibrationTimer) {
          clearTimeout(calibrationTimer);
          scheduledDelayMs = delayMs;
          calibrationTimer = setTimeout(runCalibration, delayMs);
        }
        return;
      }
      calibrationScheduled = true;
      scheduledDelayMs = delayMs;
      calibrationTimer = setTimeout(runCalibration, delayMs);
    }

      calibrationScheduled = false;

        return;

    // =====================================================================

    function renderSparkline(svgEl, data, color) {
      if (data.length < 2) { svgEl.innerHTML = ''; return; }
      const w = 80, h = 22, pad = 2;
      let min = Infinity, max = -Infinity;
      for (const v of data) {
        if (v < min) min = v;
        if (v > max) max = v;
      }
      if (max - min < 1e-10) { max = min + 1; }
      const pts = data.map((v, i) => {
        const x = pad + (i / (data.length - 1)) * (w - 2 * pad);
        const y = h - pad - ((v - min) / (max - min)) * (h - 2 * pad);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      svgEl.innerHTML = `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.2" stroke-linejoin="round"/>`;
    }

    function stableStringify(value) {
      if (value === null || typeof value !== 'object') return JSON.stringify(value);
      if (Array.isArray(value)) return '[' + value.map(stableStringify).join(',') + ']';
      const keys = Object.keys(value).sort();
      return '{' + keys.map((k) => JSON.stringify(k) + ':' + stableStringify(value[k])).join(',') + '}';
    }

    function fnv1aHash(text) {
      let h = 0x811c9dc5;
      for (let i = 0; i < text.length; i++) {
        h ^= text.charCodeAt(i);
        h = Math.imul(h, 0x01000193) >>> 0;
      }
      return h.toString(16).padStart(8, '0');
    }

    function formatPanelTime(ts) {
      return Number.isFinite(ts) ? new Date(ts).toLocaleString() : '--';
    }

    function formatFixed(value, digits) {
      return Number.isFinite(value) ? value.toFixed(digits) : '--';
    }

    function surfaceConfigHash() {
      try {
        return 'fnv1a:' + fnv1aHash(stableStringify(surfaceConfig || {}));
      } catch (e) {
        return 'n/a';
      }
    }

    function collectPanelLiveValues(panelKey) {
      const globals = [
        { k: 'current model', v: String(activeModel || '--').toUpperCase() },
        { k: 'active currency', v: activeCurrency || '--' },
        { k: 'surface mode', v: surfaceConfig?.mode || '--' },
        { k: 'surface config hash', v: surfaceConfigHash() },
        { k: 'surface config timestamp', v: formatPanelTime(surfaceConfig?.timestamp) },
        { k: 'worker status', v: workerReady ? 'ready' : 'initializing' },
        { k: 'render cycle', v: String(Number.isFinite(renderCycle) ? renderCycle : 0) },
      ];

      const specifics = [];
      if (panelKey === 'surface') {
        specifics.push(
          { k: 'spot', v: spotPrice > 0 ? '$' + pFmt.format(spotPrice) : '--' },
          { k: 'sticky rule', v: surfaceConfig?.conventions?.stickyRule || '--' },
          { k: 'slice count', v: String(calibratedSlices.length) },
          { k: 'surface grid', v: lastSurfaceData ? `${lastSurfaceData.tGrid.length}x${lastSurfaceData.gridN}` : '--' }
        );
      } else if (panelKey === 'volchange') {
        specifics.push(
          { k: 'tracked IV points', v: String(prevIvMap.size) },
          { k: 'slice count', v: String(calibratedSlices.length) }
        );
      } else if (panelKey === 'smile') {
        const sl = calibratedSlices.find((s) => s.expiryCode === activeExpiry);
        specifics.push(
          { k: 'active expiry', v: activeExpiry || '--' },
          { k: 'points in expiry', v: sl ? String(sl.points.length) : '--' },
          { k: 'sticky rule', v: surfaceConfig?.conventions?.stickyRule || '--' }
        );
      } else if (panelKey === 'greeks') {
        specifics.push(
          { k: 'active greek', v: activeGreek || '--' },
          { k: 'expiry buckets', v: lastGreeksData ? String(lastGreeksData.expLabels.length) : '--' },
          { k: 'strike buckets', v: lastGreeksData ? String(lastGreeksData.sampledStrikes.length) : '--' }
        );
      } else if (panelKey === 'term') {
        specifics.push(
          { k: 'expiries', v: String(calibratedSlices.length) },
          { k: 'realized vol', v: frameCache && Number.isFinite(frameCache.realizedVol) ? formatFixed(frameCache.realizedVol, 2) + '%' : '--' }
        );
      } else if (panelKey === 'metrics') {
        specifics.push(
          { k: 'quotes in chain', v: String(chain.size) },
          { k: 'ticks/sec', v: ticksPerSec > 0 ? formatFixed(ticksPerSec, 1) : '--' },
          { k: 'last calib', v: calibTimeUs > 0 ? calibTimeUs + ' us' : '--' }
        );
      } else if (panelKey === 'scanner') {
        specifics.push(
          { k: 'min edge', v: formatFixed(edgeThreshold, 1) + ' vol' },
          { k: 'side filter', v: edgeSideFilter || '--' },
          { k: 'min maturity', v: minMaturity > 0 ? String(minMaturity) + 'd' : 'all' },
          { k: 'candidate rows', v: lastScannerData ? String(lastScannerData.edges.length) : '--' }
        );
      } else if (panelKey === 'forwardvol') {
        specifics.push(
          { k: 'active tab', v: panels.forwardvol ? panels.forwardvol.activeTab : '--' },
          { k: 'forward pairs', v: lastForwardVolData ? String(lastForwardVolData.labels.length) : '--' }
        );
      } else if (panelKey === 'funding') {
        specifics.push(
          { k: 'active tab', v: panels.funding ? panels.funding.activeTab : '--' },
          { k: 'funding rate', v: Number.isFinite(fundingState.currentRate) ? (fundingState.currentRate * 100).toFixed(4) + '%' : '--' },
          { k: 'perp/index', v: Number.isFinite(fundingState.perpPrice) && Number.isFinite(fundingState.indexPrice) ? `${pFmt.format(fundingState.perpPrice)} / ${pFmt.format(fundingState.indexPrice)}` : '--' }
        );
      } else if (panelKey === 'tradeflow') {
        specifics.push(
          { k: 'active tab', v: panels.tradeflow ? panels.tradeflow.activeTab : '--' },
          { k: 'tape size', v: String(tradeFlow.tape.length) },
          { k: 'large trades', v: String(tradeFlow.largeTrades.length) }
        );
      } else if (panelKey === 'volcone') {
        specifics.push(
          { k: 'lookback', v: String(volConeLookback) + 'd' },
          { k: 'historical points', v: historicalVolData ? String(historicalVolData.length) : '--' },
          { k: 'front ATM IV', v: calibratedSlices.length > 0 ? formatFixed(calibratedSlices[0].atmVol, 1) + '%' : '--' }
        );
      } else if (panelKey === 'strategy') {
        specifics.push(
          { k: 'legs', v: String(strategyLegs.length) },
          { k: 'spot shock', v: panels.strategy ? panels.strategy.slSpot.value + '%' : '--' },
          { k: 'vol shock', v: panels.strategy ? panels.strategy.slVol.value : '--' },
          { k: 'time shock', v: panels.strategy ? panels.strategy.slTime.value + 'd' : '--' },
          { k: 'net delta', v: lastStrategyResult && Number.isFinite(lastStrategyResult.netGreeks?.[0]) ? formatFixed(lastStrategyResult.netGreeks[0], 4) : '--' }
        );
      } else if (panelKey === 'pricer') {
        specifics.push(
          { k: 'product', v: pricerTicket.productType || '--' },
          { k: 'expiry', v: pricerTicket.expiryCode || '--' },
          { k: 'linkage', v: pricerTicket.marketLinkage || '--' },
          { k: 'premium', v: lastPricerResult && Number.isFinite(lastPricerResult?.modelOutput?.premium) ? '$' + pFmt.format(lastPricerResult.modelOutput.premium) : '--' },
          { k: 'snapshots', v: String(pricerSnapshots.length) }
        );
      } else if (panelKey === 'surfacecfg') {
        specifics.push(
          { k: 'fit weighting', v: surfaceConfig?.calibration?.fitWeighting || '--' },
          { k: 'sticky rule', v: surfaceConfig?.conventions?.stickyRule || '--' },
          { k: 'config source', v: surfaceConfig?.source || '--' }
        );
      }

      return [...globals, ...specifics].filter((item) => item && item.k && item.v !== undefined && item.v !== null);
    }

    function closePanelInfoModal() {
      if (!panelInfoModalState.backdrop) return;
      panelInfoModalState.backdrop.classList.remove('open');
      document.body.classList.remove('panel-info-open');
      panelInfoModalState.panelKey = '';
    }

    function ensurePanelInfoModal() {
      if (panelInfoModalState.backdrop) return;
      const backdrop = document.createElement('div');
      backdrop.className = 'panel-info-modal-backdrop';
      backdrop.innerHTML = ''
        + '<div class="panel-info-modal" role="dialog" aria-modal="true" aria-label="Panel info">'
        + '<div class="panel-info-head">'
        + '<h2 class="panel-info-title">Panel Info</h2>'
        + '<button type="button" class="tab-btn panel-info-close">Close</button>'
        + '</div>'
        + '<div class="panel-info-content">'
        + '<div class="panel-info-live"></div>'
        + '<div class="panel-info-details"></div>'
        + '</div>'
        + '</div>';
      document.body.appendChild(backdrop);

      panelInfoModalState.backdrop = backdrop;
      panelInfoModalState.title = backdrop.querySelector('.panel-info-title');
      panelInfoModalState.liveWrap = backdrop.querySelector('.panel-info-live');
      panelInfoModalState.detailsWrap = backdrop.querySelector('.panel-info-details');
      panelInfoModalState.closeBtn = backdrop.querySelector('.panel-info-close');

      backdrop.addEventListener('click', (e) => {
        if (e.target === backdrop) closePanelInfoModal();
      });
      panelInfoModalState.closeBtn.addEventListener('click', closePanelInfoModal);

      if (!panelInfoModalState.escapeBound) {
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && panelInfoModalState.backdrop && panelInfoModalState.backdrop.classList.contains('open')) {
            closePanelInfoModal();
          }
        });
        panelInfoModalState.escapeBound = true;
      }
    }

    function renderPanelInfoField(container, key, rawValue) {
      const section = document.createElement('section');
      section.className = 'panel-info-section';
      const heading = document.createElement('h3');
      heading.textContent = INFO_FIELD_LABELS[key] || key;
      section.appendChild(heading);

      if (Array.isArray(rawValue)) {
        const ul = document.createElement('ul');
        ul.className = 'panel-info-list';
        for (const item of rawValue) {
          const li = document.createElement('li');
          li.textContent = String(item);
          if (key === 'code_ref') li.classList.add('panel-info-code');
          ul.appendChild(li);
        }
        section.appendChild(ul);
      } else {
        const p = document.createElement('p');
        p.textContent = rawValue === undefined || rawValue === null || rawValue === '' ? '--' : String(rawValue);
        if (key === 'code_ref') p.classList.add('panel-info-code');
        section.appendChild(p);
      }

      container.appendChild(section);
    }

    function openPanelInfoModal(panelKey) {
      const info = InfoRegistry[panelKey];
      if (!info) return;
      ensurePanelInfoModal();

      panelInfoModalState.panelKey = panelKey;
      panelInfoModalState.title.textContent = info.title || panelKey;

      const liveRows = collectPanelLiveValues(panelKey);
      panelInfoModalState.liveWrap.innerHTML = '';
      for (const row of liveRows) {
        const item = document.createElement('div');
        item.className = 'panel-info-live-item';
        item.innerHTML = '<span class="k"></span><span class="v"></span>';
        item.querySelector('.k').textContent = row.k;
        item.querySelector('.v').textContent = String(row.v);
        panelInfoModalState.liveWrap.appendChild(item);
      }

      panelInfoModalState.detailsWrap.innerHTML = '';
      for (const key of INFO_FIELD_ORDER) {
        renderPanelInfoField(panelInfoModalState.detailsWrap, key, info[key]);
      }

      panelInfoModalState.backdrop.classList.add('open');
      document.body.classList.add('panel-info-open');
    }

    function attachPanelInfoButton(rootEl, panelKey) {
      if (!rootEl || !panelKey || !InfoRegistry[panelKey]) return;
      const head = rootEl.querySelector('.panel-head');
      if (!head || head.querySelector('.panel-info-btn')) return;

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'panel-info-btn';
      btn.textContent = 'i';
      btn.setAttribute('aria-label', 'Open panel info');
      btn.title = 'Panel info';
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        openPanelInfoModal(panelKey);
      });

      const title = head.querySelector('.panel-title');
      if (title) {
        const wrap = document.createElement('div');
        wrap.className = 'panel-title-wrap';
        head.insertBefore(wrap, title);
        wrap.appendChild(title);
        wrap.appendChild(btn);
      } else {
        head.insertBefore(btn, head.firstChild);
      }
    }

            mutateSurfaceConfig((cfg) => { cfg.params.models[activeModel].pins[key] = !!pinInput.checked; }, { source: 'ui-pin' });
          }
        });

        this.commonAdvanced.addEventListener('change', (e) => {
          const field = e.target.dataset.common;
          if (!field) return;
          const parsed = e.target.type === 'number' ? parseFloat(e.target.value) : e.target.value;
          if (e.target.type === 'number' && !Number.isFinite(parsed)) return;
          mutateSurfaceConfig((cfg) => { cfg.params.common[field] = parsed; }, { source: 'ui-common' });
        });

        this.modelAdvanced.addEventListener('change', (e) => {
          const modelField = e.target.dataset.modelField;
          if (!modelField) return;
          const t = e.target;
          let value;
          if (t.type === 'checkbox') value = !!t.checked;
          else if (t.type === 'number') {
            value = parseFloat(t.value);
            if (!Number.isFinite(value)) return;
          } else value = t.value;
          mutateSurfaceConfig((cfg) => {
            const modelCfg = cfg.params.models[activeModel];
            if (modelField.includes('.')) {
              const [p0, p1] = modelField.split('.');
              if (!modelCfg[p0] || typeof modelCfg[p0] !== 'object') modelCfg[p0] = {};
              modelCfg[p0][p1] = value;
            } else {
              modelCfg[modelField] = value;
            }
          }, { source: 'ui-model-advanced' });
        });

        renderSurfaceConfigPanel();
      }
      setMessage(text) {
        if (!this.msgEl) return;
        this.msgEl.textContent = text || '';
        clearTimeout(this._msgTimer);
        if (text) this._msgTimer = setTimeout(() => { this.msgEl.textContent = ''; }, 2500);
      }
      dispose() {
        clearTimeout(this._msgTimer);
        delete panels.surfacecfg;
      }
    }

    function ensureDslInitialSource() {
      if (dslState.source) return;
      if (DSL_EXAMPLES.length === 0) return;
      dslState.source = DSL_EXAMPLES[0].source;
      dslState.activeExampleId = DSL_EXAMPLES[0].id;
    }

    function dslNormalizeCompileError(rawErr) {
      if (!rawErr) return null;
      if (typeof rawErr === 'string') {
        return { kind: 'error', message: rawErr, span_start: 0, span_end: 0 };
      }
      return {
        kind: rawErr.kind || 'error',
        message: rawErr.message || 'Unknown compile error',
        span_start: Number.isFinite(rawErr.span_start) ? rawErr.span_start : 0,
        span_end: Number.isFinite(rawErr.span_end) ? rawErr.span_end : 0,
      };
    }

    function dslFormatNumber(value, digits = 6) {
      if (!Number.isFinite(value)) return '--';
      if (Math.abs(value) >= 1000 || (Math.abs(value) > 0 && Math.abs(value) < 0.0001)) {
        return value.toExponential(4);
      }
      return value.toFixed(digits);
    }

    function dslParseNumberList(raw, fallback) {
      const txt = String(raw ?? '');
      const parts = txt.split(',').map((x) => x.trim()).filter((x) => x.length > 0);
      const out = [];
      for (const part of parts) {
        const cleaned = part.replace(/_/g, '');
        const num = parseFloat(cleaned);
        if (Number.isFinite(num)) out.push(num);
      }
      return out.length > 0 ? out : fallback.slice();
    }

    function dslParsePositiveInt(raw, fallback, min = 1, max = 500000000) {
      const parsed = parseInt(String(raw ?? ''), 10);
      if (!Number.isFinite(parsed)) return fallback;
      if (parsed < min) return min;
      if (parsed > max) return max;
      return parsed;
    }

    function dslExpandArray(values, n, fallback) {
      const out = values.slice(0, n);
      while (out.length < n) {
        out.push(out.length > 0 ? out[out.length - 1] : fallback);
      }
      return out;
    }

    function inferDslAssetCount(compiledProduct, parsedSpots, parsedVols, parsedDivs) {
      let n = 1;
      if (Array.isArray(parsedSpots)) n = Math.max(n, parsedSpots.length);
      if (Array.isArray(parsedVols)) n = Math.max(n, parsedVols.length);
      if (Array.isArray(parsedDivs)) n = Math.max(n, parsedDivs.length);
      if (compiledProduct && typeof compiledProduct === 'object') {
        if (Array.isArray(compiledProduct.underlyings)) n = Math.max(n, compiledProduct.underlyings.length);
        if (Array.isArray(compiledProduct.assets)) n = Math.max(n, compiledProduct.assets.length);
        if (compiledProduct.underlyings && typeof compiledProduct.underlyings === 'object' && !Array.isArray(compiledProduct.underlyings)) {
          n = Math.max(n, Object.keys(compiledProduct.underlyings).length);
        }
        if (Number.isFinite(compiledProduct.num_underlyings)) {
          n = Math.max(n, Math.max(1, Math.floor(compiledProduct.num_underlyings)));
        }
      }
      return Math.max(1, n);
    }

    function buildDslPricingPayload() {
      const parsedSpots = dslParseNumberList(dslState.marketInputs.spots, [100.0]);
      const parsedVols = dslParseNumberList(dslState.marketInputs.vols, [0.2]);
      const parsedDivs = dslParseNumberList(dslState.marketInputs.dividendYields, [0.0]);
      const nAssets = inferDslAssetCount(dslState.compiledProduct, parsedSpots, parsedVols, parsedDivs);
      const spots = dslExpandArray(parsedSpots, nAssets, 100.0);
      const vols = dslExpandArray(parsedVols, nAssets, 0.2);
      const dividendYields = dslExpandArray(parsedDivs, nAssets, 0.0);
      const rate = Number.isFinite(parseFloat(dslState.marketInputs.rate)) ? parseFloat(dslState.marketInputs.rate) : 0.05;
      const numPaths = dslParsePositiveInt(dslState.marketInputs.numPaths, 100000, 1);
      const numSteps = dslParsePositiveInt(dslState.marketInputs.numSteps, 252, 1);
      const seed = dslParsePositiveInt(dslState.marketInputs.seed, 42, 0, Number.MAX_SAFE_INTEGER);

      const correlations = [];
      for (let i = 0; i < nAssets; i++) {
        const row = [];
        for (let j = 0; j < nAssets; j++) row.push(i === j ? 1.0 : 0.0);
        correlations.push(row);
      }

      const assets = [];
      for (let i = 0; i < nAssets; i++) {
        assets.push({ spot: spots[i], vol: vols[i], dividend_yield: dividendYields[i] });
      }
      const market = {
        assets,
        correlation: correlations,
        rate,
      };

      return {
        assetCount: nAssets,
        numPaths,
        numSteps,
        seed,
        market,
        marketJson: JSON.stringify(market),
      };
    }

    function dslSetCompileMarkers(errObj) {
      if (!monacoRef || !panels.dsleditor || !panels.dsleditor.editor) return;
      const model = panels.dsleditor.editor.getModel();
      if (!model) return;

      const markers = [];
      if (errObj && Number.isFinite(errObj.span_start)) {
        const maxOffset = model.getValueLength();
        let startOffset = Math.max(0, Math.min(maxOffset, errObj.span_start));
        let endOffset = Number.isFinite(errObj.span_end) ? Math.max(0, Math.min(maxOffset, errObj.span_end)) : startOffset + 1;
        if (endOffset <= startOffset) endOffset = Math.min(maxOffset, startOffset + 1);
        const startPos = model.getPositionAt(startOffset);
        const endPos = model.getPositionAt(endOffset);
        markers.push({
          severity: monacoRef.MarkerSeverity.Error,
          message: (errObj.kind ? errObj.kind + ': ' : '') + (errObj.message || 'compile error'),
          startLineNumber: startPos.lineNumber,
          startColumn: startPos.column,
          endLineNumber: endPos.lineNumber,
          endColumn: endPos.column,
        });
      }

      monacoRef.editor.setModelMarkers(model, DSL_MARKER_OWNER, markers);
    }

    function scheduleDslCompile(delayMs = 500) {
      clearTimeout(dslCompileTimer);
      dslCompileTimer = setTimeout(() => {
        triggerDslCompile();
      }, delayMs);
    }

    function scheduleDslReprice(delayMs = 500) {
      clearTimeout(dslPriceTimer);
      dslPriceTimer = setTimeout(() => {
        triggerDslPricing();
      }, delayMs);
    }

    function triggerDslCompile() {
      ensureDslInitialSource();
      if (panels.dsleditor && panels.dsleditor.editor) {
        dslState.source = panels.dsleditor.editor.getValue();
      }
      const source = dslState.source || '';
      const requestId = ++dslCompileSeq;
      dslState.currentCompileRequestId = requestId;
      dslState.compilePending = true;
      renderDslResultsPanel();

      computeWorker.postMessage({
        type: 'dsl-compile',
        payload: {
          requestId,
          source,
        },
      });
    }

    function triggerDslPricing() {
      if (!dslState.compiledProductJson) {
        dslState.pricingPending = false;
        dslState.priceResult = null;
        dslState.greeksResults = [];
        renderDslResultsPanel();
        return;
      }

      const pricing = buildDslPricingPayload();
      const requestId = ++dslPricingSeq;
      dslState.currentPricingRequestId = requestId;
      dslState.pricingPending = true;
      dslState.priceResult = { pending: true };
      dslState.greeksResults = Array.from({ length: pricing.assetCount }, () => ({ pending: true }));
      renderDslResultsPanel();

      const payloadBase = {
        requestId,
        productJson: dslState.compiledProductJson,
        marketJson: pricing.marketJson,
        numPaths: pricing.numPaths,
        numSteps: pricing.numSteps,
        seed: pricing.seed,
      };

      computeWorker.postMessage({
        type: 'dsl-price',
        payload: payloadBase,
      });

      for (let i = 0; i < pricing.assetCount; i++) {
        computeWorker.postMessage({
          type: 'dsl-greeks',
          payload: {
            ...payloadBase,
            assetIndex: i,
          },
        });
      }
    }

    function handleDslCompileResult(payload) {
      const requestId = Number(payload.requestId);
      if (Number.isFinite(requestId) && requestId < dslState.currentCompileRequestId) return;
      dslState.compilePending = false;
      dslState.compileResult = payload.result || null;

      if (dslState.compileResult && dslState.compileResult.ok) {
        dslState.compiledProduct = dslState.compileResult.ok;
        try {
          dslState.compiledProductJson = JSON.stringify(dslState.compiledProduct);
        } catch (e) {
          dslState.compiledProduct = null;
          dslState.compiledProductJson = '';
          dslState.compileResult = { err: { kind: 'serialize', message: 'failed to serialize compiled product', span_start: 0, span_end: 0 } };
        }
      } else {
        dslState.compiledProduct = null;
        dslState.compiledProductJson = '';
        dslState.priceResult = null;
        dslState.greeksResults = [];
        dslState.pricingPending = false;
      }

      const compileErr = dslNormalizeCompileError(dslState.compileResult && dslState.compileResult.err);
      dslSetCompileMarkers(compileErr);
      renderDslResultsPanel();
      renderDslMarketPanel();

      if (dslState.compiledProductJson) {
        scheduleDslReprice(0);
      }
    }

    function handleDslPriceResult(payload) {
      const requestId = Number(payload.requestId);
      if (Number.isFinite(requestId) && requestId < dslState.currentPricingRequestId) return;
      dslState.priceResult = payload.result || { err: 'missing price result' };
      const anyPendingGreeks = dslState.greeksResults.some((row) => row && row.pending);
      dslState.pricingPending = !!anyPendingGreeks;
      renderDslResultsPanel();
    }

    function handleDslGreeksResult(payload) {
      const requestId = Number(payload.requestId);
      if (Number.isFinite(requestId) && requestId < dslState.currentPricingRequestId) return;
      const idx = Number(payload.assetIndex);
      if (!Number.isFinite(idx) || idx < 0) return;
      if (!Array.isArray(dslState.greeksResults)) dslState.greeksResults = [];
      dslState.greeksResults[idx] = payload.result || { err: 'missing greeks result' };
      const anyPendingGreeks = dslState.greeksResults.some((row) => row && row.pending);
      const pricePending = !dslState.priceResult || dslState.priceResult.pending;
      dslState.pricingPending = anyPendingGreeks || pricePending;
      renderDslResultsPanel();
    }

    function renderDslJsonTree(rootEl, value, key = 'compiled_product', depth = 0) {
      if (!rootEl) return;
      if (value === null || typeof value !== 'object') {
        const leaf = document.createElement('div');
        leaf.className = 'dsl-json-leaf';
        leaf.textContent = `${key}: ${JSON.stringify(value)}`;
        rootEl.appendChild(leaf);
        return;
      }

      const details = document.createElement('details');
      if (depth <= 1) details.open = true;
      const summary = document.createElement('summary');
      if (Array.isArray(value)) summary.textContent = `${key} [${value.length}]`;
      else summary.textContent = `${key} {${Object.keys(value).length}}`;
      details.appendChild(summary);

      if (Array.isArray(value)) {
        if (value.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'dsl-json-leaf';
          empty.textContent = '(empty)';
          details.appendChild(empty);
        } else {
          value.forEach((item, idx) => renderDslJsonTree(details, item, `[${idx}]`, depth + 1));
        }
      } else {
        const keys = Object.keys(value);
        if (keys.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'dsl-json-leaf';
          empty.textContent = '(empty)';
          details.appendChild(empty);
        } else {
          for (const childKey of keys) {
            renderDslJsonTree(details, value[childKey], childKey, depth + 1);
          }
        }
      }
      rootEl.appendChild(details);
    }

    function renderDslResultsPanel() {
      const p = panels.dslresults;
      if (!p) return;

      const compileErr = dslNormalizeCompileError(dslState.compileResult && dslState.compileResult.err);
      if (dslState.compilePending) {
        p.statusEl.className = 'dsl-status pending';
        p.statusEl.textContent = 'Compiling...';
      } else if (dslState.compileResult && dslState.compileResult.ok) {
        p.statusEl.className = 'dsl-status success';
        p.statusEl.textContent = 'Compile success';
      } else if (compileErr) {
        p.statusEl.className = 'dsl-status error';
        const spanText = (Number.isFinite(compileErr.span_start) || Number.isFinite(compileErr.span_end))
          ? ` [span ${compileErr.span_start || 0}-${compileErr.span_end || 0}]`
          : '';
        p.statusEl.textContent = `${compileErr.kind}: ${compileErr.message}${spanText}`;
      } else {
        p.statusEl.className = 'dsl-status';
        p.statusEl.textContent = 'Idle';
      }

      if (!dslState.compiledProductJson) {
        p.priceEl.textContent = '--';
        p.stderrEl.textContent = '--';
      } else if (dslState.priceResult && dslState.priceResult.err) {
        p.priceEl.textContent = 'error';
        p.stderrEl.textContent = String(dslState.priceResult.err);
      } else if (dslState.priceResult && Number.isFinite(dslState.priceResult.price)) {
        p.priceEl.textContent = dslFormatNumber(dslState.priceResult.price, 6);
        p.stderrEl.textContent = Number.isFinite(dslState.priceResult.stderr)
          ? dslFormatNumber(dslState.priceResult.stderr, 6)
          : '--';
      } else if (dslState.pricingPending) {
        p.priceEl.textContent = '...';
        p.stderrEl.textContent = '...';
      } else {
        p.priceEl.textContent = '--';
        p.stderrEl.textContent = '--';
      }

      p.greeksBody.innerHTML = '';
      if (!dslState.compiledProductJson) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>--</td><td colspan="4">compile a product</td>';
        p.greeksBody.appendChild(tr);
      } else if (!dslState.greeksResults || dslState.greeksResults.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>--</td><td colspan="4">waiting...</td>';
        p.greeksBody.appendChild(tr);
      } else {
        dslState.greeksResults.forEach((row, idx) => {
          const tr = document.createElement('tr');
          if (!row || row.pending) {
            tr.innerHTML = `<td>${idx}</td><td colspan="4">...</td>`;
          } else if (row.err) {
            tr.innerHTML = `<td>${idx}</td><td colspan="4">${String(row.err)}</td>`;
          } else {
            tr.innerHTML = `<td>${idx}</td>`
              + `<td>${dslFormatNumber(row.delta, 6)}</td>`
              + `<td>${dslFormatNumber(row.gamma, 6)}</td>`
              + `<td>${dslFormatNumber(row.vega, 6)}</td>`
              + `<td>${dslFormatNumber(row.rho, 6)}</td>`;
          }
          p.greeksBody.appendChild(tr);
        });
      }

      p.jsonTree.innerHTML = '';
      if (dslState.compiledProduct) {
        renderDslJsonTree(p.jsonTree, dslState.compiledProduct);
      } else {
        const empty = document.createElement('div');
        empty.className = 'dsl-json-empty';
        empty.textContent = 'No compiled product';
        p.jsonTree.appendChild(empty);
      }
    }

    function renderDslMarketPanel() {
      const p = panels.dslmarket;
      if (!p) return;
      p.spotsInput.value = dslState.marketInputs.spots;
      p.volsInput.value = dslState.marketInputs.vols;
      p.rateInput.value = dslState.marketInputs.rate;
      p.divsInput.value = dslState.marketInputs.dividendYields;
      p.pathsInput.value = dslState.marketInputs.numPaths;
      p.stepsInput.value = dslState.marketInputs.numSteps;
      p.seedInput.value = dslState.marketInputs.seed;

      const parsedSpots = dslParseNumberList(dslState.marketInputs.spots, [100.0]);
      const parsedVols = dslParseNumberList(dslState.marketInputs.vols, [0.2]);
      const parsedDivs = dslParseNumberList(dslState.marketInputs.dividendYields, [0.0]);
      const nAssets = inferDslAssetCount(dslState.compiledProduct, parsedSpots, parsedVols, parsedDivs);
      p.noteEl.textContent = `asset count: ${nAssets} | market format: {"assets":[{"spot":..,"vol":..,"dividend_yield":..}],"correlation":[[..]],"rate":0.05}`;
    }

    function renderDslExamplesPanel() {
      const p = panels.dslexamples;
      if (!p) return;
      p.selectEl.value = dslState.activeExampleId || (DSL_EXAMPLES[0] ? DSL_EXAMPLES[0].id : '');
      p.metaEl.textContent = `${DSL_EXAMPLES.length} examples embedded inline`;
    }

    function loadDslExample(exampleId) {
      const example = DSL_EXAMPLE_MAP.get(exampleId) || DSL_EXAMPLES[0];
      if (!example) return;
      dslState.activeExampleId = example.id;
      dslState.source = example.source;
      if (panels.dslexamples) renderDslExamplesPanel();
      if (panels.dsleditor && panels.dsleditor.editor) {

          panels.dsleditor.editor.setValue(example.source);
        } else {
          scheduleDslCompile(0);
        }
      } else {
        scheduleDslCompile(0);
